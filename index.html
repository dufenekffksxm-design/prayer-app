 현실이고 실체인지를 확정하는 선언을 하는 것입니다. 하나님의 역사와 이 세상의 권세 중에 무엇이 더 실제인지, 무엇이 진정한 소식이며 무엇이 실존하는 힘인지 선택하겠다는 것입니다. 또한 그런 면에서 이것은 우리의 평안과 행복이 결코 세상이 제안하는 것에 달려 있지 않고 오직 하나님께만 있다고 찬양하는 기도인 것입니다.\n\n왜 우리가 '시험에 들게 하지 마소서'라고 기도합니까? 우리가 시험에 드는 이유는 항상 우리의 '욕심과 욕망' 때문입니다. 우리는 자꾸 평안과 행복이 세상이 주는 것에 달려 있다고 생각하게 되는 유혹에 빠지곤 합니다.\n\n하나님의 방식은 너무 느리고 더뎌 보이는데, 세상의 방식은 거의 즉각적인 만족을 줍니다. 돈이 주는 만족, 사람들의 인정이 주는 만족, 또 인생의 불확실성을 조금도 견디지 못해 하나님을 신뢰하고 묵묵히 순종하는 삶보다는 스스로 해결하려고 당장 움직이고 싶어지곤 합니다.\n\n그래서 이 기도를 드려야만 합니다.\n\n\"우리는 연약합니다. 그러니, 우리를 시험에 들게 하지 마시옵소서. 보호해 주소서. 아버지를 따라 묵묵히 순종하는 것이 결국 모든 악을 무너뜨리는 길임을 기억하게 하소서.\"\n\n그리고 순종의 싸움을 살아내면서도 동시에 믿음으로 안심하는 것입니다.\n\n로마서 8:37-39를 보면 이렇게 말씀합니다.\n\n\"그러나 우리는 이 모든 일에서 우리를 사랑하여 주신 그분을 힘입어서, 이기고도 남습니다. 나는 확신합니다. 죽음도, 삶도, 천사들도, 권세자들도, 현재 일도, 장래 일도, 능력도, 높음도, 깊음도, 그 밖에 어떤 피조물도, 우리를 우리 주 예수 그리스도 안에 있는 하나님의 사랑에서 끊을 수 없습니다.\"\n\n비록 우리에게 다가오는 모든 악과 시험이 너무나 위협적인 것이 분명하지만, 이미 패배한 세력이라는 것을 기억해야 합니다. 우리가 탄 배는 절대로 침몰하지 않을 것을 믿어야 합니다.\n\n결론: 기도의 실천\n\n지금까지 우리는 영적 전쟁의 한복판에서 이 기도를 드리되, 예수님께서 결국 풍랑을 잠잠케 하실 것을 믿는 믿음으로 그 분이 걸으신 순종의 걸음을 걸어야만 한다는 것을 나누었습니다. 그래서 이제 이 기도를 어떻게 구체적으로 실천할지를 제안드리고자 합니다.\n\n첫 번째로는 먼저 아침에 이 기도를 드리면서 우리가 영적 전쟁 한가운데에 서 있다는 것을 기억하고, 예상되는 유혹을 이기고 순종의 승리를 하게 해달라고 기도하는 것입니다.\n\n아침에 아이들이 아무리 찡찡대고 짜증내도, 함께 짜증내지 않게 해달라고, 축구할 때 아무리 상대가 세게 부딪쳐 오거나 욕을 하더라도 마음에 평안과 여유를 달라고 기도하는 것입니다. 아무튼 그 날의 일정을 생각하면서 미리 생각해 두는 것과 전혀 무방비 상태에서 시험에 드는 것은 전혀 다를 수밖에 없을 것입니다.\n\n두 번째는 이 기도를 자기 전에 드리면서 최소 3분 정도는 '오늘 나를 사로잡은 것'이 무엇인가를 점검하는 것입니다. 그리고 연약함을 고백하고, 이길 힘을 달라고 요청해 보는 것입니다.\n\n마지막으로는 그렇게 점검되고 확인된 것들에 대해서 기도만 하고 끝나는 것이 아니라, 정반대 방향으로 걸어가는 작은 순종을 시도해 보는 것입니다.\n\nTV나 스마트폰을 너무 많이 들여다보고 있었다면, 책을 사서 읽어 나가는 습관을 연습해 보기도 하고, 무언가 불안과 걱정이 올라올 때에는 하나님께 감사한 것들을 생각하기로 결정해 보기도 하는 것입니다. 중요한 것은 최대한 진실하게 자신을 직면하고, 구체적으로 반대 방향으로 한 걸음을 걸어보는 것입니다.\n\n오늘 배운 이 기도, \"우리를 시험에 들게 하지 마시고 악에서 구하소서.\" 이 기도가 가지고 있는 의미를 기억하셔서, 그리스도와 함께 배에 올라탄 채로, 담대히 시험과 악을 대면하고 순종의 맞불을 놓는 우리 모두가 될 수 있기를 주님의 이름으로 축원드립니다.", "questions": ["당신은 지금 자신이 영적 전쟁 중이라는 것을 얼마나 실감하고 있나요? 혹시 전쟁 중임에도 평화로운 일상이라 착각하고 있지는 않나요?", "풍랑이 이는 상황에서 당신은 제자들처럼 두려움에 휩싸여 있나요, 아니면 예수님처럼 하나님을 신뢰하며 평안을 누리고 있나요?", "오늘 하루 당신을 위협하는 '풍랑'은 무엇이었나요? 그리고 그 상황에서 당신은 세 가지 잘못된 방식(무시하기, 타협하기, 정죄하기) 중 어떤 것을 선택했나요?"], "missions": [{"number": 22, "topic": "시험에 들게 마시고, 악에서 구하소서", "text": "하나님 아버지,\n\n오늘 아침 저는 깨닫습니다. 제가 서 있는 이곳이 단순한 일상이 아니라, 치열한 영적 전쟁의 한복판임을 고백합니다. 마치 예수님과 제자들이 탔던 그 배처럼, 거센 풍랑이 저를 덮치려 합니다.\n\n세상의 수많은 권세들이 저의 시선을 빼앗고, 저의 마음을 흔들어놓으려 합니다. 돈의 권세, 미디어의 권세, SNS의 영향력이 매 순간 저를 주님에게서 멀어지게 하려 함을 봅니다.\n\n그동안 저는 이 모든 것들을 대수롭지 않게 여기며 살았습니다. 악의 실체를 직면하기보다 외면하고, 타협하며 살았음을 고백합니다. 하지만 이제는 분명히 압니다. 이 모든 것이 단순한 우연이나 일상의 어려움이 아니라, 하나님 나라를 가로막으려는 치밀한 전략임을.\n\n그러나 동시에 저는 선포합니다. 이 배에 예수 그리스도께서 함께 계심을. 비록 지금은 고요히 주무시는 것처럼 보이지만, 결국에는 모든 풍랑을 잠재우실 것을 믿습니다.\n\n이 전쟁의 승리가 이미 예수 그리스도를 통해 확정되었음을 믿습니다. 비록 제가 연약하지만, 주님의 능력으로 이 모든 것을 이기고도 남음이 있을 것을 믿습니다. 오늘 하루도 이 영적 전쟁의 한복판에서 깨어있는 주님의 군사가 되게 하소서"}, {"number": 23, "topic": "시험에 들게 마시고, 악에서 구하소서", "text": "신실하신 하나님 아버지,\n\n오늘도 저를 향한 수많은 시험과 유혹 앞에 서 있습니다. 특별히 제 마음 속에 자리잡은 조급함과 불안을 고백합니다. 하나님의 방식은 더디고 느리게 보이는데, 세상이 제시하는 즉각적인 해결책들이 자꾸만 달콤하게 다가옵니다.\n\n아버지, 저의 연약함을 압니다. 때로는 의로운 분노라고 포장하면서도 실상은 저의 감정을 제어하지 못하고, 순간의 감정에 휘둘려 다른 이들을 판단하고 정죄했던 모습들을 봅니다. 바리새인처럼 저만이 옳다고 착각하며 살았던 교만도 고백합니다.\n\n주님, 예수님께서 광야에서 시험을 받으실 때처럼, 저도 말씀으로 무장하여 이 모든 유혹과 시험을 이겨내게 하소서. 특별히 [일상의 구체적인 상황들] 속에서 하나님의 방식을 신뢰하며 인내하게 하소서.\n\n유혹이 올 때마다 그것을 피하거나 무시하지 않게 하시고, 예수님처럼 정면으로 대면하되 말씀의 검으로 물리칠 수 있는 영적 분별력을 주소서.\n\n또한 시험이 올 때마다 그것이 저의 연약함을 깨닫고 더욱 주님만을 의지하게 되는 기회가 되게 하소서. 제 안의 교만을 내려놓고, 겸손히 주님의 은혜를 구하는 자가 되게 하소서.\n\n무엇보다 이 모든 과정이 일시적인 감정의 분출이나 결심이 아니라, 작지만 구체적인 순종의 걸음으로 이어지게 하소서."}, {"number": 24, "topic": "시험에 들게 마시고, 악에서 구하소서", "text": "신실하신 나의 아버지 하나님,\n\n믿음이 작은 제자들이 풍랑 속에서 두려워 떨며 주님을 깨웠던 것처럼, 저도 종종 불안과 두려움에 사로잡혀 흔들립니다. 하지만 주님께서는 그때나 지금이나 변함없이 이 배에 함께 계심을 믿습니다.\n\n세상의 거센 물결이 저를 삼키려 할 때마다, 로마서 말씀처럼 '죽음도, 삶도, 천사들도, 권세자들도, 현재 일도, 장래 일도' 결코 저를 주님의 사랑에서 끊을 수 없음을 기억하게 하소서.\n\n때로는 하나님의 침묵이 두렵고, 고난의 시간이 너무 길게 느껴질 때도 있습니다. 하지만 주님께서 반드시 때가 되면 모든 풍랑을 잠잠케 하실 것을 신뢰합니다. 이미 승리하신 주님과 함께 이 여정을 걸어갈 때, 결코 이 배가 침몰하지 않을 것을 믿습니다.\n\n특별히 [구체적인 어려움들] 속에서도, 주님의 보호하심을 신뢰하며 담대히 나아가게 하소서. 비록 제 눈에는 보이지 않더라도, 천군천사로 저를 지키시는 주님의 신실하심을 믿습니다.\n\n이 모든 여정이 결국에는 주님의 영광을 드러내는 과정임을 믿으며, 매 순간 감사함으로 나아가게 하소서."}]}, {"id": 9, "title": "나라와 권세와 영광이 영원히 아버지께", "subtitle": "마태복음 6:13b", "sermon": "권세의 두 얼굴\n\n2018년에 미얀마 네피도를 단기선교 차 방문했을 때의 일입니다. 2006년에 새롭게 수도가 된 이곳의 정부기관 앞을 지나면서 놀라웠던 것은, 정말 어마어마하게 넓은 20차선 도로가 있었다는 것입니다. 정작 그 도로를 지나다니는 차량은 거의 없었음에도 말입니다.\n\n또 거기 세워진 각종 정부 건물들은 주변 주민들의 집과 극명하게 대비되고 있었습니다. 주민들의 집은 다 무너질 것처럼 허름했는데, 정부 건물은 거대하고 화려했습니다. 사실 그곳 주민들의 집 대부분은 비어 있었는데, 이는 정부가 이 지역을 개발한다고 주민들을 강제로 쫓아냈기 때문이었습니다.\n\n이것이 바로 오랜 세월 이 세상의 역사 속에서 권세가 자기를 드러내는 전형적인 방식입니다. 거대한 건축물과 화려한 형상들로 힘을 과시하고, 간단한 지시만으로 사람들을 일사불란하게 움직이게 만드는 것입니다.\n\n그렇다면 왜 이렇게 힘을 과시할까요? 간단합니다. 강한 힘 앞에서 사람들은 두려움을 느끼고, 어쩔 수 없이 복종하게 되기 때문입니다. 그래서 지금도 세상에 작동하는 수많은 강한 힘들은 우리에게 명령합니다. 지금 선명하게 보이는 이 권력과 힘들 앞에 충성하라고 말입니다. 특히 미디어라는 이 세상의 제사장들이 끊임없이 그것을 선포하고 있습니다.\n\n그런데 오늘 우리가 보는 주기도의 마지막 구절은 이렇게 말씀합니다.\n\n'나라와 권세와 영광이 영원히 아버지께 있습니다.'\n\n하나님 나라의 기도\n\n우리는 그동안 차근차근 주기도문을 배워왔습니다. 이 기도들이 전부 무엇입니까? 이는 오직 '하나님 나라' 안에 살아가는 사람들이 함께 말하는 기도입니다. 우리에게는 깨진 세상보다 훨씬 큰 그림 안에 있음을 알고 믿은 자들이 이제는 그 나라 안에서의 풍성한 삶을 배우고 누리게 하는 기도였습니다.\n\n또 그런 면에서 이 기도가 지금 당장 소화하기에는 너무 크고 헐거운 옷이라고 말씀드렸습니다. 그래서 우리는 \"이름을 거룩하게 하소서\"라고 기도하면서도, 사실은 나의 이름에 더 관심이 가는 자신을 발견했을지도 모르고, \"우리가 우리에게 죄 지은 자를 사하여 준 것 같이, 우리 죄를 사하소서\"라고 기도하면서도 도무지 마음이 움직이지 않아서 여전히 억울하고 분노에 사로잡혀 있는 자신을 발견했을지도 모릅니다.\n\n그럼에도 불구하고 이 기도에 진실되게 참여했다면 작게 피어오르는 변화를 느꼈을 것입니다. 아버지께 더 깊은 관심이 생기기 시작하고, 불안과 염려보다는 평안을 더 느끼기도 하고, 분노보다 포용하는 마음이 만들어지는 것을 경험했을 것입니다.\n\n어쨌든 드디어 오늘 마지막 구절에 이르렀는데 이는 단순한 종결구가 아닙니다. 오히려 지금까지 우리가 올려드린 모든 기도, 이토록 위험한 기도들을 거침없이 외치게 하는 토대가 되는 고백입니다.\n\n나라가 영원히 아버지께\n\n먼저, 이 기도가 보여주는 중요한 이미지를 예수님이 탄생하시던 날에서 발견할 수 있습니다.\n\n당시는 로마제국이 최고 전성기를 달리고 있었습니다. 그것은 당시 아우구스투스라는 위대한 황제가 있었기 때문인데, 그는 로마 내부적으로 발생하던 엄청난 혼란과 내전을 제거하고 마침내 평화를 가져온 영웅이었습니다. 그리고 그 평화를 '팍스 로마나'라고 불렀습니다. 이는 무엇입니까? 힘으로 만든 평화입니다. 자기 뜻에 맞지 않고, 분쟁을 일으키는 사람들은 전부 처단했고, 지속적인 평화를 위해서 불순분자들을 축출해 냈던 것입니다. 그렇게 만든 평화였습니다.\n\n그래서 로마 곳곳에서 십자가에 매달린 죄수들의 시체를 발견할 수 있었습니다. 왜 그랬습니까? 이 제국의 평화를 위협하면, 모두 이렇게 된다는 경고였습니다. 확실한 것은 이 평화는 모두를 위한 것이라기보다는 오롯이 황제 자신을 위한 평화였고, 정의로움이 아니라 다분히 위에서 찍어 누르는 폭력적인 평화였습니다. 그럼에도 사람들은 이 평화를 꽤나 좋아했고, 각자의 의중들 속에서 황제를 찬양하곤 했습니다.\n\n그런데 바로 그때, 이 제국의 권세에 도전하는 전혀 다른 나라가 발견되고 있었습니다. 그리고 그 장소는 제국의 수도가 아니라, 아주 작은 마을 베들레헴이었고, 겉보기에는 너무나 위태로워 보였습니다. 일단 신의 아들이라고 불리우는 아우구스투스가 그저 한 마디 했을 뿐인데, 온 세상은 인구조사를 하기 위해 자리를 이동하고 있었고, 마찬가지로 한 젊은 부부 역시도 임신한 몸을 이끌고 아주 위험한 여행을 떠나야만 했습니다. 어떤 그림이 보이십니까? 그저 황제의 권세가 이 사람들의 운명을 좌지우지하는 것 같이 보입니다. 누가 보아도 연약하고 보잘것없어서, 이것을 도무지 '나라', '왕'이라고는 부를 수 없는 모양새였습니다.\n\n그런데 여기서 반전이 발견됩니다. 말구유에서 아기가 태어나자마자 하늘에서는 천사들이 나타나서 노래를 부르기 시작합니다.\n\n\"가장 높은 곳에서는 하나님께 영광이요. 땅에서는 하나님이 기뻐하시는 사람들 중에 평화로다!\"\n\n세상에 만연한 팍스 로마나의 평화, 피라미드 상층부의 권력자의 평화가 아니라 하나님이 기뻐하시는 사람들에게 임하는 평화를 노래하는 것입니다. 그래서 권력자의 명예와 영광이 아니라 하나님께 영광이 되는 나라에 대한 이야기가 들려왔던 것입니다. 그것도 하늘에서 말입니다.\n\n누가복음 1장 51-53절에서 마리아는 이렇게 선언합니다.\n\n\"그는 그 팔로 권능을 행하시고 마음이 교만한 사람들을 흩으셨으니, 제왕들은 왕좌에서 끌어내리시고 비천한 사람을 높이셨습니다. 주린 사람들을 좋은 것으로 배부르게 하시고, 부한 사람들을 빈손으로 떠나보내셨습니다.\"\n\n무엇입니까? 새롭게 탄생하는 이 나라는 결국 모든 것을 뒤집을 것이라는 말씀입니다. 피라미드를 뒤집어서 천한 자는 높아지고 높은 자가 낮아질 것이라는 것입니다. 그래서 첫 시작부터 모든 이미지가 뒤집힌 방식으로 나타났던 것입니다. 비록 누구도 주목하지 않는 소외된 곳에서 아기가 태어났지만, 정작 하늘의 별들은 평소와 다르게 너무나 분주하게 움직이고 있었던 것입니다. 그리고 이제 하나님은 이토록 대조되는 두 나라의 이미지를 보여주시고는 우리에게 묻고 계십니다.\n\n\"자, 어느 쪽이 진정한 나라인지 택하라.\" \"너희는 어느 나라에 속하겠느냐?\" \"손가락 하나만 까딱해도 온 천하를 움직이게 하는 왕을 따를 거냐? 아니면 지극히 낮고 천한 자리에서 전혀 새로운 권세를 드러내는 왕을 따르시겠느냐?\"\n\n그래서 우리가 이 기도, 나라가 영원히 아버지께 있다고 선언하는 것은 바로 이 지점에서 분명하게 믿고 선택하겠다는 의미입니다.\n\n\"주님, 우리는 베들레헴에서 시작된 바로 그 나라가 참이라는 것을 믿습니다. 사람들에게 주목을 끌만큼 화려하거나 멋져 보이지 않더라도, 하늘이 주목하고 천사들이 노래하던 바로 그 나라를 따르겠습니다. 우리는 바로 그 나라가 모든 것을 뒤집고 승리할 것을 믿기 때문입니다.\"\n\n그래서 우리는 담대하게 기도하는 것입니다. 복음을 따라서 전혀 다른 삶을 살겠다고, 예수를 왕으로 따르는 하나님 나라 백성의 삶을 살아가겠다고 말입니다.\n\n권세가 영원히 아버지께\n\n그렇다면, 이제 우리가 확인할 것은 '권세가 영원히 아버지께' 있다는 고백이 대체 어떤 의미가 있으며, 정말 이 사실을 믿는다면 어떤 방식으로 살아가게 될 것인가 하는 부분입니다. 그리고 실은 이 부분이 기독교 안에서 가장 오해 되었던 내용이기도 합니다. 가장 극적인 예가 '로마 황제였던 콘스탄티누스 대제' 시절입니다.\n\n그는 회심한 후에 로마를 기독교 국가로 만들었습니다. 어쨌든 그가 생각하기에 바로 그것이 하나님 나라를 위한 일이고, 아버지의 권세를 이 땅에 가져오는 방식이라고 여겼던 것입니다. 그래서 그는 국가권력과 하나님 나라를 통합시켜 버렸습니다. 즉, 세상 권력이 힘을 사용하는 방식 그대로 하나님 나라를 확장시키려고 한 것이고, 결국 교회의 목표를 이루는 일을 세속권력으로 법제화시킨 것입니다.\n\n그런데 생각해 보십시오. 성경에서 그리스도인이 된다는 것이 무엇입니까? 그것은 결코 강제적인 방식일 수 없습니다. 하나님은 강압적이기보다는 겸손하게 사랑하십니다. 그 분은 거절을 당할 각오를 하고 서 계시는 아버지와도 같습니다. 하염없이 둘째 아들을 기다리고 서 있는 바로 그 모습입니다. 그래서 사실은 복음 안에 담긴 그리스도의 사랑과 은혜를 진정으로 깨달을 때에야, 그래서 진실한 사랑과 신뢰의 반응으로 나아갈 때에야 비로소 그리스도인이 될 수 있는 것입니다.\n\n그런데 법과 규칙과 권력의 강제력으로 그리스도인을 만들어 내겠다고 한다면, 그 결과가 무엇이었겠습니까? 물론 온 국민이 기독교인이 되긴 했고, 그래도 하나님께서 합력하여 선을 이루시는 은혜 안에서 누군가는 참된 그리스도인으로 살아가게 됐을지 모릅니다. 하지만 역사는 복음이 아닌, 유리함과 강제력으로 양산된 그리스도인들의 부패와 변질을 고발하고 있습니다. 마침내는 종교개혁이 일어나지 않으면 안 되는 순간이 오게 되었던 것입니다.\n\n그런데 오늘날에도 이런 유혹과 왜곡은 계속되는 중입니다. 하나님 나라를 추구하고 확장한다는 선한 목표가 있다면, 그 어떤 수단도 정당화될 수 있다는 것처럼 말입니다.\n\n진실한 내면의 태도를 추구하는 것이 아니라, 빠른 율법주의적인 방식을 채택하는 것입니다. 그래서 봉사하지 않으면 복을 못 받을 것이라는 협박을 듣기도 하고, 부모들은 자녀들에게 신실함과 온유와 인내로 복음을 전수하는 것이 아니라 그저 부모의 권위로 어떻게든 기독교 문화에 적응시키면 된다고 여깁니다.\n\n기독교 학교에서 채플을 드리지 않으면 불이익을 주는 방식도 다 마찬가지입니다. 하지만 그것이 아닙니다. 하나님 나라는 그런 식으로 확장되지도 않고, 정작 그 나라의 권세가 영원히 아버지께 있다는 고백과는 아무런 상관이 없는 내용입니다.\n\n우리는 언젠가가 아니라, 이미 영원히 그 권세가 아버지께 있다고 고백합니다. 우리는 그렇게 믿는 것입니다. 그 권세를 나타내려고 조작할 필요도 없고, 급해질 필요도 없고, 불안해할 필요도 없다는 것입니다.\n\n그래서 평화의 왕으로 오신 예수님이 보여주신 방식이 무엇입니까? 실제로 그분은 엄청난 힘과 권능을 가진 분이었습니다. 바다의 파도를 잠잠하게 만들고, 병자를 고치시고, 죽은 자까지 살리실 수도 있었습니다. 그런데 그분이 그 엄청난 힘을 어떤 식으로 사용하셨는지 생각해 보십시오. 광야에서 사탄이 했던 세 가지 시험은 전부 이것과 연관된 내용이었습니다. 마귀는 돌을 떡으로 만들라고, 그 경제적 권력을 쓰라고 부추겼고, 높은 곳에서 뛰어내려서 기적을 선보이라면서 영적인 권력도 마음껏 써보라고 주장했습니다. 또 정치적 권력을 사용하면 쉽게 세상을 다스릴 수 있다고 부추겼습니다. 힘을 과시하라고, 권세를 드러내라고, 하나님 나라의 권세를 모든 이들에게 알게 만들라고 했습니다.\n\n하지만 예수님은 전부 거절하셨습니다. 그분이 사용하시는 권세는 늘 분명했습니다. 주님이 제자들의 발을 씻겨 주시던 장면을 생각해 보십시오. 과시가 아니라, 오히려 낮은 자리로 내려가시는 것이었습니다. 여기에는 권세를 몰라줄까 봐, 자기를 무시할까 봐 느끼는 그 어떤 조급함도 없고, 불안함도 없었습니다. 오히려 너무나 진실된 자세로 이 일을 하셨습니다.\n\n하나님 나라의 왕으로 오신 분이 종들이나 하던 일을 거침없이 하셨습니다. 그런데 더 놀라운 것이 무엇인지 아십니까? 당시 발을 씻겨주던 제자 중에는 이미 주님을 배반하려 시도하던 가룟유다도 있었다는 것입니다. 예수님을 아예 인정하지도 않고, 뒤통수를 치려고 준비하고 있는 그의 발도 씻기셨다는 것입니다. 예수님이 모르셨을까요? 당연히 아셨을 것입니다.\n\n생각해 보십시오. 만약 세상 권세의 방식이라면, 어떻게 대응해야 합니까? 배신자 처단을 위해 비상계엄을 선포하고, 즉시 색출해서 처분하는 것이 아니겠습니까? 그런데 성경은 바로 그 부분에서 무엇이라고 말씀하시는지 아십니까?\n\n\"주님이 자기 사람들을 사랑하시되, 끝까지 사랑하시니라.\"\n\n그리고 마침내 주님은 십자가 위에 달리셨습니다.\n\n십자가가 무엇입니까? 로마가 강제로 평화를 이루기 위해 사용했던 공포의 상징이었습니다. 권세 앞에 처절하게 패배했다는 것을 보여주는 그 상징입니다. 그런데 주님은 그것을 두려워하지 않으셨습니다. 그것이 하나님 나라를 망하게 하지 못한다는 것을 아셨고, 아니 오히려 그 십자가 위에서 하나님 나라의 새로운 권세가 분명히 나타나고 있다는 것을 확신하고 계셨던 것입니다. 왜 그러셨습니까? 어차피 나라와 권세와 영광이 영원히 아버지의 것이기 때문입니다. 그것을 알고 계셨기에 거침없이 뒤집힌 권세를 사용하신 것입니다. 자기를 배신하고, 죽이려 하는 사람들마저도 '품고 섬기는 권세', 끔찍한 악에 희생되면서도 \"아버지여 저들을 용서해 주소서\"라고 외치시며, 복수가 아닌 용서로, 정죄가 아닌 은혜로, 억압이 아닌 사랑으로 표현되는 그런 권세였다는 것입니다.\n\n그렇게 우리에게 가르쳐주셨던 것입니다.\n\n\"자녀들아, 권세는 이렇게 쓰는 것이다. 어차피 권세는 영원히 아버지께 있느니라.\"\n\n그래서 우리가 이 기도를 드린다는 것은 우리가 가진 그 어떤 '힘'이라도 반드시 주님의 방식으로 쓰겠다고 결단하는 것과 같습니다. 실제로 우리는 각자 나름의 힘을 갖고 있습니다. 우리가 가진 돈이나 여러 가지 재능과 각종 지위들이 전부 우리에게 주어진 '힘'들이기 때문입니다. 그런데 이제 그것을 어떤 방식으로 사용하겠느냐는 것입니다. 제국처럼 갑질과 폭력과 강압을 위한 방식으로 할 것인지, 아니면 그리스도처럼 오히려 다른 이들을 섬기는 방식으로 사용할 것인지 말입니다.\n\n말단 직원으로 있을 때와 팀장으로 있을 때, 당연히 힘과 지위가 다를 수밖에 없습니다. 그런데 바로 그 자리에서 우리는 뒤집힌 나라의 권세에 동참하고 있다는 것을 기억하는 것입니다.\n\n예를 들면, 오히려 결재권을 가지고 있지만 부하직원의 의견을 경청해주고, 굳은일을 마다하지 않고 똑같이 함께 하려는 모습을 향해 가는 것입니다. 부모로서도 마찬가지고, 혹은 목회자나 직분자로서 갖게 된 권한이 무엇이든 간에도 다 마찬가지입니다.\n\n우리는 이 기도를 드리면서, 뒤집힌 권세, 섬김의 권세에 동참하기로 결정하는 것이고, 이 기도에 진실하게 참여하면 할수록 여전히 본성은 전혀 그렇지 못할지라도 조금이나마 그분의 마음을 닮아가는 것입니다. 어차피 권세는 영원히 아버지께 있으니까, 그 어떤 조급함이나 불안감 없이 세상이 추앙하던 것들은 뒤로하고, 낮은 자리로 내려가서 저항하며 사는 방식을 배워갈 수 있는 것입니다.\n\n영광이 영원히 아버지께\n\n그렇다면 이제 마지막으로, '영광이 영원히 아버지께' 있다는 고백이 무슨 의미인지를 살펴보겠습니다. 일단, '영광 받는다', '영광스럽다'는 것은 이런 개념이 있습니다. 어쨌든 우리는 모두가 의미 있는 존재가 되고 싶지, 무의미해지고 싶지 않습니다. 가급적 사람들에게도 인정받고, 삶이 반짝반짝 빛나기를 원합니다. 우리는 그런 영광을 추구하게 되어 있고, 이것 자체가 잘못된 것은 전혀 아닙니다. 오히려 하나님의 형상대로 지어진 인간이기 때문에 너무나 당연하게 작동하는 원초적 갈망인 것입니다. 그런데 문제는 여기에 있습니다. 이 갈망을 만족시키는 방식, 영광을 추구하는 방식이 왜곡된다는 것입니다. 로마제국이 추구했던 영광이 무엇이었습니까? 인간 본연의 갈망을 만족시키기 위해 사용한 방식은 전부 '화려함'이었습니다. 황금으로 치장된 신전들과 대리석으로 빛나는 개선문들, 그리고 끊임없이 이어지는 군인들의 행렬들의 모습으로 구현되었습니다.\n\n예전에 청년들과 함께 매년 단기선교를 갔었는데, 거기서 수련회 캠프를 열어주는 사역을 했었습니다. 그때, 청년들 사이에서 미묘한 기류가 흐르곤 했습니다. 그것은 현지 아이들에게 누가 인기가 더 많은가에 대한 관심이었습니다. 어떤 잘생기고 예쁜 청년들은 인기가 많아서 거기에 취해 있고, 또 반대로 인기가 부족한 청년들은 낙심해 있곤 했습니다.\n\n왜 선교 중인데도 그런 일이 일어날까요? 간단합니다. 우리는 본성상 자기 영광을 추구하고, 자기가 빛나는 것을 고대하게 되기 때문입니다. 그래서 심지어 단기 선교라는 미션, 하나님 나라를 추구하는 모험적인 시도 아래에서도 너무나 쉽게 헛된 영광을 추구하는 일이 벌어지는 것입니다.\n\n성경에서 '영광'으로 번역되는 히브리어 '카보드'는 '무게 또는 실체'라는 의미를 담고 있는데, 이것이 우리에게 중요한 통찰을 줍니다. 즉, 진정한 영광은 결코 겉에 드러나는 화려함이 아니라는 것입니다. 하나님 나라의 영광은 아버지의 본질적 가치 안에 있다는 것입니다.\n\n변화산 사건을 생각해 보십시오. 잠깐 동안 예수님이 완전히 변하셨습니다. 그야말로 그분의 본질적 가치가 겉으로도 드러나는 장면이었던 것입니다. 막 빛이 나고, 황홀할 정도였습니다. 그래서 세 명의 제자들 모두가 무엇이라고 했습니까? \"여기가 좋사오니 초막을 지어서 여기 삽시다!\" 어떻게든 현재 보고 있는, 겉으로 환히 드러난 영광을 계속 붙잡고 싶었던 것입니다. 그런데 주님은 거기에 동의하지 않으셨습니다. 오히려 영광을 다 감추시고, 사람을 사로잡을 만큼 화려하고 번뜩이는 능력은 다 숨기시고는 \"인자가 영광을 받을 때가 왔도다!\"라고 외치시면서 정작 십자가의 길로 나아가셨습니다. 그분이 선택하신 것은 변화산의 영광이 아니라 십자가의 영광이었다는 것입니다. 더 깊고 중요한 본질은 거기에 있다는 것입니다. 겉으로 드러난 화려함에 취하지 말라는 것입니다. 아니 오히려 세상에서 가장 수치스럽고 비참한 자리에 선다고 할지라도, 아버지의 뜻을 따르는 그 자리에 진정한 영광이 있다고 선포하시는 것입니다. 아마 당시의 그 누구도 이 의미를 이해하지도 못했고, 이것이 대체 무슨 영광인가 싶었을 것입니다. 하지만 결국은 확인되었습니다. 십자가는 모든 악을 심판하는 본질적인 정의와 자신을 온전히 내어주는 본질적인 사랑이 가장 완벽하게 드러나는 진정한 영광이라는 것이 말입니다.\n\n그래서 우리는 이 기도를 드리면서, '내 영광을 추구'하는 것을 멈추는 것입니다. 아니 굳이 그러지 않아도 된다고 안심해도 좋다는 것입니다. 내가 이런저런 스펙이 있고, 이런 모양 저런 모양으로 반짝거려야 인정받고 사랑받을 것이라고 생각할 필요가 없다는 것입니다. 설령 우리가 가장 비천하고 낮은 자리에 서는 순간이 오더라도, 오히려 나를 무조건적으로 사랑해 주시는 주님의 인정이야말로, 그것이야말로 진정한 영광이라는 것을 깨달아가는 것입니다. 우리가 그렇게 살 때, 굳이 자기의 가치를 증명하려고 발악할 필요가 없습니다. 이 교회가 세상이 말하는 그런 성공한 교회가 될 필요도 없고, 영향력 있는 목회자가 될 필요도 없고, 또 우리 안에 겉으로 드러난 화려한 프로그램들을 다 갖출 필요도 없다는 것입니다.\n\n우리 각자가 이런저런 화려한 봉사를 해내거나, 세상에서 멋지게 추앙받는 인물이 될 때 하나님께 영광이 되는 것도 아닙니다. 진정한 영광은 이미 아버지께 있고, 그래서 우리는 현재 그 자리, 작고 연약하고 주목받지 못하는 자리에서도, 다만 섬기고 희생하는 자리에 서 있다면 이미 영광스러운 삶이라는 것을 깨달아야 하는 것입니다.\n\n결론\n\n사랑하는 여러분, 우리가 살펴본 대로 \"나라와 권세와 영광이 전부 다 아버지의 것\"임을 믿으십니까? 우리가 기도로 참여하는 이 나라는 그저 그림의 떡이 아닙니다. 지금 바로 여기에 있습니다. 지금도 우리는 빈손으로, 아무것도 아닌 모습으로 이 자리에 나오지만 얼마든지 하나님 안에서 말씀을 누리고 생명의 떡과 언약의 잔을 마시면서 삶이 풍요로워질 수 있는 것입니다. 그래서 우리가 이 기도 안에서 얼마든지 담대해질 수 있고, 그 품 안에서 평안과 자유를 느낄 수 있습니다.\n\n물론 여전히 하나님 나라는 완전히 오지 않았기 때문에 세상 권세의 위협들과 온갖 고통과 악을 마주하며 살 수밖에 없습니다. 하지만 확실한 것은, 우리가 드리는 이 고백이 결국 실현될 것이고 그 여정의 끝에 도달하게 될 것이라는 것입니다. 지금도 세상을 주름잡아서 눈에 훤히 보이는 권력들은 마치 램프나 전등처럼 세상을 비추는 중입니다. 그래서 전혀 의미 없는 것이 아니라, 일부분 긍정적인 효과도 내기도 합니다. 돈과 권력과 재미 등이 우리 삶에 여전히 필요한 것처럼 말입니다. 하지만 그것이 절대로 바깥의 어두움을 완전히 몰아낼 수 없다는 것을 기억해야 합니다. 깨진 세상 나라의 권세와 영광으로는 안 되는 일이기 때문입니다.\n\n하지만 예수님의 나라는 마치 떠오르는 새벽별이나 새벽 태양과도 같습니다. 아직 희미해 보여도, 곧 확실하게 그 나라는 밝아올 것입니다. 그러니 어떻게 해야 하겠습니까? 만약 우리가 정말 그 나라를 믿는다면, 이제 한낱 촛불 따위는 훅 불어버려야 하는 것이고, 당장 커튼을 열고 밝아오는 날을 맞이해야 진실한 반응일 것입니다. 세상 나라의 폭력적인 권세와 영광에 동참하는 것이 아니라, 새로운 나라의 권세와 영광을 따르기 위해 낮은 자리에서 저항하는 모습으로 말입니다.\n\n부디 오늘 '나라와 권세와 영광이 영원히 아버지께 있습니다'라는 이 기도를 통해서 주님이 가르쳐주신 모든 기도를 더욱 담대하게 드릴 수 있기를 축복합니다. 그리고 무엇보다도 우리가 계속 이 모든 기도들을 통해 자라나가길 소망합니다. 부담이 아닌, 기대와 소망으로 말입니다.", "questions": ["당신의 삶에서 세상의 권세(돈, 명예, 인정 등)와 하나님 나라의 권세(섬김, 사랑, 희생) 중 어느 것을 더 의식하며 살고 있나요? 구체적인 순간들을 떠올려보세요.", "당신에게 주어진 '힘'(직위, 재능, 돈 등)을 어떻게 사용하고 있나요? 그것을 통해 자신을 과시하고 있진 않나요, 아니면 다른 이들을 섬기는 데 사용하고 있나요?", "당신은 어떤 종류의 '영광'을 추구하고 있나요? 세상에서 빛나고 인정받는 것에 집중하나요, 아니면 보이지 않는 자리에서도 하나님의 뜻을 좇는 데 더 관심이 있나요?"], "missions": [{"number": 25, "topic": "나라와 권세와 영광이 영원히 아버지께", "text": "사랑하는 하나님 아버지,\n\n오늘도 세상은 저를 자꾸 다른 방향으로 이끌어갑니다. 더 앞서가야 하고, 더 가져야 하고, 더 유명해져야 한다고 말합니다. 하지만 주님, 저는 그런 것이 전부가 아님을 알았습니다.\n\n예수님은 마구간에서 태어나셨습니다.\n\n세상에서 보면 초라해 보였을지 모르나, 그것이 진정한 하나님 나라의 시작이었다는 사실이 얼마나 놀라운지요. 그래서 저도 오늘 이런 선택들을 하기 원합니다. 누군가를 밟고 올라서는 대신에 돕는 쪽을 선택하게 하시고, 거짓말로 빨리 해결하는 대신에 정직하게 가게 하시며, 나만 잘되면 된다는 마음보다는 함께 가는 마음을 품게 하소서.\n\n때로는 이런 선택들이 손해 보는 것 같고, 어리석어 보일 때도 있을 것입니다. 그러나 주님, 저는 믿습니다. 진정한 승리는 하나님 나라에 있다는 것을.\n\n힘들 때마다 이 마음을 기억하게 하시고,이렇게 선택할 때마다 기쁨도 함께 허락하여 주옵소서."}, {"number": 26, "topic": "나라와 권세와 영광이 영원히 아버지께", "text": "하나님 아버지,\n\n가끔 제게 주어진 작은 힘이라도 생기면, 그걸 제 맘대로 쓰고 싶어질 때가 있습니다. 직장에서 주어진 권한도, 가정에서의 위치도, 교회에서의 직분도 모두 제가 원하는 대로 사용하고 싶어집니다.\n\n하지만 주님께서는 전혀 다른 모습을 보여주셨습니다. 모든 권세를 가지고 계셨으면서도, 오히려 제자들의 발을 씻기셨고 심지어 당신을 배반할 유다의 발까지도 씻기셨습니다.\n\n그래서 저도 고백합니다. 진정한 권세는 영원히 아버지의 것이며, 그 권세는 다스림이 아닌 섬김으로 나타난다는 것을.\n\n그러므로 오늘도 제게 맡겨진 모든 것들을 누군가를 위해 사용하게 하소서. 부모로서 자녀를 인내로 대하게 하시며, 교회에서도 섬기는 자리에 기쁘게 서게 하소서.\n\n불안해서 서두르지 않게 하시고 조급해서 강압적이 되지 않게 하소서. 모든 권세가 이미 주님의 것이니, 저는 그저 맡겨진 만큼만 겸손히 섬기며 살게 하소서."}, {"number": 27, "topic": "나라와 권세와 영광이 영원히 아버지께", "text": "하나님 아버지, 솔직히 고백합니다.\n\n저는 여전히 인정받고 싶고, 주목받고 싶고, 제 삶이 반짝반짝 빛나기를 원합니다. 그런데 주님께서는 십자가를 통해 전혀 다른 영광을 보여주셨습니다. 가장 수치스럽고 비참해 보이는 그 자리에서 가장 완벽한 사랑을 드러내셨습니다.\n\n이제 깨닫습니다. 제가 몸부림치며 추구하던 영광이 사실은 한낱 촛불 같은 것이었음을. 그래서 고백합니다. 진정한 영광은 영원히 아버지의 것입니다.\n\n그러므로 더 이상 나를 증명하려 애쓰지 않게 하시고 누군가와 비교하며 아파하지 않게 하소서. 화려한 모습을 갖추지 못해도, 특별한 능력이 없어도 괜찮습니다. 그저 지금 이 자리에서 아버지의 사랑을 누리며 맡겨주신 일들을 성실히 감당하게 하소서. 때로는 아무도 알아주지 않는 일이라도 기쁨으로 감당하게 하소서.\n\n이미 십자가에서 보여주신 그 영광, 그 사랑이면 충분합니다"}]}, {"id": 10, "title": "마무리하며", "subtitle": "", "sermon": "주기도문의 여정을 함께 걸어오면서, 우리는 단순히 외우고 반복하던 기도가 얼마나 깊고 풍성한 의미를 담고 있는지를 발견했습니다. 매 구절마다 우리를 새롭게 하시는 하나님의 은혜가 있었고, 우리의 삶을 변화시키는 도전이 있었습니다.\n\n\"하늘에 계신 우리 아버지\"라고 부를 때마다 우리는 이전의 노예 된 삶을 벗어나 자유로운 하나님 나라의 백성이 되었음을 기억했고, \"이름이 거룩히 여김을 받으시오며\"라고 기도하면서 우리의 삶이 그분의 이름에 합당한지 돌아보았습니다. \"나라가 임하옵시며\"라는 기도는 우리로 하여금 이 땅에서 하나님 나라의 조용한 혁명에 동참하게 했고, \"뜻이 하늘에서 이룬 것같이 땅에서도 이루어지이다\"라는 고백은 우리의 작은 순종이 결코 헛되지 않음을 일깨워주었습니다.\n\n\"일용할 양식을 주옵시고\"라는 기도를 통해 우리는 불안과 탐욕의 시대를 살아가는 새로운 방식을 배웠으며, \"우리가 우리에게 죄 지은 자를 사하여 준 것같이 우리 죄를 사하여 주옵시고\"라는 기도는 우리를 용서와 화해의 길로 이끌었습니다. \"시험에 들게 하지 마시옵고 다만 악에서 구하시옵소서\"라는 간구는 우리가 영적 전쟁의 한복판에 있음을 깨닫게 했고, 마지막으로 \"나라와 권세와 영광이 영원히 아버지께 있나이다\"라는 선포는 우리의 모든 기도가 서 있는 반석을 보여주었습니다.\n\n이제 우리는 이 기도가 단순한 종교적 의식이나 습관이 아닌, 우리를 완전히 새로운 차원으로 이끄는 영적 여정임을 알게 되었습니다. 처음에는 너무 크고 헐렁해 보였던 이 기도가, 이제는 우리를 자라게 하는 옷이 되어가고 있습니다.\n\n부디 이 책에서 배운 기도들이 여러분의 일상에 깊이 스며들기를 바랍니다. 매일 아침 이 기도로 하루를 시작하고, 매일 저녁 이 기도로 하루를 마무리하면서, 우리가 점점 더 하나님 나라의 백성다운 모습으로 자라나게 되기를 소망합니다.\n\n\"주님께 기도를 배우다\"라는 이 여정이 여기서 끝나는 것이 아니라, 평생에 걸쳐 계속되는 은혜의 길이 되기를 기도합니다.\n\n진실한숲교회 담임목사 나종현 드림\n\n주님께 기도를 배우다\n\n하나님 나라를 살아내는 기도\n\n글 나종현\n\n디자인 나종현\n\n제작 진실한숲교회\n\n주소 : 대구광역시 달성군 현풍읍 테크노상업로 68, 608호\n\n전자우편 : talent-12@hanmail.net\n\n웹사이트 : www.sincereforest.org\n\n2024년 12월 13일.", "questions": [], "missions": []}];

const SK="pj_v4",FK="pj_fs";

// Migrate old format (string) to new format (array of objects)
function migrateJournal(j){
  const nj={};
  for(const k in j){
    if(typeof j[k]==="string"&&j[k].trim()){
      nj[k]=[{id:Date.now()+Math.random(),text:j[k],date:new Date().toISOString().slice(0,10)}];
    }else if(Array.isArray(j[k])){
      nj[k]=j[k];
    }
  }
  return nj;
}

      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#dce8cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(ch.title)}</div>
        ${ch.subtitle?`<div style="font-size:11px;color:#7a9464;margin-top:2px">${h(ch.subtitle)}</div>`:""}
      </div>
      ${total>0?`<div style="font-size:10px;color:${md===total?"#7a9e5a":"#5a6e48"};font-weight:600;flex-shrink:0">${md}/${total}</div>`:""}
    </button>`;
  });
  el.innerHTML=`<div style="min-height:100vh;background:linear-gradient(175deg,#1a2614 0%,#243318 40%,#1e2a16 100%);padding-bottom:80px">
    <div style="padding:32px 24px 20px;text-align:center;background:linear-gradient(180deg,rgba(60,80,40,0.3) 0%,transparent 100%)">
      <img src="${COVER_IMG}" style="width:180px;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5)">
      <h1 style="font-size:22px;font-weight:700;color:#e8eed8;margin:20px 0 6px;letter-spacing:-0.03em">주님께 기도를 배우다</h1>
      <p style="font-size:13px;color:#8fa878;letter-spacing:0.05em">하나님 나라를 살아내는 기도</p>
      <p style="font-size:12px;color:#6b8058;margin-top:6px">나종현 · 진실한숲교회</p>
    </div>
    <div style="padding:0 24px 16px">
      <div style="background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px">
        <div style="width:44px;height:44px;border-radius:50%;background:conic-gradient(#7a9e5a ${done/27*360}deg, rgba(255,255,255,0.08) 0deg);display:flex;align-items:center;justify-content:center">
          <div style="width:36px;height:36px;border-radius:50%;background:#1e2a16;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#c8d4b8">${done}</div>
        </div>
        <div><div style="font-size:13px;color:#c8d4b8;font-weight:600">나의 기도 여정</div><div style="font-size:11px;color:#7a9464;margin-top:2px">27개 미션 중 ${done}개 참여</div></div>
      </div>
    </div>
    <div style="padding:0 16px 32px">
      <div style="font-size:11px;color:#6b8058;font-weight:600;letter-spacing:0.1em;padding:8px 8px 12px">목차</div>
      ${items}
    </div>
  </div>
  <div style="position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(26,34,18,0.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-around;padding:10px 0 max(10px, env(safe-area-inset-bottom))">
    <button onclick="goHome()" style="background:none;border:none;color:#8fb870;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px"><span style="font-size:20px">📖</span>목차</button>
    <button onclick="goJournal()" style="background:none;border:none;color:#6b8058;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px"><span style="font-size:20px">🙏</span>나의 기도</button>
  </div>`;
}

function renderSermonText(text){
  return text.split("\n").filter(p=>p.trim()).map(p=>{
    const t=p.trim();
    if(HEADINGS.has(t))return`<h3 style="font-size:${fontSize+2}px;font-weight:700;color:#a8c888;margin:32px 0 14px;letter-spacing:-0.02em">${h(t)}</h3>`;
    const indent=t.startsWith('"')||t.startsWith('\u201C')?"0":"0.5em";
    return`<p style="margin:0 0 14px;text-indent:${indent}">${h(t)}</p>`;
  }).join("");
}

function renderChapter(el){
  const ch=BOOK_DATA[chIdx];
  const tabs_arr=[{id:"sermon",l:"설교"}];
  if(ch.questions.length>0)tabs_arr.push({id:"questions",l:"질문"});
  if(ch.missions.length>0)tabs_arr.push({id:"missions",l:"기도실습"});
  let tabsHtml=tabs_arr.length>1?`<div style="display:flex;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(35,45,30,0.5)">${tabs_arr.map(t=>`<button onclick="setTab('${t.id}')" style="padding:12px 16px;font-size:13px;font-weight:${tab===t.id?700:400};color:${tab===t.id?"#b8d498":"#6b8058"};background:none;border:none;cursor:pointer;border-bottom:${tab===t.id?"2px solid #7a9e5a":"2px solid transparent"}">${t.l}</button>`).join("")}</div>`:"";
  let rightBtn="";
  if(tab==="sermon"){
    const sizes=[13,14,15,16,17,18,20];
    rightBtn=`<div style="position:relative"><button onclick="toggleFont(event)" style="background:rgba(122,158,90,0.2);border:1px solid rgba(122,158,90,0.25);border-radius:8px;padding:5px 10px;font-size:12px;color:#c8d4b8;cursor:pointer;display:flex;align-items:center;gap:4px"><span style="font-size:14px">가</span><span style="font-size:10px;opacity:0.7">${fontSize}</span></button>${fontOpen?`<div style="position:absolute;right:0;top:calc(100% + 6px);background:rgba(40,52,32,0.98);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:8px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.5);min-width:180px"><div style="font-size:11px;color:#7a9464;padding:4px 8px 8px;font-weight:600">글자 크기</div><div style="display:flex;align-items:center;gap:8px;padding:4px 8px"><button onclick="chgFs(-1)" style="background:rgba(255,255,255,0.08);border:none;border-radius:6px;width:32px;height:32px;font-size:16px;color:#c8d4b8;cursor:pointer;display:flex;align-items:center;justify-content:center">−</button><div style="flex:1;text-align:center"><span style="font-size:${fontSize}px;color:#c8d8b4">가나다</span></div><button onclick="chgFs(1)" style="background:rgba(255,255,255,0.08);border:none;border-radius:6px;width:32px;height:32px;font-size:16px;color:#c8d4b8;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button></div><div style="display:flex;justify-content:center;gap:4px;padding:8px 8px 4px;flex-wrap:wrap">${sizes.map(s=>`<button onclick="setFs(${s})" style="width:26px;height:26px;border-radius:6px;border:${fontSize===s?"1px solid #7a9e5a":"1px solid rgba(255,255,255,0.08)"};background:${fontSize===s?"rgba(122,158,90,0.25)":"rgba(255,255,255,0.04)"};color:${fontSize===s?"#c8d4b8":"#6b8058"};font-size:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center">${s}</button>`).join("")}</div></div>`:""}</div>`;
  }
  let content="";
  if(tab==="sermon"){
    content=`<div style="font-size:${fontSize}px;line-height:1.85;color:#c8d8b4;word-break:keep-all;transition:font-size 0.2s">${renderSermonText(ch.sermon)}</div>`;
  }else if(tab==="questions"){
    content=`<p style="font-size:13px;color:#8fa878;margin-bottom:16px">이 질문들을 가지고 자신의 기도 생활을 돌아보세요.</p>`+ch.questions.map((q,i)=>`<div style="background:rgba(255,255,255,0.05);border-radius:14px;padding:18px;border:1px solid rgba(122,158,90,0.15);margin-bottom:16px"><div style="font-size:12px;color:#7a9e5a;font-weight:700;margin-bottom:8px">질문 ${i+1}</div><div style="font-size:14px;line-height:1.75;color:#c8d8b4;word-break:keep-all">${h(q)}</div></div>`).join("");
  }else if(tab==="missions"){
    content=`<p style="font-size:13px;color:#8fa878;margin-bottom:16px">예시 기도문을 읽고, 나만의 기도문을 작성해 보세요.</p>`+ch.missions.map((m,i)=>{
      const prayers=getPrayers("m"+m.number);
      const cnt=prayers.length;
      return`<button onclick="goMissionByNum(${m.number})" style="background:${cnt?"rgba(122,158,90,0.12)":"rgba(255,255,255,0.05)"};border:${cnt?"1px solid rgba(122,158,90,0.3)":"1px solid rgba(255,255,255,0.08)"};border-radius:14px;padding:16px 18px;cursor:pointer;text-align:left;width:100%;margin-bottom:12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:#a8c888">Mission ${m.number}</span>${cnt?`<span style="font-size:11px;color:#7a9e5a;font-weight:600">✎ ${cnt}편 작성</span>`:""}</div><div style="font-size:12px;color:#8a9e78;line-height:1.5">${h(m.text.split("\n")[0].substring(0,60))}...</div></button>`;
    }).join("");
  }
  el.innerHTML=`<div style="min-height:100vh;background:linear-gradient(175deg,#1a2614 0%,#243318 40%,#1e2a16 100%)"><div style="position:sticky;top:0;z-index:50;background:rgba(35,45,30,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:14px 16px;gap:12px;min-height:56px"><button onclick="goHome()" style="background:none;border:none;color:#c8d4b8;font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1">←</button><div style="flex:1;font-size:16px;font-weight:600;color:#e8eed8;letter-spacing:-0.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h(ch.title)}</div>${rightBtn}</div>${tabsHtml}<div style="padding:20px 20px 40px">${content}</div></div>`;
}

function renderMission(el){
  const m=mission,key="m"+m.number;
  const prayers=getPrayers(key);
  exampleVisible=true;
  const exHtml=m.text.split("\n").filter(p=>p.trim()).map(p=>`<p style="margin:0 0 10px">${h(p)}</p>`).join("");
  let prayerList="";
  if(prayers.length>0){
    prayerList=`<div style="margin-bottom:20px"><div style="font-size:12px;color:#7a9464;font-weight:600;margin-bottom:12px;letter-spacing:0.05em">나의 기도문 (${prayers.length}편)</div>`+
    prayers.map((p,i)=>`<div style="background:rgba(255,255,255,0.05);border-radius:14px;padding:16px 18px;border:1px solid rgba(122,158,90,0.15);margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;color:#6b8058">${fmtDate(p.date)}</span>
        <div style="display:flex;gap:8px">
          <button onclick="startEdit('${key}','${p.id}')" style="background:none;border:none;font-size:12px;color:#8fa878;cursor:pointer;padding:2px 6px">수정</button>
          <button onclick="deletePrayer('${key}','${p.id}')" style="background:none;border:none;font-size:12px;color:#8a6050;cursor:pointer;padding:2px 6px">삭제</button>
        </div>
      </div>
      <div style="font-size:14px;line-height:1.75;color:#c8d8b4;word-break:keep-all;white-space:pre-wrap">${h(p.text)}</div>
    </div>`).join("")+`</div>`;
  }
  el.innerHTML=`<div style="min-height:100vh;background:linear-gradient(175deg,#1a2614 0%,#243318 40%,#1e2a16 100%)"><div style="position:sticky;top:0;z-index:50;background:rgba(35,45,30,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:14px 16px;gap:12px;min-height:56px"><button onclick="backToChapter()" style="background:none;border:none;color:#c8d4b8;font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1">←</button><div style="flex:1;font-size:16px;font-weight:600;color:#e8eed8">Mission ${m.number}</div></div>
  <div style="padding:20px 20px 40px">
    <button onclick="toggleExample()" style="display:flex;align-items:center;justify-content:space-between;width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;cursor:pointer;margin-bottom:16px"><span style="font-size:13px;font-weight:600;color:#a8c888">예시 기도문 <span id="exLabel">접기</span></span><span id="exArrow" style="font-size:16px;color:#7a9464;display:inline-block;transform:rotate(180deg);transition:transform 0.3s">▾</span></button>
    <div id="exampleBox" style="background:rgba(122,158,90,0.08);border-radius:14px;padding:20px 18px;border:1px solid rgba(122,158,90,0.15);margin-bottom:20px;max-height:400px;overflow-y:auto"><div style="font-size:11px;color:#7a9e5a;font-weight:700;margin-bottom:12px;letter-spacing:0.05em">${h(m.topic)}</div><div style="font-size:14px;line-height:1.85;color:#b8c8a4;word-break:keep-all">${exHtml}</div></div>
    ${prayerList}
    <button onclick="startNew()" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:rgba(122,158,90,0.15);border:1px dashed rgba(122,158,90,0.4);border-radius:14px;cursor:pointer;font-size:14px;color:#a8c888;font-weight:600">
      <span style="font-size:18px">+</span> 새 기도문 작성하기
    </button>
  </div></div>`;
}

function renderEdit(el){
  const m=mission,key="m"+m.number;
  let existing=null;
  if(editingPrayer&&editingPrayer.id){
    existing=getPrayers(key).find(p=>String(p.id)===String(editingPrayer.id));
  }
  const val=existing?existing.text:"";
  const isNew=!existing;
  const title=isNew?"새 기도문 작성":"기도문 수정";
  const today=new Date().toISOString().slice(0,10);
  const ds=fmtDate(existing?existing.date:today);

  el.innerHTML=`<div style="min-height:100vh;background:linear-gradient(175deg,#1a2614 0%,#243318 40%,#1e2a16 100%)"><div style="position:sticky;top:0;z-index:50;background:rgba(35,45,30,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:14px 16px;gap:12px;min-height:56px"><button onclick="cancelEdit()" style="background:none;border:none;color:#c8d4b8;font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1">←</button><div style="flex:1;font-size:16px;font-weight:600;color:#e8eed8">${title}</div><button id="saveBtn" onclick="savePrayer()" style="background:rgba(122,158,90,0.2);border:1px solid rgba(122,158,90,0.3);border-radius:8px;padding:6px 14px;font-size:12px;color:#c8d4b8;font-weight:600;cursor:pointer">저장</button></div>
  <div style="padding:20px 20px 40px">
    <div style="background:rgba(255,255,255,0.04);border-radius:14px;border:1px solid rgba(255,255,255,0.1);overflow:hidden">
      <div style="padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:700;color:#c8d8b4">Mission ${m.number} — 나의 기도</span>
        <span style="font-size:11px;color:#6b8058">${ds}</span>
      </div>
      <textarea id="prayerInput" placeholder="이곳에 나만의 기도문을 작성해 보세요.&#10;&#10;예시 기도문을 참고하되, 자신만의 진실한 언어로 하나님께 말씀드려 보세요." style="width:100%;min-height:300px;padding:16px 18px;background:transparent;border:none;outline:none;resize:vertical;font-size:15px;line-height:1.85;color:#d4e0c4;word-break:keep-all;box-sizing:border-box">${h(val)}</textarea>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="savePrayer()" style="background:rgba(122,158,90,0.25);border:1px solid rgba(122,158,90,0.4);border-radius:12px;padding:12px 32px;font-size:14px;color:#c8d4b8;font-weight:600;cursor:pointer">${isNew?"기도문 저장하기":"수정 저장하기"}</button>
    </div>
  </div></div>`;
}

function renderJournal(el){
  const allPrayers=[];
  BOOK_DATA.forEach(ch=>{ch.missions.forEach(m=>{
    const key="m"+m.number;
    getPrayers(key).forEach(p=>{allPrayers.push({...p,number:m.number,topic:m.topic,key:key})});
  })});
  allPrayers.sort((a,b)=>a.number-b.number||(a.date||"").localeCompare(b.date||""));
  let content="";
  if(!allPrayers.length){content=`<div style="text-align:center;padding:60px 20px;color:#6b8058"><div style="font-size:40px;margin-bottom:16px">🕊</div><div style="font-size:14px">아직 작성한 기도문이 없습니다.</div><div style="font-size:12px;margin-top:8px;color:#5a6e48">각 챕터의 기도실습에서 기도문을 작성해 보세요.</div></div>`;}
  else{content=allPrayers.map(p=>`<div style="background:rgba(255,255,255,0.05);border-radius:14px;padding:18px;border:1px solid rgba(122,158,90,0.15);margin-bottom:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:12px;color:#7a9e5a;font-weight:700">Mission ${p.number} — ${h(p.topic)}</div><span style="font-size:10px;color:#5a6e48">${fmtDate(p.date)}</span></div><div style="font-size:14px;line-height:1.85;color:#c8d8b4;word-break:keep-all;white-space:pre-wrap">${h(p.text)}</div></div>`).join("");}
  el.innerHTML=`<div style="min-height:100vh;background:linear-gradient(175deg,#1a2614 0%,#243318 40%,#1e2a16 100%)"><div style="position:sticky;top:0;z-index:50;background:rgba(35,45,30,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:14px 16px;gap:12px;min-height:56px"><button onclick="goHome()" style="background:none;border:none;color:#c8d4b8;font-size:22px;cursor:pointer;padding:4px 8px 4px 0;line-height:1">←</button><div style="flex:1;font-size:16px;font-weight:600;color:#e8eed8">나의 기도 모음 (${allPrayers.length}편)</div></div><div style="padding:20px 20px 40px">${content}</div></div>`;
}

// Navigation
function goHome(){screen="home";chIdx=null;mission=null;tab="sermon";fontOpen=false;editingPrayer=null;render()}
function goChapter(i){chIdx=i;screen="chapter";tab="sermon";fontOpen=false;render()}
function goMissionByNum(n){mission=BOOK_DATA.flatMap(c=>c.missions).find(m=>m.number===n);screen="mission";editingPrayer=null;render()}
function goJournal(){screen="journal";render()}
function backToChapter(){screen="chapter";tab="missions";mission=null;editingPrayer=null;render()}
function setTab(t){tab=t;fontOpen=false;render()}
function toggleFont(e){e&&e.stopPropagation();fontOpen=!fontOpen;render()}
function chgFs(d){fontSize=Math.max(12,Math.min(24,fontSize+d));saveFs(fontSize);render()}
function setFs(s){fontSize=s;saveFs(s);fontOpen=false;render()}
function toggleExample(){exampleVisible=!exampleVisible;const b=$("exampleBox"),l=$("exLabel"),a=$("exArrow");if(b)b.style.display=exampleVisible?"block":"none";if(l)l.textContent=exampleVisible?"접기":"보기";if(a)a.style.transform=exampleVisible?"rotate(180deg)":"none"}

// Prayer CRUD
function startNew(){editingPrayer={key:"m"+mission.number,id:null};screen="edit";render()}
function startEdit(key,id){editingPrayer={key:key,id:id};screen="edit";render()}
function cancelEdit(){screen="mission";editingPrayer=null;render()}

function savePrayer(){
  const val=($("prayerInput")?.value||"").trim();
  if(!val)return;
  const key=editingPrayer.key;
  const prayers=getPrayers(key).slice();
  const today=new Date().toISOString().slice(0,10);
  if(editingPrayer.id){
    const idx=prayers.findIndex(p=>String(p.id)===String(editingPrayer.id));
    if(idx>=0){prayers[idx]={...prayers[idx],text:val,updatedAt:today}}
  }else{
    prayers.push({id:Date.now()+Math.random(),text:val,date:today});
  }
  journal[key]=prayers;saveJ(journal);
  const btn=$("saveBtn");
  if(btn){btn.textContent="✓ 저장됨";btn.style.background="rgba(122,158,90,0.4)";setTimeout(()=>{screen="mission";editingPrayer=null;render()},800)}
}

function deletePrayer(key,id){
  if(!confirm("이 기도문을 삭제하시겠습니까?"))return;
  const prayers=getPrayers(key).filter(p=>String(p.id)!==String(id));
  if(prayers.length>0)journal[key]=prayers;else delete journal[key];
  saveJ(journal);render();
}

document.addEventListener("click",function(e){if(fontOpen&&!e.target.closest("[onclick*=toggleFont],[onclick*=chgFs],[onclick*=setFs]")){fontOpen=false;render()}});
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

</script>
</body>
</html>

전혀 다를 수밖에 없습니다.'\n\n생각해 보십시오. 하나님을 믿는다는 것, 즉 그리스도인이 된다는 것은 우리가 어떤 모험에 참여하게 되었다는 뜻입니다. 누구나 걸어가는 그 길이 아니라, 하나님 나라라는 새로운 길을 향해 걸어가도록 선발되었다는 뜻입니다.\n\n만약 그게 사실이라면, 우리는 라이프스타일이 달라질 것이고, 가지고 있는 고민이나 생각도 달라질 수밖에 없지 않을까요? 그래서 기도의 방향도 당연히 전혀 다른 자리에 서 있어야 하는 것입니다.\n\n본능적 기도를 넘어서\n\n그런데, 우리는 아마 대부분 기도를 제대로 배워본 적이 없을지 모릅니다. 그저 내 소원을 열심히 빌고, 마음에서 우러나오는 대로... 어떤 면에서는 '본능'대로 하곤 했습니다.\n\n실제로 기도는 인간 내면에 작동하는 절대자를 향한 '본능'이라서 그것이 가능합니다. 그래서 대부분의 종교에는 기도가 있고, 심지어 무신론자들도 기도를 한다는 조사결과도 있습니다. 미국 무신론자들 중 30퍼센트는 가끔 기도한다고 합니다. 한 마디로 보편적 현상이 '기도'라는 것입니다. 하지만 우리가 아무리 복음을 듣고, 예수님을 믿는다고 고백했어도, 계속해서 본성에 기대어 기도하다 보면 자기중심성을 그대로 붙들는 이야기들을 주장할 뿐이고, 자연스럽게 한국적인 샤머니즘적 정서 속에서 기도가 혼합되는 일이 벌어지게 됩니다. 결국 성경이 말하는 진정한 기도에 도달하지 못하게 되는 것입니다.\n\n하나님 나라의 기도자로 부르심\n\n하지만 우리가 기도하는 이유는 우리가 그리스도 안에서 하나님의 백성으로 선발되었기 때문입니다. 깨진 세상에서 하나님 나라로 옮겨진 사람들, 이미 임한 하나님 나라와 아직 오지 않은 하나님의 나라 사이에 서 있는 독특한 정체성 때문에 시작되는 것이 바로 우리의 기도입니다.\n\n그런 면에서 우리는 기도를 다시 배울 필요가 있습니다. 특히 하나님 나라에 초대된 백성들이기 때문에 가능하게 된 놀라운 특권이라는 점에서 말입니다. 하나님이 우리와 영원토록 함께 하시기로 결정하셨습니다. 이게 정말 사실이라면, 우리 인생에는 아주 특이한 결과가 만들어질 수밖에 없습니다.\n\n이렇게 하지 말라: 위선자의 기도\n\n먼저, 마태복음 6장 5절을 보겠습니다.\n\n\"너희는 기도할 때에 위선자들처럼 하지 말아라. 그들은 사람에게 보이려고, 회당과 큰 길 모퉁이에 서서 기도하기를 좋아한다. 내가 진정으로 너희에게 말한다. 그들은 자기네 상을 이미 다 받았다.\"\n\n첫째는 위선자들처럼 하지 말라고 하십니다. 예수님 당시 유대인들은 하늘을 향해 두 팔을 편 채로 기도하곤 했는데, 어떤 사람들은 사람에게 보이려고 넓은 광장에 나가서 했다고 합니다. 실제로 신앙 공동체 안에서 '기도 많이 하는 사람', 혹은 '기도 잘하는 사람'은 사람들에게 '칭찬' 받곤 합니다. 하루에 2시간 이상 기도한다, 어떤 분은 가는 곳마다 자신은 6시간씩 기도한다고 말하기도 합니다. 결국 위선자가 된다는 것은 마치 연극하는 사람이 무대 위에 올라가서 혼신의 연기를 하는 것과도 같습니다. 무슨 말입니까? 무대 위에서의 모습이 꼭 그 사람의 진짜 모습은 아닐 수 있다는 것입니다. 아니, 아닐 확률이 훨씬 높은 것이지요.\n\n우리는 간혹 기도하는 것조차도 '다른 사람 눈치' 때문에 하곤 합니다. 사람들이 뭐라고 할까봐, 새벽기도 나오고, 나름의 직분이나 체면 때문에라도 사람들에게 영성이 있다는 소리, 신실하다는 말을 듣고 싶은 것입니다. 이런 기도의 문제는 하나님을 의식하는 게 아니라, 사람을 의식하는 기도라는 것입니다. 즉, 처음부터 원하는 것은 하나님이 아니라, 사람의 관심이었다는 것입니다. 그래서 이 기도로 받을 것은 그저 딱 '사람의 관심' 뿐이라고 말씀하십니다. 주님이 그러시지요. 이미 자기의 상을 받았다고. 자기가 원하는 게 딱 그것이었으니까, 그것 받은 것으로 끝난 것이라고 말입니다.\n\n이렇게 하지 말라: 이방인의 기도\n\n다음으로, 마태복음 6장 7절을 보겠습니다.\n\n\"너희는 기도할 때에, 이방 사람들처럼 빈말을 되풀이하지 말아라. 그들은 말을 많이 하여야만 들어주시는 줄로 생각한다.\"\n\n두 번째 하지 말아야 할 기도는 '빈말을 되풀이하는 기도'입니다. 이것은 이방인들의 기도, 즉 타종교의 기도라고 할 수 있을 텐데... 그렇다면 대체 왜 빈말을 할까요? 간단합니다. 자기가 믿는 절대자에게 쏟는 시간과 에너지로 '감동'시키겠다는 의도인 것입니다. 이것을 가장 잘 보여주는 예가 엘리야와 바알 선지자의 싸움에서 등장합니다. 바알 선지자들은 아침부터 낮까지 '바알이여 응답하소서' 계속 외치다가 응답이 없으니까 이제는 칼로 자해를 하기까지 합니다. 왜 그랬을까요? 신을 감동하거나 동정심을 유발하려고 한 것입니다. \"이렇게까지 하는데 제 말을 들어주세요.\"\n\n그런데 주님은 우리의 기도는 이런 것과 전혀 다르다고 말씀하십니다. 이런 것을 하지 말라고 하십니다. 여기서 중요한 것은, '반복'을 할 필요가 없다는 것이 아닙니다. 예수님도 겟세마네 기도할 때에 세 번이나 같은 기도를 드렸었고, 바울도 육체의 가시를 제거해 달라고 반복해서 기도했다고 이야기합니다. 우리가 하나님의 이름을 반복해서 부르고, 그 분께 드리고 싶은 진정한 속마음을 반복해서 이야기하는 것은 그 자체로 문제가 아닙니다. 진짜 문제는 진실한 마음으로가 아니라 그저 아무 생각 없이 시간을 때우기 위해 하는 반복! 즉 빈말을 반복하는 것입니다. 내 정성을 보이고 싶어서, 어떤 분량을 채우려고 하는 아무 생각 없는 '빈말'! 비인격적인 언어, 어떤 면에서는 기계적인 기도를 멈추라는 것입니다.\n\n이렇게 기도하라: 은밀한 중에 계신 아버지께\n\n그렇다면, 어떻게 기도해야 할까요? 주님은 5절에서 위선자처럼 기도하지 말라고 하시고는 6절에 이렇게 말씀하셨습니다.\n\n\"너는 기도할 때에 골방에 들어가 문을 닫고서, 숨어서 계시는 네 아버지께 기도하여라. 그리하면 숨어서 보시는 너의 아버지께서 너에게 갚아 주실 것이다.\"\n\n그러므로 우리 기도의 첫 걸음은 '사람의 관심'은 끄고, '다른 모든 의도'는 내려놓고, 숨어서 계시는 우리 아버지께 집중하는 것입니다. 그저 하나님께만 집중하라는 것입니다. 나 자신의 욕망에 몰두하는 기도는 이방인의 기도입니다. 하나님은 우리 기도의 대상이지 수단이 아니라는 것을 알아야 합니다. 그저 내가 원하는 것을 이루기 위해서, 필요한 것을 받아내기 위해서 그 분을 이용하는 것은 우상숭배적 기도입니다. 위선적 기도 역시도 하나님을 이용해서 내 인정욕구를 채우는 것에 불과합니다. 우리가 해야 할 기도는 그런 것이 아닙니다. 오히려 하나님께 집중하고, 그 분을 알아가는 것입니다. 그래서 주님은 '골방'에 들어가라고 하십니다. 다른 관심은 다 끌 수 있는 환경! 오직 주님께만 집중할 수 있는 내적 상태를 준비하라는 것입니다. 물론 가급적 격리된 공간이면 좋긴 하지만, 꼭 그것이 아니더라도, 충분히 하나님께 집중할 수 있다면 골방이 될 수 있습니다. 자동차 안이나 지하철도 될 수 있고, 사무실에서 귀에 이어폰을 끼고, 백색소음을 틀어놓고 집중하는 기도를 드릴 수도 있습니다.\n\n하나님께 집중하는 기도\n\n문제는 우리의 관심사가 너무 많다는 것입니다. 염려와 불안과 고민거리가 가득합니다. 하나님만 집중하려고 해도, 하나님 그 분을 바라보기보다 그 분을 어떻게든 이용해서 내 염려와 불안! 각종 고민을 해결하고 싶은 마음이 더 강렬하게 올라옵니다. 골방으로 들어가는 것이 아니라, 세상 문제에 문을 활짝 열어놓고 기도할 때가 너무 많다는 것이지요. 아마 우리가 골방에서 하는 기도를 제대로 시도하려고 해 보면, 이런 경험을 하게 될지도 모릅니다. 기도시간 내내 골방 문을 닫으려고 애쓰다가 끝나는 것. 그만큼 외부 소리, 내면의 잡담소리를 끊어내는 것이 참 힘듭니다. 하지만 우리가 의도적으로 계속 그렇게 해야 합니다. 하나님만을 찾고, 그 분만 집중하려고 시도하는 것입니다.\n\n하나님을 찾는다는 것\n\n그렇다면 대체 무엇이 하나님을 찾는 것일까요? 하나님을 바라보고 집중한다는 것이 대체 무엇일까요? 기도하는 도중에 하나님이 느껴지고, 가슴이 뜨거워지고 그런 것일까요? 뭔가 신령한 감각이 생기는 일일까요? 그런 것이 아닙니다. 다만 우리가 믿는 것이 하나 있습니다. 하나님은 우리를 너무나 사랑하시는 좋은 아버지이시고, 그 분은 언제나 우리를 향해서 두 팔을 벌리고 환대하고 계신다는 것입니다. 무한하신 하나님을 유한한 인간이 오감으로 느끼는 것은 전혀 자연스러운 일이 아닙니다. 하지만 우리는 하나님이 우리를 주목하고 계시고, 언제나 우리에게 집중하고 있다는 것을 믿습니다. 그래서 우리가 하나님을 찾을 때 할 일은 아주 간단합니다. 내 의지를 담아서 하나님을 깊이 생각하고, 내 마음을 그 분의 생각에 맞추어 가 보는 것입니다. 그래서 성경을 통해 알게 된 그 분을 이야기하고, 찬양하면서! 그 하나님 자체를 간절히 바라는 것입니다.\n\n하나님의 환대하심을 기억하라\n\n우리가 기도하면서 반드시 기억해야 할 이미지가 있는데, 우리는 하나님을 내 옆에 앉혀 놓기 위해서 찾아내려고 열심히 소리칠 필요가 없고, 나를 바라보게 만들려고 착한 척하거나 의로운 사람인 척 노력할 필요가 없다는 것입니다. 우리가 골방으로 들어가는 순간, 이미 그 분은 우리를 주목하고 계시고, 두 팔을 벌리고 환대해주신다는 것입니다. 그래서 그 분을 함께 바라보면 됩니다. 내 안의 소리는 좀 뒤로 던지고, 당장 해결할 문제들도 좀 내려놓고, 하나님 자체를 찬양하는 노래를 불러도 좋고, 하나님이 어떤 분이신지 이야기하는 성경을 암송하는 것도 좋습니다. 너무 수고하고 애쓰기보다는 그저 그 분을 바라보는 편안한 시간이 기도라는 것을 기억하시기 바랍니다.\n\n하나님의 마음을 듣는 기도\n\n이제 두 번째로, 주님은 빈말을 되풀이하지 말라고 하시더니, 이제는 8절에서\n\n\"하나님 너희 아버지께서는 너희가 구하기 전에 너희에게 필요한 것이 무엇인지를 알고 계신다\"\n\n고 말씀하십니다. 즉, 기도할 때 하나님을 자꾸 설득하거나 가르치려고 하지 말고, 하나님께 가만히 귀를 기울이라는 것입니다. 사실 앞에서 말한 내용과도 연결이 되는데, 하나님 자체에 대한 관심보다 내가 받아내야 할 기도의 응답에 초점이 맞춰 있다보니까 우리가 기도하다보면 하나님을 가르치고 설득하려고 듭니다. 자꾸 응답이 없다고, 왜 일을 안하시냐고, \"하나님, 이래야 되지 않겠습니까?\" 하지만 잘 기억하십시오. 하나님은 우리가 구하기도 전에 무엇이 필요한지 아십니다. 우리 아버지도 우리가 처한 모든 상황을 이미 다 아신다는 것입니다. 그래서 우리가 기도해야 할 방향은 아버지께 잘 말해서 설득하는 것이 아닙니다. 어차피 하나님은 자신의 권세와 능력으로 우리의 필요를 채워주실 것이라고 믿어도 좋습니다. 그래서 주님이 그러셨지요. \"하늘의 나는 새를 보아라. 들에 핀 백합화를 보아라. 저런 것들도 입히고 먹이시는데 하물며 너희들일까보냐.\" 그래서 우리는 하나님의 마음을 헤아리고, 그 분의 의도와 계획을 묻는 자리에 있어야 하는 것입니다. 대체 하나님은 왜 이런 시간들을 우리에게 주시고, 어떤 선한 의도를 이루려고 하시는지 묻고, 듣는 기도를 해야 한다는 것입니다.\n\n결코 자기 혼자 말하고 떠나지 마십시오. 부모와 자녀가 대화를 시작했는데, 아들이 열심히 자기 할 말만 하고, 요구만 하다가 자기 할 말 끝났다고 나가버리면 얼마나 서운하겠습니까? 우리가 기도할 때도 그렇습니다. 열심히 부르짖고, 떠들다가 하나님이 이제 뭔가 말하려고 하시는데, \"예수님의 이름으로 기도합니다. 아멘\" 하고 나가버리면 이것은 선 넘은 것입니다. 우리가 기도할 때, 일정 부분 침묵의 시간을 두는 것이 필요합니다. 실은 너무 말 많이 하려고 하니까 힘들지요. 어떻게든 미사여구를 동원해서 하나님을 설득하려고 하니까 기도가 힘에 부치는 것입니다. 그럴 필요 없습니다. 나를 너무나 사랑하셔서, 사랑의 눈으로 나를 불쌍히 여기시는 주님 앞에 가만히 앉아있어도 되는 것입니다. 그저 그 분 앞에 진실하게 서 있으려고 애써보는 것입니다. 잡생각이 날 때마다 다시 하나님의 이름을 부르고, \"내가 여기 서 있습니다.\" 하는 것입니다.\n\n올바른 기도의 놀라운 유익\n\n만약 우리가 이방인의 기도가 아니라, 주님이 가르쳐주신 대로 기도하다보면! 우리의 아버지께 집중하고, 그 분을 더 알아가기 위한 기도를 하다보면 놀라운 유익이 있습니다. 사도바울이 에베소 교회 성도들을 위해 기도했던 기도문을 보겠습니다. 에베소서 1:16-18입니다.\n\n\"여러분을 두고 끊임없이 감사를 드리고 있으며, 내 기도 중에 여러분을 기억합니다. 우리 주 예수 그리스도의 하나님이신 영광의 아버지께서 지혜와 계시의 영을 여러분에게 주셔서, 하나님을 알게 하시고, [여러분의] 마음의 눈을 밝혀 주셔서, 하나님의 부르심에 속한 소망이 무엇이며, 성도들에게 베푸시는 하나님의 영광스러운 상속이 얼마나 풍성한지를, 여러분이 알게 되기를 바랍니다.\"\n\n무엇이라고 말합니까? \"하나님을 알게 되고\" \"마음의 눈을 밝혀서, 하나님의 부르심에 속한 소망이 무엇이고, 영광스러운 상속이 얼마나 풍성한지를 알게 된다\"는 것입니다. 아까 주님은 '골방에 들어가서 숨어 계시는 아버지께' 기도하라고 하셨는데, 숨어계신 것 같은 아버지가 우리 앞에 환히 드러나는 일이 벌어진다는 것입니다. 분명히 말하지만, 우리가 받을 기도의 상급! 기도를 통해 누릴 수 있는 최고의 응답은 다른 것이 아닙니다. 겨우 돈, 성공, 형통함으로 엿 바꿔 먹으려 하지 마십시오. 우리에게 최고의 상급은 바로 하나님 자신이니까요. 우리가 하나님을 아는 것만큼 풍성한 삶을 줄 수 있는 것은 이 세상에 없습니다.\n\nCS 루이스는 스크루테이프의 편지에서 \"악마가 가장 무서워하는 기도\"에 대해서 이렇게 얘기합니다.\n\n\"만에 하나 네 환자가(인간이) [자기 머리 속에 존재하는 하나님]이 아니라 [하나님 자신이 알고 계신 하나님]을 향해 의식적으로 기도의 방향을 돌리면 우리는 궁지에 빠지게 된다.\"\n\n무엇이라고 말합니까? 우리의 기도가 한낱 우리의 이해와 인식의 범주에 갇혀있는 하나님을 향해 있을 때에는 마귀는 전혀 무서워하지 않는다는 것입니다. 그런데 진짜 무서운 기도는 우리가 '하나님 자신이 알고 계신 하나님'을 향해 기도하게 될 때! 살아서 역사하시는 진짜 하나님을 알게 되어서 그 분께 올바른 기도를 드릴 때 마귀는 무서워 떨게 된다는 것입니다. 그리고 바로 그것이 우리가 주님이 가르쳐주신 기도를 배워야 하는 이유인 것입니다.\n\n새로운 기도의 여정으로\n\n이제 앞으로 차근차근 이 놀라운 기도를 배워갈 것인데, 마치 아이가 부모의 말을 그대로 듣고 따라하는 것처럼, 우리도 주님이 가르쳐주신대로 따라 말하고, 새로운 언어를 배워가는 것입니다.\n\n이제는 본능대로 기도하는 것은 내려놓읍시다. 당연히 본능대로 기도하는 것이 더 쉽고, 이 기도는 어렵고 불편한 면이 있을 것입니다.\n\n하지만 내 맘대로 기도한다고 영성이 깊어지는 일은 거의 없고, 하나님과의 관계가 성장하고 하나님 나라의 능력이 뚜렷해지기도 너무나 어렵습니다. 그저 타종교에서도 추구하는 것처럼... 잠깐 마음 편하고, 위로가 되고 하는 수준에 그치겠지요. 앞으로 직접 입으로 내뱉어 보기도 하고, 기도문도 적어 보면서 훈련하려고 하는데, 적극적으로 참여해 보면 좋겠습니다. 특히 \"마음으로 기도하고 있어요\", 이런 것은 좀 접어둡시다. 내 의식 언저리에 하나님이 떠다닌다고 기도가 아닙니다. 하나님의 임재 안에 들어가서 집중하는 것이 기도이니까요. 골방으로 들어가야 합니다.\n\n진실한 기도로의 초대\n\n그래서 오늘 결단하기를 하루 중 나만의 골방에 반드시 들어가기로 결정하시기 바랍니다. 그리고 하나님께서 묻는 이야기에 대답해 보십시오.\n\n\"너는 나를 누구라고 생각하니?\"\n\n\"네가 진짜로 원하는 게 뭐니, 너의 진짜 속 마음을 얘기해 줘.\"\n\n여기에 대해 진실하게 대답해 보는 것입니다. 우리가 하나님께 진실하게 대답하는 일에 있어서, 기도만큼 훌륭한 방식이 없습니다. 함께 해 나갑시다.\n\n맺는말: 은밀한 자리에서의 만남\n\n존 오웬 목사님이 17세기 당시 영국의 대중의 인기를 얻고 있던 성공가도를 달리던 목회자들에게 했던 이야기로 이 글을 마무리하고자 합니다.\n\n\"목회자는 교인을 모아 예배당을 채우고 성찬예식을 인도하고 대중의 입을 채워줄 수 있을지 모르지만 그의 진면목은 은밀한 가운데 전능하신 하나님 앞에 무릎을 꿇느냐에 달려 있다. 그 이상도 그 이하도 아니다.\"", "questions": ["오늘 하루 동안 나의 기도는 '사람들에게 보이기 위한 것'은 아니었나요? 혹시 다른 사람들의 시선이나 평가를 의식하며 기도했던 순간이 있었나요?", "오늘 기도할 때 하나님께 진정으로 집중했나요? 아니면 나의 걱정과 염려, 욕심이 기도의 중심이었나요?", "기도 중에 하나님의 음성을 듣기 위해 잠잠히 기다리는 시간을 가졌나요? 아니면 내 말만 하고 끝냈나요?"], "missions": [{"number": 1, "topic": "그러므로 너희는 이렇게 기도하라", "text": "제가 기도하기도 전에 이미 두 팔을 벌리고 환영하시는 하나님,\n\n지금까지 제가 드려왔던 기도들을 되돌아 봅니다.\n\n하나님을 대체 어떻게 여기며 기도해 왔던 걸까요?\n\n사람들의 관심에 더 초점을 맞추던 위선자의 기도,\n\n하나님을 어떻게든 감동시켜서 내가 원하는 것을 받아내려는 기도,\n\n형식적이고 기계적인 외움으로 주기도문을 그저 주문으로 만들어 버린 기도, 무엇보다도 하나님의 일하심을 제대로 믿지도, 기대하지도 않아 게을러진 기도...\n\n주님 앞에서 어리석은 모습으로 서 있던 제 모습을 회개합니다.\n\n이제 \"이렇게 기도하지 말고, 이렇게 기도하라\" 가르쳐주시니\n\n차근차근 기도의 모든 방식과 내용과 태도들을 배우고자 합니다.\n\n기도를 배우는 주님의 학생이 되어서, 온전한 기도를 배우게 하소서. 주여, 이 기도들로 저를 빚어주소서."}, {"number": 2, "topic": "그러므로 너희는 이렇게 기도하라", "text": "기도를 가르쳐 주시는 하나님,\n\n어쩌면 그동안 저는 골방을 찾지 않았습니다. 골방으로 들어간다 하면서도 문을 활짝 열어 놓아서 시끄럽고 집중할 수 없었습니다.\n\n이제 골방에 들어가 문을 닫고 은밀히 숨어 계시는 가장 기이한 주님의 얼굴을 찾고자 합니다. 제가 하고 싶은 말만 하고 돌아서는 기도가 아니라 주님이 제게 하시고 싶은 말씀을 듣는 법을 배우는 기도가 되길 원합니다.\n\n이미 나를 주목하시고, 두 팔을 벌리고 환대하시는 주님 앞에 나아가고자 합니다. 내 안에서 들리는 모든 소리들과 욕망, 해결할 문제들은 내려놓고, 하나님 당신과 함께 하는 그 순간을 먼저 사모합니다. 어떻게든 주님을 설득하려 하기보다 하나님께서 제게 던지시는 질문들에 대답하는 기도를 배우기 원합니다.\n\n하나님을 주님이 아셨던 분으로 깨닫게 되고, 나 자신을 하나님이 바라보시는 관점으로 이해하게 하소서. 주여, 골방에서 나를 만나 주소서."}, {"number": 3, "topic": "그러므로 너희는 이렇게 기도하라", "text": "숨어 계시는 하나님,\n\n저는 때때로 주님이 기도를 듣지 않고 계시는 듯한 느낌을 받곤 합니다. 하지만 이제 더 이상 느낌과 감각으로만 알려 하지 않겠습니다.\n\n저의 감각과는 상관없이, 늘 저의 골방에서 듣고 계시고,\n\n나를 향해 눈 마주치고 계시다는 것을 기억하겠습니다.\n\n내 인생 안에서 완전히 자취를 감춘 것처럼 느껴지는 순간이 오더라도 여전히 신실하게 일하시며 들으시는 주님을 향해 기도하겠습니다. 제가 원하는 것을, 오히려 진정 필요한 것으로 응답하시는 주님!\n\n저의 골방에서, 저의 연약함과 고통, 무지함과 결핍을 다루어가시는 주님을 만나기를 소망합니다. 당신을 얻는 것이 가장 큰 선물이니까요."}]}, {"id": 2, "title": "하늘에 계신 우리 아버지여", "subtitle": "마태복음 6:9a", "sermon": "들어가는 말: 기도의 새로운 여정\n\n앞서 이미 나눈 것처럼, 우리가 기도하는 이유는 타종교나 일반 종교성과는 전혀 다른 맥락 속에 있습니다. 그래서 지난 한 주 동안은 '위선자의 기도'를 멈추고, '이방인의 기도'도 그만 하려는 시도를 해왔습니다. 한 마디로 '하나님을 이용해서 내 주장을 관철' 하는 것을 그만두기로 한 것이고, 우리를 그 아들의 나라로 옮겨 주신 하나님을 더 알고 싶고, 그 나라의 삶을 이해하고, 살아내고 싶어서 기도하기 시작한 것입니다. 그래서 만약 정말 제대로 기도한다면, 우리는 하나님을 더 알게 되고, 그 분의 매력에 빠지고 깊은 사랑에 빠지게 될 것이고, 무엇보다도 그 분을 따라서 함께 같은 방식으로 살고 싶어질 수밖에 없습니다.\n\n주기도문: 우리에게 아직 너무 버거워 보이는 옷\n\n주기도문은 지금 당장 우리에게는 딱 맞는 옷은 아닙니다. 오히려 너무 탁월하고, 고차원적이어서 우리 같은 미숙하고 어리석은 자들에게는 버겁고 헐렁합니다. 또 사실은 특별한 각오와 담대함이 필요한 기도이기도 합니다. 왜일까요? 우리가 해야 할 기도의 핵심이 내가 진짜 원하는 것은 내려놓고, 하나님이 원하시는 것을 발견하고! 발견된 그것이 아무리 받아들이기 어렵다고 해도 그것이 결국 이루어지기를 바라는 사람이 되겠다는 내용이기 때문입니다.\n\n한 번 상상을 해보십시오. 정말로 방금 말한 핵심이 응답되면 어떤 일이 벌어질까요? 생각보다 많은 것이 뒤집힐지 모릅니다. 내가 정말 소중하게 여겼던 가치와 생각이 전부 잘못되었다는 게 드러날지도 모르고, 내가 정말 하기 싫었던 것이 오히려 진정으로 나아가야 할 길이라는 것이 선명하게 드러날지도 모릅니다. 어쩌면 기도를 시작하기도 전에 불편할지도 모르고, 거부하고 싶을지도 모릅니다. 하지만 우리가 이 기도에 참여하려는 이유는 확실합니다. 우리는 복음을 믿기 때문입니다. 하나님이 유일한 소망이고 답이라는 것을 정말 믿기 때문입니다.\n\n그리고 마침내 이 기도 안에서 우리의 몸과 마음이 이 옷에 딱 맞도록 결국 자라게 될 것입니다. 엉뚱한 모양으로, 다른 옷에 맞춰진 몸이 아니라, 가장 탁월한 이 옷에 걸맞는 몸이 되는 것입니다.\n\n아버지: 새로운 출애굽의 선언\n\n주님이 가르쳐주신 기도는 '하늘에 계신 우리 아버지'로 시작합니다. 그런데 원문에서는 가장 먼저 등장하는 단어가 '파테르', 곧 '아버지'라는 단어입니다. 그래서 우리는 예수님이 말한 순서에 따라 차근차근 의미를 생각해 보려고 합니다.\n\n먼저, 구약 성경에서 하나님을 '아버지'라는 개념으로 처음 사용한 본문이 있습니다. 출애굽기 4:22-23입니다.\n\n\"너는 바로에게 말하여라. '나 주가 이렇게 말한다. 이스라엘은 나의 맏아들이다. 내가 너에게 나의 아들을 놓아 보내어 나를 예배하게 하라고 하였건만, 너는 그를 놓아 보내지 않았다. 그러므로 이제 내가 너의 맏아들을 죽게 하겠다.'\"\n\n지금 이 상황은 이스라엘이 아직 파라오의 노예였던 시절에 모세를 통해 주신 이야기입니다. 한 마디로 하나님께서는 파라오의 노예들을 자신의 자녀로 삼겠다고 선포하고 있는 것입니다. 그런 면에서 성경이 이야기하는 '아버지와 자녀'라는 이미지는 단지 '친밀감'만 표현하는 것이 아닙니다. 오히려 이것은 비참한 삶에서 해방되고 구원받는 이미지! 즉, 노예로 살아갈 세상에서 벗어나서 자유롭게 살아갈 수 있는 세상으로 옮겨졌다는 구원의 이야기입니다.\n\n주님이 지금 우리에게 '아버지'라고 부르라고 하는 것은 바로 이것 때문입니다. 이전의 출애굽과 같이! 지금 예수님 때문에 새로운 출애굽이 시작되었다는 것입니다.\n\n견습생으로서의 자녀\n\n예수님 당시의 문화는 우리와 많이 달랐습니다. 당시에는 아버지가 목수면, 아들도 무조건 목수였습니다. 아빠가 어부면, 자녀도 어부였습니다. 가업을 잇는 문화 상황인 것이지요. 결국, 그 문화 안에서 '아버지'라는 단어를 들으면 누구나 이런 이해가 있었습니다. 아들은 곧 아버지의 '견습생'인 것입니다. 아들은 아주 어린 시절부터 아빠가 어떻게 살아가는지를 보는데, 대충 보는 것이 아닙니다. 왜냐하면 아버지를 이어나가야 하니까요. 그래서 자세히 봅니다. 그 기술과 방식을 습득하기 위해서 말입니다.\n\n겟세마네에서의 상황이 바로 그 장면이었습니다. 예수님은 하나님 아버지의 견습생으로 그 자리에 있었고, 가장 중대하고 여러운 결정과 각오의 순간에 아버지라면 어떻게 할지를 묻고 있었던 것입니다. 그래서 '아버지'라고 외치며 물었지요.\n\n\"이 길이 맞습니까? 이 잔을 마셔야 합니까?\"\n\n실제로 히브리서 기자는 이 부분에 대해서 '아들이 받으신 고난으로 순종을 배웠다'고 설명합니다. 한 마디로 겟세마네 동산에서의 예수님은 아빠를 보고 배우는 견습생 아들의 이미지였던 것입니다.\n\n아버지의 거대한 프로젝트\n\n그리고 예수님이 주목하고, 깨닫게 된 아버지의 일은 너무나 확실했습니다. 온 세상을 구원하는 일! 그것이 아버지의 거대한 프로젝트였습니다. 하나님이 악으로 가득 찬 세상을 대체 어떻게 해결하시고, 구원을 주시는지! 어떻게 사람을 다시 회복시키고 구원하시는지! 확인하고, 그 프로젝트에 함께 참여하고, 배우는 견습생이 되겠다는 것입니다.\n\n그 방식은 마귀의 방식과는 너무 달랐습니다. 힘과 폭력과 명예로는 도무지 갈 수 없는 방식, 예수님은 그것을 배워가신 것이고, 바로 이 이미지를 담아서 우리에게 하나님을 '아버지'라고 부르라고 하시는 것입니다.\n\n여기서 재미있는 개념이 있습니다. 예수님이 완전한 인간으로 오셨다는 것이 어떤 의미냐면, 예수님은 진짜 인간이 되셨기 때문에 그분 조차도 처음부터 모든 것을 완전하게 이해하고, 다 파악하고 계셨던 것이 아니었다는 것입니다. 오히려 날마다 아버지를 부르면서, 그 분을 아버지로 부른다는 것이 어떤 의미인지를 배워나갔던 것이지요. 인간이 처한 불확실성과 모호함을 주님도 그대로 느끼면서! 진실한 기도로 차근차근 아버지께 묻고 또 물으면서 걸어가야 할 길을 끝까지 걸어간 삶이었던 것입니다.\n\n아버지를 부르는 깊은 의미\n\n물론 우리가 '아버지'라고 부를 때, 그저 \"안녕, 아빠?\" \"나 이제부터 떼를 쓸 겁니다\" 이런 친근함도 어느 정도 포함되긴 합니다. 예수님께서 하나님을 아버지로 누리는 것은 생각보다 훨씬 놀라운 사랑의 관계였던 것이고, 그 안에 우리를 초대하고 싶으신 것이니까요. 그럼에도 그 친근한 사랑 위에 세워진 더 크고 중요한 의미가 있다는 것을 알아야 합니다.\n\n\"아버지, 저는 당신의 프로젝트를 이어나가는 견습생 아들입니다. 견습생 딸입니다. 제가 당신의 가업을 이어나가는 상속자가 되도록 저를 가르쳐 주세요.\"\n\n특히 예수님이 결국 어떤 길을 걸었는지를 볼 때, 이는 놀라운 대범함이 필요한 고백이었습니다. 결국 아버지가 보여주신 길은 십자가에서 죽는 길이었으니까요.\n\n'우리'라는 말의 깊이\n\n그런데 이제 또 하나 확인할 것은 주님은 이 '아버지'를 '우리 아버지'라고 부르라고 가르치고 계신다는 것입니다.\n\n요한일서 5:1을 읽어보겠습니다.\n\n\"예수가 그리스도이심을 믿는 사람은 다 하나님에게서 태어났습니다. 낳아주신 분을 사랑하는 사람은 다 그 분이 낳으신 이도 사랑합니다.\"\n\n본문이 무엇이라고 말합니까? 우리가 예수님을 믿을 때 우리는 하나님의 자녀가 되어서 그 분의 공동체 안에 속하게 된다는 것입니다. 원래는 하나님과 아무런 관계 없던 자들이 모두가 하나님을 아버지라고 부르는 한 형제와 자매가 된다는 것입니다. 한 신학자는 이렇게까지 말했습니다.\n\n\"기도 습관은 오직 다른 이들과의 우정을 통해서만 얻을 수 있다.\"\n\n공동체 안에서의 기도\n\n어쩌면 우리는 그동안 너무 '사적인 신앙', '하나님과의 사적인 관계'만을 강조했을지 모릅니다. 이래나 저래나 하나님과 자신의 관계가 유일하게 중요한 것이라고요. 네. 물론 중요합니다. 그 분과의 인격적 만남은 너무나 소중하고 귀한 것입니다.\n\n하지만, 성경은 이 관계가 단순히 사적관계라고 말하지 않습니다. 오히려 모두가 참여하고 있는 관계라고 말하지요. 더 크고 거대한 그림 안에 한 개인으로서 나를 부르는 그런 이미지인 것입니다. 그런데 여기에 정말 놀라운 의미가 숨어있습니다. 여기 '우리'라는 말 안에는 예수님도 포함되어 있기 때문입니다. 우리의 가장 큰 형, 가장 큰 오빠로 계신 분! 가장 먼저 아버지와 깊은 사랑을 나누신 분이 포함된 '우리'라는 것입니다.\n\n우리에게 주는 위로\n\n그리고 바로 이것이 우리에게 엄청난 위로를 줍니다. 생각해 보십시오. 우리는 간혹 스스로를 별로 그리스도인답지 못하다고 느끼곤 합니다. 스스로 보기에도 그리스도인답게 행동하지 못하는 것처럼 보이고, 믿음도 부족해 보일 때가 있지요. 그래서 어떤 경우엔 우리가 이런 기도를 할 자격이 있는가 하는 생각도 합니다. 그런데, 우리가 하나님과 맺는 관계는 처음부터 나의 느낌이나 행위나 내가 얼마나 굳건한 의지로 믿느냐에 달린 것이 아니라는 것입니다. 그것이 기초가 아니라는 것입니다. 우리가 지금 하나님과 특별한 관계가 된 것은 오직 하나님이 교회와 여러 형제 자매들을 통해서! 예수 안에서! 우리를 택했기 때문이라는 것입니다.\n\n함께 드리는 기도\n\n요한계시록 19장을 보면, 땅에서 영적 전쟁이 벌어지고, 하나님께 탄원하는 기도가 올려질 때, 하늘에서는 허다한 무리가 함께 찬양하고 함께 기도하는 장면을 보여줍니다. 그래서 우리가 꼭 알아야 할 것이 있습니다.\n\n우리는 혼자 기도하는 것이 아닙니다. 온 성도들이 우리의 기도를 돕고 있는 것입니다. 동시에 그리스도께서 우리를 중보하시고, 성령께서도 말할 수 없는 탄식으로 우리를 도우시는 것입니다. 그래서 우리도 마찬가지로 서로를 위해서, 서로를 지지하고 연대하면서 기도하는 것입니다. 함께 서 있는 이 작은 공동체 안에서 우리라는 이름으로 기도해 나가는 것이고, 이 수준에서 멈추는 것이 아니라 한국교회와 온 세계에까지 넓어지는 것입니다. 바로 그 자리에서 우리의 이기성은 점점 극복되고, 나 중심적인 기도를 넘어서게 될 것입니다.\n\n하늘에 계신: 하나님의 초월성\n\n이제 마지막으로, 살펴볼 것은 우리 아버지가 바로 하늘에 계시다는 개념인데, 여기서 말하는 '하늘'은 하나님이 거하시는 처소를 말합니다.\n\n그런데 생각해 보면, 사실 우리는 하나님이 어디에나 계신다는 고백을 드리곤 합니다. 그 분은 무소부재하다는 교리를 믿으니까요. 그런데 놀랍게도 이 기도는 우리의 일반적인 이해와는 다르게 하나님이 아주 특정한 자리에 있다는 것을 기억하라고 요구하는 것처럼 보입니다.\n\n대체 왜 하늘에 계신다고 할까?\n\n대체 왜 이렇게 기도하라고 했을까요? 대부분의 종교인들이나 기도하는 사람들은 기도의 대상을 이 땅에서 찾습니다. 사람들은 언제나 '하나님'을 우리가 사는 '이 땅'에 있는 무언가에서 힌트를 찾고 싶어 한다는 것입니다. 그래서 하나님에 대한 이해를 강력한 '돈'에서 찾고 싶어하고, '권력'에서 찾고 싶어하고, 그 외에 아름답고 좋아 보이는 것들을 전부 '신'으로 여기는 일이 벌어지는 것입니다. 지금도 사람들은 대부분 이 땅에서 명성을 떨치고 있는 유튜브나 넷플릭스에 몰두하고 있고, 자기 일들과 삶에 바빠서 도무지 하늘을 쳐다볼 줄 모릅니다. 특히 대한민국처럼 종교성이 줄어든 나라는 전 세계적으로 드뭅니다.\n\n하늘을 향한 시선\n\n그래서 그리스도인들도 늘 골방 문을 닫지 못하고, 어떻게든 문을 활짝 열어 놓고, 내가 서 있는 그 자리에서! 눈에 보이는 땅의 현실에서 하나님을 찾으려고 시도하는 일이 벌어지곤 합니다. 그러니 기껏 기도 응답 받았다는 것이 전부 '돈'이나 '성공' 아닙니까? 하늘에 계신 하나님을 찾은 적이 없으니까, 기껏해야 땅에 있는 '유사 하나님'을 찾아내고 기뻐하는 것입니다. 그런 기도를 정말 하나님이 아시는 하나님을 향한 기도라고 볼 수 있을까요? 그저 자기가 만들어낸 하나님을 향해 드리는 우상숭배적 기도에 불과할 것입니다. 결국, 도무지 하늘에 있는 '기이하신 분'을 마주칠 기회는 없어지는 것입니다. 우리가 '하늘에 계신 분'께 기도한다는 것이 무엇이냐면, 하나님을 자기 취향에 맞게 길들이고, 이 땅에서 하나님 대체품을 찾으려는 시도를 멈추라는 것입니다. 하나님은 우리가 이 땅에서 간절히 소망하는 것에 대한 희미한 반영 따위가 아니라는 것입니다. 하나님은 여기 사시는 분이 아니고, 하늘에서 다스리시는 분이니까요.\n\n하나님의 놀라운 강림\n\n그런데 바로 여기에서 꼭 기억해야 할 놀라운 진리가 있습니다. 하나님은 그토록 머나먼 하늘에 숨어 계신 분인데, 실상 우리에게 너무나 가까이 오고 싶으셨다는 것이고, 그 결과 그리스도께서 이 땅에 인간의 모습으로 오셨다는 사실입니다. 즉, 하나님은 자기의 거처를 그저 하늘에 두길 원하지 않았다는 것이고, 사랑하는 우리와 함께 하기 위해 자기 자리를 그리스도의 인격 안에 두셨다가!! 마침내 우리 모두의 안에! 두시기로 결정하셨다는 사실입니다.\n\n맺는말: 주기도문의 첫 고백\n\n지금까지 '하늘에 계신 우리 아버지'라 외치는 주기도의 첫 마디를 살펴보았습니다. 이 기도는 분명 우리의 큰 형님 되신 그리스도께서 이미 누리고 계시는 관계와 삶 속에서 드리는 내용입니다.\n\n이 첫 마디에는 다음과 같은 깊은 의미들이 담겨 있습니다:\n\n- 노예 된 우리가 자녀가 되었다는 이해\n\n- 더 이상 이전의 삶이 아니라, 새로운 나라의 삶을 향해 급히\n\n달려가겠다는 이미지\n\n- 나 혼자만의 의와 자격 때문에 시작되는 기도가 아니라, 그리스도\n\n안에서 우리 모두가 함께 서 있는 이미지\n\n- 이 땅에서 찾을 수 있는 분이 아니라, 기이한 곳에 계신 유일한\n\n하나님을 향해 드리는 기도\n\n- 그 분이 사실 우리와 너무나 함께 하고 싶으셔서 가까이 오신 것에\n\n대한 감격이 담긴 기도\n\n새로운 기도로의 초대\n\n우리에게 생소할 수 있지만, 이번 한 주 동안 차근차근 미션을 해 나가면서 하늘에 계신 우리 아버지를 마치 주님이 하신 것처럼 부르게 되는 은혜가 있기를 바랍니다. 그래서 우리는 이 놀라운 감격과 은혜로 '하늘에 계신 우리 아버지'를 부르는 것입니다. 이것은 단순한 호칭이 아니라, 우리의 정체성과 소망, 그리고 하나님의 놀라운 사랑이 모두 담긴 고백입니다.\n\n이 기도는 우리를 더 깊은 하나님과의 관계로, 더 진실한 제자의 길로 초대합니다. 비록 지금은 이 기도가 우리에게 너무 크게 느껴질지라도, 우리는 이 기도를 통해 성장할 것입니다. 그리고 마침내 우리도 예수님처럼 하늘에 계신 우리 아버지를 알고, 사랑하고, 섬기는 참된 자녀가 될 것입니다.", "questions": ["당신은 평소에 하나님을 어떤 분으로 생각하고 계신가요? '아버지'라고 부를 때와 '하나님' 혹은 '주님'이라고 부를 때, 마음가짐이나 느낌에 차이가 있나요?", "당신의 삶에서 '애굽'이라고 할 수 있는 곳(상황, 습관, 관계 등)은 어디인가요? 그곳에서 벗어나기 위해 '재빨리 먹고 급히 떠나는' 결단이 필요한 부분은 무엇인가요?", "하나님의 '견습생'으로서, 지금 당신이 배우고 있는 하나님의 일은 무엇인가요? 예수님이 십자가를 지시기까지 하나님의 뜻에 순종하셨던 것처럼, 당신에게 가장 어렵지만 순종해야 할 부분은 무엇인가요?"], "missions": [{"number": 4, "topic": "하늘에 계신 우리 아버지", "text": "하나님 우리 아버지,\n\n그저 세상의 노예로 묶인 채로, 그저 흐름에 맡긴 채 살 수 밖에 없던 우리를 '아들'이라고, '자녀'라고 불러주시니 그 은혜에 감사합니다. 이제 더 이상 이전의 삶과 습관의 자리에 머물러 있지 않겠습니다. 아버지라 외치며, 급히 당신의 나라로 매일 한 걸음을 내딛겠습니다.\n\n예수님도 매일 고난을 통해 순종을 배우시고, 아버지의 견습생으로 사셨지요. 저에게 일어나는 순간순간의 현실들과 고난 속에서도 아버지를 부르며, 바라보며, 배워가고, 닮아가게 하소서.\n\n우리는 아버지가 진정 아버지답다는 것이 무엇인지도 제대로 모르지만, 가장 선하고 온전하신 아버지를 부를 때마다, 그 따뜻한 아버지를 알아가게 하시고, 온전히 사랑하셔서 보호하시고 인도하시는 분에 대해 깊이 신뢰하게 하옵소서.\n\n아버지, 여기 당신의 아들이 있습니다."}, {"number": 5, "topic": "하늘에 계신 우리 아버지", "text": "우리의 하나님,\n\n지금껏 저는 나 홀로 서서 나만을 위해 기도하는 줄 알았습니다. 그래서 저의 문제, 저의 가족, 저의 상황에 몰두했지요. 때로는 저 자신의 실패와 연약함 때문에 오히려 기도의 자리에 서지 못하기도 했습니다.\n\n하지만 이제 '우리'가 함께 기도하게 되었음을 배웁니다.\n\n저의 큰 형 되신 그리스도께서 함께 '우리'가 되어 주셔서 이 놀라운 기도를 감히 드릴 수 있게 된 것에 감사하며, 저 혼자가 아닌 모든 하나님의 자녀가 함께 기도하고 있음에 감격합니다.\n\n날마다 저의 마음과 시야가 넓어지기를 원합니다.\n\n이기적인 생각과 태도가 사라지고, 진실한 사랑이 범위를 넓혀가길 원합니다. 저의 기도가 더 공동체적이 되게 하시고,\n\n하나님의 세계 전체를 품는 기도가 되도록\n\n주여, 저를 가르치소서."}, {"number": 6, "topic": "하늘에 계신 우리 아버지", "text": "하늘에 계신 하나님,\n\n주님은 제가 상상하기도 어려운 신비한 차원 속에 계십니다.\n\n이 세상에 있는 그 어떤 공간도, 시간도 당신을 담아낼 수\n\n없습니다.\n\n그러나 저는 얼마나 자주 '땅'만 바라본 채 거기서 당신을 찾으려 했는지 모릅니다. 마치 하나님이 피조물 중 하나에 불과한 것처럼 하나님을 파악하려 했던 어리석음을 고백합니다.\n\n오, 주님 저로 하여금 하늘에 계신 당신을 바로 알도록 도와주소서. 저는 지혜와 이해가 부족하지만, 당신이 스스로를 보여주신 만큼 반드시 알게 될 것을 믿습니다.\n\n이 땅을 바라보며, 그 영향 아래 사는 인생이 아니라,\n\n하늘을 바라보며, 당신의 은혜와 능력 안에 사는 인생이 되게\n\n하소서."}]}, {"id": 3, "title": "아버지의 이름을 거룩하게 하소서", "subtitle": "마태복음 6:9b", "sermon": "들어가는 말\n\n'그리스도인들만의 독특한 기도'를 배우는 여정이 계속됩니다. 이 기도는 우리에게 아직 버겁고 크게 느껴지지만, 우리를 하나님의 백성다운 모습으로 빚어갈 것입니다.\n\n지난 시간 우리는 '하늘에 계신 우리 아버지'라는 부름을 살펴보았습니다. 하늘에서만 찾을 수 있는 기이한 분이시기에, 이 땅의 그 무엇으로도 대체할 수 없는 분이십니다. 우리는 개인의 자격이 아닌, 그리스도 안에서 한 형제자매 된 '우리'로서 하나님 앞에 서게 되었습니다.\n\n그분을 '우리 아버지'라 부르는 것은 깊은 의미를 담고 있습니다. 더 이상 이 세상의 노예가 아닌, 자유로운 나라의 백성이 되었다는 선언입니다. 동시에 그 아버지의 견습생으로 살아가겠다는 결단의 고백이기도 합니다.\n\n오늘 우리는 '아버지의 이름을 거룩하게 하시며'라는 간구를 살펴봅니다. 개역개정 성경은 이를 '이름이 거룩히 여김을 받으시오며'로 번역했습니다. 이 기도는 우리에게 다소 생소하게 느껴질 수 있습니다. 우리는 주로 하나님께 개인적인 필요를 아뢰는 데 익숙하지만, 이 기도는 하나님 자체에 초점을 맞추며 그분의 이름을 높이는 기도이기 때문입니다.\n\n하나님의 이름을 이해하다\n\n하나님의 이름에 대한 이해는 깊이 있는 고찰을 필요로 합니다. 한국 기독교에서는 흔히 하나님의 이름을 '여호와'로 부르지만, 실제로 전해진 것은 네 개의 히브리어 문자 YHWH(요드, 해, 바브, 해) 뿐입니다.\n\n유대 전통에서는 바벨론 포로기 이후 하나님의 이름 발음을 삼가왔습니다. 성경에서 이 이름이 등장할 때면 '아도나이'로 대체했는데, 이는 영어의 'Lord', 우리말로는 '주님'으로 번역됩니다.\n\n하나님의 이름이 처음 계시된 것은 모세의 소명 때였습니다. 불타는 떨기나무 앞에서 모세는 하나님의 놀라운 구원 계획을 들었습니다. 백성들의 해방과 가나안 땅으로의 인도라는 원대한 계획이었습니다. 당시 이스라엘 백성들이 하나님의 이름에 관심을 가진 것은 당연했습니다. 그들이 살던 시대에는 모든 신이 고유한 이름을 가지고 있었기 때문입니다. 이집트의 태양신 라, 오시리스, 이시스, 호루스 등이 그러했습니다. 신의 이름을 안다는 것은 그 신의 능력에 접근할 수 있다는 의미였고, 그 은총을 받을 수 있는 열쇠와도 같았습니다.\n\n모세의 질문 역시 이러한 맥락에서 이해할 수 있습니다. \"정말로 당신이 우리를 구원하신다면, 우리가 당신의 능력을 경험하고 은총을 누릴 수 있도록 이름을 알려주십시오.\" 이것이 모세의 간구였습니다.\n\n이에 대한 하나님의 응답은 출애굽기 3:14에 기록되어 있습니다.\n\n\"하나님이 모세에게 대답하셨다. '나는 곧 나다.' 너는 이스라엘 자손에게 이르기를 '나'라고 하는 분이 너를 그들에게 보냈다고 하여라.\"\n\n이 계시는 깊은 신학적 의미를 담고 있습니다. 히브리어 원문은 'I am who I am' 또는 'I will be who I will be'로 해석될 수 있는데, 현대 성서학자들은 후자의 해석을 선호합니다. \"나는 내가 되고자 하는 그 존재가 될 것이다\"라는 의미입니다. 이는 놀라운 계시였습니다. 모세는 당시의 종교적 관념에 따라 명확하게 규정되고 통제 가능한 신의 이름을 기대했을 것입니다. 그러나 하나님은 전혀 다른 차원의 응답을 주셨습니다. 인간의 이해나 통제를 벗어난, 무한히 자유로운 존재로서의 자기 계시였던 것입니다.\n\n현대의 우상숭배\n\n오늘날 사람들은 자신들이 가치 있다고 여기는 것들을 신격화합니다. 현대인들의 신은 '돈', '성공', '명예' 등의 이름으로 불립니다. 사회관계망서비스(SNS)는 이러한 현대적 우상들을 숭배하는 제단이 되어버렸습니다.\n\n자본주의 체제에서 돈의 법칙을 이해하는 사람이 부자가 되고, 사회적 성공의 공식을 아는 사람이 출세합니다. 이처럼 현대인들은 자신만의 구원의 신을 찾아 그 이름을 부르며 살아갑니다.\n\n더욱 안타까운 것은 이러한 현상이 교회 안에서도 발견된다는 점입니다. 하나님을 자유로운 인격체로 대하지 않고, 종교적 틀 안에 가두어 버립니다. 진정한 관계와 만남을 추구하기보다, 종교적 의무 이행을 통해 하나님을 통제하려 합니다. 정해진 시간의 기도, 헌금, 봉사만 하면 축복과 구원을 보장받을 수 있다고 생각하는 것입니다.\n\n왜곡된 하나님 이미지\n\n이러한 태도는 다양한 왜곡된 하나님 이미지를 낳았습니다. 어떤 이는 하나님을 늘 너그럽게 웃는 할아버지처럼 여기고, 또 어떤 이는 엄격한 감시자로 생각합니다. 혹은 즉각적인 상벌을 내리는 심판관으로 이해하기도 합니다. 특히 보수적 신앙을 가진 이들은 성경의 중요성을 강조하면서도, 정작 성경을 통해 하나님을 인격적으로 알아가려는 노력은 부족한 경우가 많습니다. 오히려 단편적인 성경 지식으로 하나님을 규정하려 들거나, 성경 문자에 갇힌 하나님을 상정합니다.\n\n이는 이스라엘의 역사에서도 발견되는 모습입니다. 그들은 성전을 귀하게 여기고 율법을 최고의 선물로 받아들였습니다. 종교적으로는 매우 독특한 삶을 살았지만, \"나는 나다\", \"나는 내가 되려고 하는 존재가 될 것이다\"라는 하나님의 본질적 계시는 놓쳐버렸습니다. 전통과 틀 안에 하나님을 가두고, 자신들의 이해 범위 안에서 하나님을 통제하려 했습니다.\n\n이러한 태도가 극명하게 드러난 것이 예수님의 성육신 사건이었습니다. 하나님이 인간의 몸으로 자기 백성을 찾아오셨지만, 그들은 이를 알아보지 못했습니다. 하나님이 이토록 자유롭게 자신을 계시하실 것이라고는 상상조차 하지 못했기 때문입니다. 결국 예수님은 율법을 어기고 종교를 훼손하는 자로 취급받아 십자가에 달리셨습니다.\n\n거룩히 여김을 받으소서\n\n이러한 맥락에서 예수님께서 가르쳐주신 \"아버지의 이름이 거룩히 여김을 받으시오며\"라는 기도는 특별한 의미를 갖습니다. '거룩'이라는 말은 많은 이들에게 혼란스러운 개념입니다. 어떤 이는 이를 단순히 경건한 분위기나 도덕적 완전함으로 이해합니다.\n\n그러나 성경에서 말하는 거룩함은 '하나님만이 지니신 독특한 존재성'을 가리킵니다. 이 세상에는 본질적으로 거룩한 것이 없습니다. 오직 하나님만이 거룩하십니다. 어떤 것이 거룩하다고 불릴 때, 그것은 하나님께서 특별히 구별하셨기 때문입니다. 하나님의 임재가 있는 땅이 거룩하게 되고, 그분이 소유하신 백성과 물건들이 거룩하게 되는 것입니다.\n\n따라서 \"아버지의 이름이 거룩히 여김을 받으시오며\"라는 기도는 하나님의 본질적인 존재됨이 온 세상에 드러나고 인정받기를 구하는 것입니다. 이것은 모든 피조물이 마침내 하나님의 이름 앞에 무릎 꿇게 되기를 소망하는 기도입니다.\n\n이름의 거룩함을 회복하는 길\n\n현재 우리가 사는 깨어진 세상에서는 하나님의 이름이 제대로 알려지지 않았습니다. 사람들은 하나님을 올바로 찬양하고 예배하는 법을 잃어버렸습니다. 하나님을 찬양하고 예배한다는 것은 그분의 뜻에 복종하고 그분의 나라를 소망하는 것을 의미하지만, 이러한 진정한 예배는 찾아보기 어렵습니다. 더욱 안타까운 것은 교회와 그리스도인들조차 이러한 모습에서 자유롭지 못하다는 점입니다. 하나님의 이름을 부르고 예배에 참여하면서도, 실제로는 그 이름에 합당한 찬양을 드리지 못하는 경우가 많습니다. 하나님의 이름을 부르면서도 세속적 가치를 추구하고, 불의와 폭력을 정당화하는 일들이 발생합니다.\n\n올바른 기도의 자세\n\n이 기도를 드리는 데 있어 몇 가지 중요한 측면이 있습니다. 먼저는 우리는 하나님에 대한 오해와 왜곡된 이미지들을 인정하고 내려놓아야 합니다. 성경이 증언하는 하나님, 인격적인 그분을 진지하게 알아가려 노력해야 합니다. 실제로 하나님은 역사 속에서 끊임없이 자신에 대한 오해를 바로잡아 오셨습니다. 욥기에서 등장인물들은 하나님을 단순한 '인과응보의 신'으로 이해했지만, 하나님은 그들의 제한된 이해를 뛰어넘는 분이심을 보여주셨습니다. 요나서에서는 하나님의 사랑이 이스라엘만이 아닌 이방인에게도 미친다는 것이 드러났습니다. 특히 예수 그리스도의 성육신은 하나님에 대한 가장 완전한 계시였습니다. 그분은 친히 인간이 되어 오셔서 하나님에 대한 모든 오해를 깨뜨리는 삶을 사셨습니다. 하나님이 직접 인격으로 오셔서 자신을 드러내신 것입니다.\n\n실천적 헌신으로서의 기도\n\n\"아버지의 이름을 거룩하게 하소서\"라는 기도는 단순한 간구를 넘어선 실천적 결단을 포함합니다. 이는 \"우리가 알게 된 당신의 이름을 오용하지 않겠습니다\"라는 서약이며, 하나님의 참된 모습을 세상에 드러내겠다는 헌신입니다.\n\n하나님 나라를 향한 기도\n\n이 기도는 우리 자신을 넘어 더 큰 차원으로 나아갑니다. 우리를 통해 하나님을 알지 못하는 이들이 그분의 이름을 거룩하게 부르게 되기를 소망하는 선교적 기도입니다. 참된 예배가 없는 곳에 진정한 예배가 세워지기를 구하는 것입니다. 이는 복음을 모르는 가족과 친구들을 향한 관심으로 이어지며, 더 나아가 우리 사회와 세계 선교를 위한 진지한 헌신으로 확장됩니다. \"물이 바다를 덮음 같이 여호와를 아는 지식이 온 땅에 충만하리라\"는 말씀처럼, 온 세상이 하나님을 참되게 알게 되기를 소망하는 것입니다.\n\n거룩한 삶으로의 부르심\n\n이 기도는 우리의 구체적인 삶의 모습을 돌아보게 합니다. 우리의 삶이 어떠하냐에 따라 하나님의 이름은 거룩히 여김을 받기도 하고, 모욕을 당하기도 합니다. 그래서 이 기도는 자주 회개의 기도가 됩니다.\n\n\"하나님의 이름으로 힘을 과시하고, 엉뚱한 것을 추구했던 것을 용서하소서. 앞으로 내가 당신의 이름의 명예를 드러내는 인생이 되기를 원합니다.\"\n\n이는 가난한 자와 연약한 자의 편에 서서, 자신을 내어주시는 희생과 참된 사랑으로 세상을 구원하신 그리스도의 길을 따르는 결단입니다.\n\n나가는 말\n\n'아버지의 이름을 거룩하게 하소서'라는 기도를 통해 우리는 중요한 영적 진리를 배웁니다. 우리의 관심은 늘 '내 이름'과 '내 명예'에 집중되어 있지만, 이제는 '아버지의 이름과 명예'에 깊은 관심을 가져야 할 때입니다.\n\n우리가 만들어낸 하나님의 이미지를 내려놓고, 성경과 예수 그리스도 안에서 계시된 참되신 하나님을 찾고 발견하며, 그분을 따르는 삶을 살아야 합니다. 이것이 올바른 예배의 시작입니다. 더 이상 하나님을 세속적 가치나 권력의 도구로 취급하지 않고, 십자가를 지신 그리스도처럼 그분의 이름을 높이며 살아가는 것. 이것이 우리가 이 기도를 통해 배우는 하나님 백성다운 삶의 모습입니다. 이 기도가 우리의 입술에서 형식적인 고백으로 그치지 않고, 우리의 전 존재를 통해 하나님의 이름이 거룩히 여김을 받게 되기를 소망합니다. 그리하여 온 땅에 하나님의 이름이 참되게 찬양받는 그날이 속히 오기를 기대합니다.", "questions": ["평소 당신이 생각하는 하나님의 모습은 어떤가요? 혹시 하나님을 당신이 이해하기 쉬운 방식으로 규정하고 있지는 않나요?", "오늘 하루 동안 하나님의 이름을 어떻게 사용했나요? 혹시 하나님의 이름으로 나의 뜻을 관철시키거나, 나의 필요만을 채우려 하지는 않았나요?", "당신의 기도는 하나님을 더 알아가는 기도인가요, 아니면 이미 알고 있다고 생각하는 하나님께 청원하는 기도인가요?"], "missions": [{"number": 7, "topic": "아버지의 이름을 거룩하게 하소서", "text": "오직 스스로 되려고 하시는 존재가 되시는 하나님,\n\n누구에게도 통제되지 않고, 자유로우신 주님을 찬양합니다.\n\n이토록 놀라우신 분을 인격적으로 알아갈 수 있다는 것이 얼마나 큰 특권인지요.\n\n비록 우리에게 하나님은 여전히 어렵고 이해가 되지 않을 때가 많기에 때로는 당신을 단순한 이미지에 가두고 싶은 유혹에 사로잡히곤 합니다.\n\n하지만 저는 오늘도 예수 그리스도 안에서 드러난 아버지의 영광과 거룩하심을 바라봅니다. 주의 말씀과 성령을 통해 그 이름의 비밀을 깨닫게 해 주옵소서.\n\n아침마다 새로우신 주님의 얼굴을 발견하고\n\n그 앞에 경배하며, 더 사랑하고 더 의지하는 인생 되기를 소망합니다. 하나님의 이름을 영원히 알아가는 삶이 너무나 기대 됩니다."}, {"number": 8, "topic": "아버지의 이름을 거룩하게 하소서", "text": "거룩하신 하나님 아버지,\n\n하나님의 하나님 되심이 온 세상에 알려지길 원합니다. 가장 아름답고 명예로운 그 이름이 날마다 찬양 받으시기를 원합니다.\n\n하지만 우리가 얼마나 자주 아버지의 이름을 욕되게 하는 지 모르겠습니다. 아버지만 받으실 '거룩'의 이름을 특별히 구별한 우리에게도 주셨음에도, 우리는 당신이 아닌, 엉뚱한 것을 닮고 추구하며 살아가곤 합니다.\n\n주여, 저와 우리의 모든 죄를 용서 하시옵소서. 저와 우리 공동체가 그리고 온 교회가 하나님의 명예를 지켜가도록 이끌어 주소서.\n\n간절히 원하오니, 우리로 영적으로 메말라가지 않게 하시고, 둔감해지지 않게 하시고, 날마다 민감하게 스스로를 살피고, 성령의 이끄심 안에 살게 하소서. 부디 저의 삶으로 당신의 거룩한 이름을 나타내게 하소서."}, {"number": 9, "topic": "아버지의 이름을 거룩하게 하소서", "text": "가장 명예롭고 거룩한 이름을 가지신 하나님,\n\n주께서 모든 피조물과 사람을 지으셨고, 지금도 매일 생명의 은총을 누리게 하십니다. 그 뿐인가요? 주님은 세상을 위해 하나 밖에 없는 자기 아들마저 내어주셨습니다. 주님은 이토록 온 세상에서 찬양과 영광을 받기 합당하신 분입니다.\n\n그러나 너무나 많은 사람들이 하나님을 알지 못하고, 예배하지도 못합니다. 하나님의 자리에 엉뚱한 것들을 놔둔 채 헛된 예배를 드릴 뿐입니다. 모든 은혜와 행복과 기쁨의 근원이신 분을 버리고,\n\n거짓 약속을 내어주는 썩은 우물을 탐하며 살아가곤 합니다.\n\n주여, 저들을 불쌍히 여겨 주셔서 보지 못하는 자들의 눈을 열어주소서. 마침내 가장 명예로운 빛이신 하나님을 알게 하시고, 저들로 하여금 아버지의 이름의 거룩을 깨닫게 하옵소서. 예배가 없는 곳에, 예배가 없는 인생에 예배가 나타나게 하소서.\n\n그렇게 아버지의 이름을 온 세상과 인생 속에서 거룩하게 하소서.\n\n제게 허락하신 관계들 안에서 제가 그 이름을 거룩하게 드러내는 자녀 되길 원하오니, 저를 사용하여 주옵소서."}]}, {"id": 4, "title": "아버지의 나라가 오게 하시며", "subtitle": "마태복음 6:10a", "sermon": "들어가는 말: 하나님 나라에 대한 오해\n\n어릴 적 주일학교에서 부르던 찬양이 떠오릅니다.\n\n\"돈으로도 못 가요 하나님 나라, 힘으로도 못 가요 하나님 나라.\n\n거듭나면 가는 나라 하나님 나라, 믿음으로 가는 나라 하나님 나라.\"\n\n그 시절 저에게 '하나님 나라'는 명확했습니다. '언젠가 가게 될 곳', '죽음 이후의 세상'이었습니다. 빨리 가보고 싶다는 어린 저의 말에 어머니께서 깜짝 놀라 말리시던 기억이 납니다.\n\n그러나 예수님께서 가르치신 주기도문에서는 우리가 그 나라에 가게 해달라고 구하는 것이 아닙니다. 오히려 그 나라 자체가 이곳에 임하기를 구하라고 하십니다. 이는 우리의 기존 이해를 완전히 새롭게 할 것을 요구합니다. '하나님 나라', '하늘 나라'만큼 오해와 왜곡이 심각한 개념도 없을 것입니다. 한국인들에게 '하늘 나라', 특히 한자어 '천국'은 자연스럽게 '사후 세계'를 연상시킵니다. 예수님께서 전 생애를 바쳐 가르치신 '하나님 나라'의 깊은 의미를 제대로 이해하지 못하고 있는 것입니다. 이러한 한국적 사고방식은 신앙을 \"내가 죽어서 어떻게 천국에 갈 것인가\"라는 협소한 관심사로 축소시킵니다. 하나님 나라를 단순히 영적인 것으로만 이해하게 되면, 현재의 세상은 그저 적당히 버티다가 떠날 장소로 전락하고 맙니다.\n\n또 다른 극단적 오해도 있습니다. '나라'라는 단어를 문자 그대로 해석하여 특정 국가와 동일시하는 경우입니다. \"대한민국이 제사장 나라\"라는 식의 기도나 설교가 그 예입니다. 많은 이들이 대한민국의 기독교 국가화를 소망하고 있습니다. 이러한 바람이 순수할 수는 있으나, 근본적인 오해에서 비롯된 것이기에 여러 문제를 야기합니다.\n\n아버지의 나라, 하나님 나라의 본질\n\n1세기 유대인의 관점\n\n예수님이 선포하신 '아버지의 나라', '하나님의 나라'를 이해하기 위해서는 먼저 1세기 유대인의 맥락을 이해해야 합니다. 예수님은 당시를 살아가던 유대인이셨고, 하나님 나라에 대한 관심은 당시 모든 유대인의 공통된 열망이었습니다.\n\n이스라엘은 처음부터 '하나님의 나라'였습니다. 하나님께서는 그들에게 '토라'(우리가 흔히 '율법'이라 번역하는)를 주셨고, 이스라엘은 그 안에 계시된 하나님을 따라 순종하며, 하나님은 그들의 보호자와 주가 되어 주시는 특별한 관계를 맺었습니다. 그러나 북이스라엘과 남유다가 모두 멸망한 후, 그들은 계속된 식민지 생활을 해야 했습니다. 이러한 현실 속에서 이스라엘의 예언자들은 그 원인을 성찰하면서도 동시에 희망을 제시했습니다. 그 희망은 분명했습니다. 언젠가 다윗의 후손, 다윗의 왕권을 가진 메시아가 올 것이며, 그때 하나님께서 다시 이스라엘의 진정한 왕이 되시고 이스라엘은 다시 자유로운 백성이 될 것이라는 비전이었습니다.\n\n예수님이 보여주신 하나님 나라\n\n이러한 맥락에서 \"그 나라가 오게 하시며\", \"아버지의 나라가 오게 하시며\"라는 기도는 깊은 의미를 가집니다. 그러나 예수님이 말씀하신 '그 나라'는 이스라엘이 상상해 온 민족적, 정치적 해방의 비전과는 달랐습니다. 예수님은 당시 사람들이 생각하는 '메시아'의 모습과는 전혀 다른 모습을 보이셨습니다.\n\n예를 들어, 예수님은 병자를 고치신 후 \"너의 죄를 사했다\"고 선언하셨습니다. 이는 당시 사람들이 기대하던 메시아라면 절대 하지 않을 말이었습니다. 죄 사함은 오직 하나님만이 하실 수 있는 일이었기 때문입니다. 이로 인해 사람들은 예수님을 신성모독죄로 죽이려 했습니다.\n\n또한 성전을 헐라는 말씀도 마찬가지였습니다. 당시 기대하던 메시아는 성전을 가장 멋지게 회복하거나 재건할 것으로 여겨졌습니다. 그러나 예수님은 그들이 소중히 여기던 성전을 헐어버리라고 하셨고, 그것은 더 이상 성전이 아니라고 말씀하셨습니다.\n\n하나님 나라의 재정의\n\n예수님께서 3년간의 공생애 동안 하신 일은 이스라엘이 가진 '하나님 나라'에 대한 모든 오해를 폭로하고, 그들이 가진 이미지와 상징들을 전부 재정의하는 것이었습니다. 특별히 주목할 만한 몇 가지 재정의를 살펴보겠습니다.\n\n원수의 재정의\n\n당시 유대인들에게 '원수', '무찔러야 할 악'은 언제나 '이방 나라'였고, 특히 그들을 지배하는 '로마'였습니다. 그들이 겪는 유배와 고통과 슬픔을 일으키는 악의 결정체가 바로 로마였습니다. 당시 유대인들은 이 목표를 이루기 위해 다양한 정치적 노선을 취했습니다. 바리새인들은 분리주의를, 열심당은 테러 활동을, 세리들은 친로마 정책을 추구했습니다. 방식은 달랐지만 그들이 생각하는 궁극적인 악과 원수는 동일했습니다. 바로 이스라엘을 괴롭히는 \"이방 나라\" 로마였습니다.\n\n그러나 예수님은 전혀 다른 관점을 보여주셨습니다. 이방 나라만이 아니라 하나님의 백성이었던 '이스라엘'과 '유다' 역시 모두 악에 연루되어 있음을 폭로하셨습니다. \"너희를 더럽히는 것은 밖에 있는 것이 아니라 안에 있는 것\"이라는 말씀처럼, 진정한 문제의 본질을 지적하신 것입니다. 예수님은 경고하셨습니다. 만약 지금 당장 하나님께서 원수를 제거하는 심판을 시행하신다면, 유대인들 역시 똑같이 심판받고 멸망할 수밖에 없다는 것입니다. 이처럼 예수님은 원수의 개념을 재정의하셨습니다. 진정한 원수는 이방인과 유대인 모두를 사로잡고 있는 '사탄'이었습니다. 그래서 우리의 싸움, 메시아의 싸움은 혈과 육을 상대하는 것이 아니라, 이 어두움의 세상 주관자와의 싸움이 되어야 했습니다.\n\n하나님 백성의 재정의\n\n예수님은 또한 하나님 백성의 개념도 새롭게 정의하셨습니다. 본래 이스라엘은 혈통으로 하나님의 백성이 된다고 생각했습니다. 할례가 하나님 백성이 되는 길이자 표식이었습니다. 그러나 이미 세례 요한은 \"하나님은 이 돌들로도 아브라함의 자손을 만드실 수 있다\"고 경고했습니다. 예수님은 더 나아가 \"천국은 침노하는 자들의 것\"이라 하시며, 자신의 참된 형제와 부모는 혈육이 아니라 말씀을 듣고 순종하는 자들이라고 선언하셨습니다. 이는 새로운 언약의 시작을 의미했습니다. 참 이스라엘로 오신 예수님 안에서, 들포도나무가 아닌 참 포도나무이신 예수님 안에서 마침내 하나님과의 올바른 관계가 세워질 것이었습니다. 이제 하나님 나라의 백성은 혈통과 무관하게, 오직 예수님을 신뢰하고 사랑하며 그분과 인격적인 관계를 맺는 사람들이 되는 것입니다.\n\n성전의 재정의\n\n이스라엘이 하나님 나라로 불리었던 근본적인 이유는 '하나님이 그들과 함께' 하시기 때문이었습니다. 하나님은 그들의 하나님이 되어 인도하고 보호하셨고, 이스라엘은 그 하나님과 함께 동행하는 삶을 살았습니다. 그러나 예수님은 당시 이스라엘이 가진 성전은 이미 그 기능을 다했음을 선언하셨습니다. 무화과나무 사건이 바로 그 상징이었습니다. 잎은 무성하지만 그 안에 열매가 맺힐 가능성이 보이지 않는 무화과나무처럼, 성전도 겉모습만 화려할 뿐 본질적 기능을 상실했다는 것입니다.\n\n이제 새로운 시대가 시작되었습니다. 하나님은 더 이상 민족적 이스라엘과만 함께 하시는 것이 아니라, 새롭게 정의된 하나님의 백성들과 함께하실 것이며, 마침내 악을 완전히 몰아내고 온 우주적 하나님의 나라를 세우실 것입니다.\n\n하나님 나라를 위한 메시아 예수의 행동\n\n이렇게 새롭게 정의된 모든 상징과 이해 속에서 예수님은 무엇을 하셨을까요? 진정한 원수를 무찌르고, 악에게 사로잡힌 모든 이들을 해방하기 위해, 원래는 온 세상에 쏟아부어야 할 하나님의 진노와 심판을 오히려 자기 몸에 받으셨습니다. 예수님은 당시 기대하던 메시아라면 절대로 취하지 않았을 길을 가셨습니다. 그분은 '나무에 달려' 죽으셨습니다. 토라에는 나무에 달린 자마다 저주받은 자라는 기록이 있었지만, 예수님은 오히려 그 길을 택하셨습니다. 만약 이것으로 끝났다면, 그것은 예수님이 메시아가 아니라는 증거가 되었을 것입니다. 그러나 놀라운 일이 일어났습니다. 하나님께서 예수님을 사흘 만에 다시 살리셨고, 절망에 빠진 제자들 앞에 나타나셨습니다. 그것도 하나님의 영광과 임재가 충만한 참된 성전의 모습으로 말입니다.\n\n예수님은 마침내 온 인류가 입게 될 새로운 육체로 부활하셨습니다. 이를 목격한 제자들은 비로소 깨달았습니다. 그토록 기다려왔던 하나님의 나라, 모든 원수가 무너지고 하나님의 보호와 다스림을 누리는 세상이 이미 시작되었다는 것을, 마침내 기다려왔던 새로운 시대가 열렸다는 것을 말입니다.\n\n하나님 나라의 현재성과 미래성\n\n하나님 나라가 정말 왔는가?\n\n여전히 우리에게는 의문이 남습니다. 이 세상은 여전히 '악'과 '불의'가 가득하고, 고통이 넘치기 때문입니다. 그러나 예수님은 이 나라의 비밀, 미스터리에 대해 자주 설명해 주셨습니다. 아버지의 나라는 분명 '이미' 왔지만, 아직은 비밀스러운 모습으로 발견될 뿐이며, 이 깨어진 세상은 여전히 건재할 것이라고 말씀하셨습니다. 이것은 매우 아이러니하고 불편한 진실이지만, 동시에 우리 모두에게는 엄청난 은혜입니다. 만약 하나님의 나라가 단숨에 완성되는 방식이었다면, 악에 연루된 모든 인류는 단 한 사람도 그 나라에 참여하지 못하고 멸망했을 것입니다.\n\n은혜의 시간\n\n하나님은 우리에게 은혜와 사랑을 베풀기로 결정하셨고, 이처럼 복잡한 방식으로 그 나라를 임하게 하셨습니다. 예수님이 자기 몸으로 모든 진노와 심판을 감당하심으로써, 이 깨진 세상이 여전히 존속하게 된 것입니다. 이는 하나님 나라와 깨진 세상의 중첩 속에서 누구든지 하나님의 나라에 들어올 수 있는 기회를 얻게 하시기 위함입니다. 이러한 진리를 예수님은 '가라지와 알곡' 비유를 통해 설명하셨습니다. 주인이 좋은 씨를 뿌렸는데 밤중에 원수가 가라지를 뿌렸습니다. 종들이 가라지를 뽑아버리겠다고 했지만, 주인은 그러지 말라고 합니다. 가라지를 뽑다가 밀까지 함께 상할 수 있기 때문입니다.\n\n지금 우리 안에도 온갖 가라지가 가득합니다. 우리의 내면에는 아름다운 것도 있지만, 대부분은 악하고 못나고 치졸한 것들로 가득합니다. 이는 우리 개인만이 아니라, 교회라는 공동체나 사회 전반에 걸쳐 마찬가지입니다. 만약 하나님의 순결한 나라를 세우겠다고 이 모든 것을 한순간에 제거하신다면, 현재를 살아가는 어느 누구도 온전히 설 수 없을 것입니다. 그래서 하나님은 우리의 내부와 외부에 가득한 불의와 악들을 단숨에 제거하지 않으시고 때로는 그대로 두십니다.\n\n인내하시는 하나님의 은총\n\n이러한 하나님의 인내는 그분이 불성실하시기 때문이 아닙니다. 오히려 우리를 위한 것입니다. 자기 백성들을 구하시기 위해, 하나님 나라의 알곡을 보호하시려고 천천히 인내하고 계시는 은총인 것입니다. 그러나 분명히 알아야 할 것이 있습니다. 이래나 저래나 알곡은 결국 아름답고 멋지게 자라나게 될 것입니다. 비록 가라지와 함께 있는 것이 못마땅할 수 있지만, 걱정할 필요가 없습니다. 마지막 추수 때에는 하나님께서 친히 구별하실 것이기 때문입니다.\n\n하나님 나라를 구하는 기도의 의미\n\n조용한 혁명에의 참여\n\n\"그 나라가 오게 하소서\", \"아버지의 나라가 오게 하소서\"라고 기도한다는 것은 구체적으로 어떤 의미일까요? 우리가 '하나님 나라'가 시작되었고 예수님이 우리의 왕으로서 세상을 다스리고 계심을 믿는다면, 우리는 중대한 도전 앞에 서게 됩니다. \"지금 두 나라가 있는데, 당신은 어느 나라에서 살겠습니까?\"라는 도전입니다. 이는 진정한 충성을 바칠 왕을 선택하고, 그 앞에서 '응답'해야 함을 의미합니다. 예수님을 우리의 왕으로 모시기로 결정하고 반응하는 것, 이것이 바로 종교적 용어로 '회개'라고 불리는 것입니다. 이는 단순히 도덕적인 죄목 몇 가지를 나열하며 울거나 후회하는 것이 아닙니다. 오히려 우리가 참여해야 할 구체적인 실체가 있다는 뜻입니다. 예수님이 시작하신 나라의 문화와 법도와 분위기를 알아가는 것이며, 새롭게 정의된 비전과 삶의 방식을 배워 깨진 세상의 방식과는 전혀 다르게 사는 것을 의미합니다.\n\n하나님 나라의 실천적 의미\n\n이 기도는 하나님 나라가 일으키는 조용한 혁명에 동참하고, 완전히 뒤집힌 나라의 일원으로서 책임과 의무를 다하겠다는 고백입니다. 하나님 나라가 시작되었다는 것은 세상의 모든 악이 예수 안에서 끝났다는 선포이며, 더 나아가 그리스도께서 온 세상에 정의와 평화와 사랑의 통치를 시행하신다는 의미입니다. 그러나 이 부분에서 우리는 또 다른 오해를 범하지 말아야 합니다. 우리 시대에는 하나님 나라에 참여하는 방식에 대한 오해가 많은데, 우리의 유일한 가이드는 예수님께서 보여주신 방식입니다.\n\n만약 예수님이 로마를 전복시키고 군대를 동원해 기독교 국가를 세우고자 하셨다면, 우리도 그렇게 해야 할 것입니다. 그러나 예수님은 그렇게 하지 않으셨습니다. 그분은 광장에서 압도적인 하나님의 힘을 과시하는 대신, 모든 것을 끌어안고 광장 한가운데서 희생자의 모습으로 죽으셨습니다.\n\n신실한 현존으로서의 하나님 나라\n\n제임스 데이비슨 헌터는 『기독교는 세상을 어떻게 변화시키는가』에서 '신실한 현존'이라는 개념을 제시합니다. 그리스도인으로서, 하나님의 백성으로서 신실한 삶을 추구하는 것, 당장 무언가를 이루려 하기보다는 주어진 현재 안에서 빛과 소금의 존재로 살아가는 것이 우리의 유일한 정치적 행동이라는 것입니다.\n\n이러한 관점에서 우리는 다음과 같은 질문들을 스스로에게 던져야 합니다:\n\n- 우리는 어떤 방식으로 돈을 대하며 사용하는 존재가 될 것인가?\n\n- 우리는 어떤 방식으로 주어진 시간을 사용하는 존재가 될 것인가?\n\n- 우리는 어떻게 자녀를 대하고 키워나가는 부모가 될 것인가?\n\n- 우리는 어떤 대화를 어떤 식으로 나누는 존재가 될 것인가?\n\n이러한 모든 선택들이 우리가 하나님 나라 위에 서 있는지, 아니면 깨진 세상 위에 서 있는지를 보여주는 경계선이 됩니다. 많은 경우 우리는 그 경계선 위에서 두 발을 다 걸치고 서 있을지도 모릅니다. 적당히 신앙적이면서 적당히 세속적인 방식으로 살아가고 있을 수 있습니다.\n\n결단을 요구하는 하나님 나라\n\n누가복음 18장의 부자 청년 이야기는 우리에게 중요한 교훈을 줍니다. 세상에서 적당히 도덕을 지키며 살던 이 유대인 지도자는 예수님을 찾아와 \"내가 무엇을 해야 영생을 얻을 수 있습니까?\"라고 물었습니다. 그가 몰래 찾아온 것을 보면, 이는 단순한 과시가 아닌 진정한 영적 갈망에서 비롯된 질문이었을 것입니다. 예수님께서 계명들을 언급하시자 그는 \"이 모든 것을 지켰습니다\"라고 대답했습니다. 그러자 예수님은 \"네게 한 가지 부족한 것이 있다. 네가 가진 것을 다 팔아 가난한 자들에게 나누어 주어라. 그러면 하늘에서 보화를 얻으리라\"고 말씀하셨습니다.\n\n이는 모든 사람에게 적용되는 보편적 명령은 아닙니다. 그러나 예수님은 이 청년의 마음속 깊은 곳을 꿰뚫어 보고 계셨습니다. 이것이 그에게는 결정적인 경계선이었습니다. 적당한 명예와 도덕으로 안정감을 누리고 있었기에, 하나님 나라에 전적으로 헌신하지 못하게 만드는 그의 경계선이 바로 재물이었던 것입니다.\n\n하나님 나라를 향한 인내와 소망\n\n이 기도의 두 번째 의미는 하나님의 나라가 마침내 완전히 임할 것을 믿고 끝까지 인내하며 기다리는 것입니다. 하나님 나라를 소망하며 기도할 때 우리는 자주 불편과 절망, 낙심을 경험합니다. 하나님 나라의 정의와 평화를 소망하면서도, 뉴스와 현실을 마주하면 무력감에 빠지기도 합니다.\n\n세상은 계속해서 거짓 환상을 제시합니다. 최신 기술이 행복을 가져다줄 것이라는 환상, 좋은 집과 많은 돈이 행복과 해방을 가져다줄 것이라는 속삭임이 끊이지 않습니다. 그러나 우리는 이 기도를 통해 정신을 차려야 합니다. \"아니요, 하나님 나라는 이미 시작되었고, 반드시 완성될 것입니다\"라고 고백하는 것입니다.\n\n나가는 말: 하나님 나라를 살아내는 기도\n\n'아버지의 나라가 오게 하소서'라는 기도는 이미 임했으나 여전히 비밀스러운 그 나라를 소망하는 기도입니다. 이는 그 나라의 혁명에 참여하기로 결단하는 기도이며, 동시에 마침내 악이 정복되고 정의와 평화와 사랑이 실현되기를 소망하며 인내하는 기도입니다.\n\n우리가 조용한 혁명에 참여하고, 거룩하게 살며, 자연을 보호하고, 정의와 평화를 위해 헌신하는 삶을 살아도, 당장 눈에 보이는 변화는 없을 수 있습니다. 여전히 고통과 눈물은 마르지 않을 것입니다. 그러나 우리는 믿음으로 이 기도를 드립니다.\n\n\"아버지의 나라가 반드시 올 것을 믿습니다. 저로 하여금 인내하게 하시고, 여전히 믿음으로 살게 하소서.\"\n\n이것이 바로 우리가 드리는 하나님 나라의 기도입니다.", "questions": ["오늘 하루 동안 당신은 '깨진 세상'의 방식과 '하나님 나라'의 방식 중 어느 쪽을 더 많이 선택했나요? 구체적인 순간들을 떠올려보세요.", "당신의 삶에서 '하나님 나라의 조용한 혁명'이 일어나고 있는 영역은 어디인가요? 돈을 다루는 방식, 관계를 맺는 방식, 시간을 사용하는 방식 등에서 어떤 변화가 일어나고 있나요?", "지금 당신이 살아가는 현실이 '혼란스럽고 모호하게' 느껴질 때가 있나요? 그럼에도 불구하고 그 가운데서 하나님 나라의 역사하심을 발견한 순간이 있다면 언제인가요?"], "missions": [{"number": 10, "topic": "아버지의 나라가 오게 하소서", "text": "온 땅의 왕이신 하나님 아버지,\n\n우리는 너무나 자주 당신의 나라를 오해합니다.\n\n때로는 기독교인들만 더 잘 살게 되고, 기독교의 목소리가 더 힘이 있는 나라가 되기를 소망하기도 했고, 때로는 당신의 나라를 이 땅에서 멀리 저 하늘로 치워두기도 했습니다. 저희의 무지와 어리석음을 불쌍히 여겨주소서.\n\n예수님은 자신의 전 생애로 아버지의 나라를 설명하고, 보여주셨습니다. 이제 우리가 그 가르침에 더 집중하고, 깊이 고민하며 알아가길 원합니다. 비록 밭에 감춰진 보화와 같고, 겨자씨 같이 작아 보여도 오히려 더 크고 강한 능력으로 확장되는 그 나라를 깊이 알아가게 하소서.\n\n부디 아버지의 나라의 아름다움과 풍성함을 보지 못해서 억지로 견디는 신앙이 아니라,당신의 나라의 풍요와 즐거움을 온전히 누리기에 기쁨으로 인내하는 삶이 되게 하소서.\n\n주여, 나로 아버지의 나라를 보게 하소서."}, {"number": 11, "topic": "아버지의 나라가 오게 하소서", "text": "\"하나님 아버지,\n\n이 땅에서 당신의 나라가 이미 시작되었음을 믿습니다. 비록 작은 겨자씨처럼 보일지라도, 그 나라가 우리 안에서 자라고 있음을 믿습니다.\n\n우리의 일상적인 선택들이 세상의 방식이 아닌, 당신 나라의 문화를 보여주는 작은 증거가 되게 하소서. 물질을 다루는 방식에서, 관계를 맺는 모습에서, 시간을 사용하는 방법에서 하나님 나라의 향기가 묻어나게 하소서.\n\n힘과 성공이 아닌, 사랑과 섬김의 길을 택하여 조용한 혁명에 동참하는 자 되게 하소서."}, {"number": 12, "topic": "아버지의 나라가 오게 하소서", "text": "\"하나님 아버지,\n\n저희의 눈에는 혼돈과 어둠뿐이지만 주님은 이미 승리하셨고 이 모든 것을 새롭게 하실 것을 믿습니다.\n\n한숨과 절망이 깊어질 때마다 겨자씨와 누룩처럼 조용히 자라나는 하나님 나라를 바라보게 하소서. 가라지가 가득해 보여도 알곡이 자라고 있음을 신뢰하며 포기하지 않고 기도하게 하소서.\n\n우리의 작은 순종이 결코 헛되지 않음을 기억하고 끝까지 신실하게 걸어가는 인내의 사람 되게 하소서."}]}, {"id": 5, "title": "그 뜻이 하늘에서처럼 땅에서도", "subtitle": "마태복음 6:10b", "sermon": "정돈되지 않은 삶 속에서\n\n여러분의 집이나 업무 공간은 대체로 잘 정돈되어 있습니까? 아니면 마구 흐트러져 있습니까? 아마 각자의 성격이나 성향에 따라 차이가 있을 것입니다. 그러나 어쨌든 우리가 원하는 것은 깔끔하게 정돈된 상태일 것입니다. 스스로 잘 하지 못하더라도 누군가가 대신이라도 해준다면 기쁠 것입니다. 실제로 사람은 누구나 잘 정돈되어서 모든 것이 한눈에 훤히 들여다보이는 상태를 좋아합니다. 왜냐하면 그럴 때 우리가 보지 못하는 불확실한 부분은 적어지고, 모든 것이 잘 통제되고 잘 작동하고 있다는 느낌이 들기 때문입니다. 그래서 보통 스트레스가 쌓이거나 불안도가 높아질수록 사람들은 주변을 더 통제하고 싶어한다고 알려져 있습니다.\n\n이러한 경향은 우리 삶 전반에서 발견됩니다. 생각해 보십시오. 우리 모두가 원하는 것이 무엇입니까? 우리가 계획하고 생각한 대로, 그것을 벗어나지 않고 모든 것이 척척 이루어지는 것이 아닙니까? 내가 예상하지 못했던 일은 가급적 일어나지 않기를 바랍니다. 그럴 때마다 우리는 스트레스를 받기 때문입니다. 그런데 문제는 이런 우리의 본능이 우리가 하는 기도의 방향을 결정하곤 한다는 것입니다. 무엇입니까? 내 입장에서의 '형통'을 소망하는 기도들이 바로 그것입니다. 우리가 지금 세우고 있는 계획과 뜻을 열심히 설명하고, 그것이 아무 탈 없이 성공하게 해달라는 기도들입니다. 사업이든, 결혼이든, 각종 진로를 찾아가는 면들에서 말입니다. 그래서 흔히 '기도응답'을 받았다고 간증하는 사람들의 부류가 어떤 사람들입니까? 대부분은 자기의 계획을 이루어낸 사업가나 고위직 혹은 연예인들일 수밖에 없는 것입니다. 그러면 평범한 사람들은 어떻습니까? 보통은 감추고 아닌 척 하여 그렇지, 대다수는 '형통'이나 '잘 정돈된 삶'과는 거리가 멀 것입니다. 결혼도 원하는 대로 되는 것이 없고, 자녀 양육도 소망하는 것과는 전혀 다른 양상으로 진행되곤 합니다. 가면을 쓰지 말고 솔직하게 삶을 나누다 보면, 우리는 모두가 온통 혼란과 어둠 속에서 잔뜩 흐트러지고 깨어진 현실 안에 있다는 사실을 발견하게 될 것입니다. 그러니 어찌하겠습니까? '자신들이 원하던 기도응답'은 쉽게 일어나지 않으니까, 아예 체념하거나 아니면 자기 자신의 신앙 수준에 뭔가 심각한 문제가 있다고 생각하면서 자괴감에 빠진 신앙생활을 하기도 합니다.\n\n그런데 오늘 예수님이 가르쳐주시는 기도는 전혀 다른 방향으로 나아갑니다. 이 기도는 \"우리의 뜻\"을 이루어달라고 요청하지 않습니다. 오히려 \"그 뜻\" 곧 '아버지의 뜻'이 하늘에서 이미 이루어진 것처럼 땅에서도 이루어지게 해달라고 요청합니다.그렇다면 일단 하늘에서 이루어진 아버지의 뜻이 땅에서도 이루어진다는 것이 어떤 식으로 발견되는지부터 생각해 보고, 그렇다면 우리는 이 기도를 어떤 식으로 참여할 수 있는지를 이야기해 보겠습니다.\n\n하나님 나라의 놀라운 탄력성\n\n먼저, 이 개념을 가장 잘 보여주는 구약의 이야기 하나를 살펴보겠습니다. 바로 요셉을 중심으로 일어났던 일입니다. 일단 요셉의 아버지 야곱은 네 명의 아내가 있었는데, 그중에서 진정으로 사랑하는 여인은 오직 라헬 하나뿐이었습니다. 그래서 라헬이 낳은 자식이었던 요셉을 편애했습니다.\n\n덕분에 형들은 요셉을 미워했는데, 요셉은 너무 사랑만 받아서 그런지 눈치도 없어서 민감한 내용이 담긴 자기 꿈을 발설해 버리고 맙니다.\n\n\"형들아, 나 꿈꿨어. 우리가 들에서 밀단을 묶었는데, 형들이 묶은 것들이 내가 묶은 것에 절을 하더라? 재밌지?\"\n\n안 그래도 눈꼴 시린데, 그런 꿈을 얘기하니까, 형들은 이렇게 말했습니다. \"아, 좋은 꿈이네, 얘들아 그러면 이제 우리가 악몽을 꾸게 해주자!\" 그래서 원래는 죽이려다가, 노예로 팔아버리고 맙니다.\n\n그런데 놀라운 것은, 노예로 팔려 가기도 하고 감옥에 갇히기도 하는 모든 우여곡절들 속에서도 그의 인생은 '승승장구'하게 되고, 그때마다 성경은 그가 '형통'했다고 말합니다.\n\n결국, 마지막 순간에는 이집트의 총리가 되고, 앞으로 닥칠 기근에서 나라를 구할 마스터플랜을 진행하게 됩니다. 아무튼 이제 그 상황에서 형들이 찾아옵니다. 엄청난 기근 속에서 먹을 양식을 찾으러 온 것입니다. 당연히 총리가 요셉일 거라고는 꿈에도 몰랐는데, 결국 이집트 총리가 자기들이 팔아버린 요셉인 것을 알고 벌벌 떱니다. 그런데 그때, 요셉이 형들을 안심시키는데, 그가 했던 말이 우리가 배우려는 이 기도와 깊은 관계가 있습니다.\n\n창세기 45:4-8절까지 기록된 내용의 일부를 읽어보겠습니다.\n\n\"이제는 걱정하지 마십시오. 자책하지도 마십시오. 형님들이 나를 이곳에 팔아넘기긴 하였습니다만, 그것은 하나님이 형님들보다 앞서서 나를 여기에 보내셔서, 우리의 목숨을 살려주시려고 그렇게 하신 것입니다... 그러므로 실제로 나를 이리로 보낸 것은 형님들이 아니라 하나님이십니다.\"\n\n무엇이라고 이야기합니까? 지금 요셉은 자기에게 일어난 모든 일을 전혀 다르게 해석하고 있습니다. 형제들에게 버림받고, 노예로 팔려간다는 것이 얼마나 끔찍한 경험입니까? 사실 상상도 하기 어려운 고통이고, 분노의 이유가 아닙니까? 아마 이런 일이 우리 삶에서 일어났다면 순전히 그저 사적으로 해결해야 할 문제로 이해되었을 것입니다. 전형적인 콩가루 집안에서 나타나는 전형적인 폭력과 복수 이야기인 것입니다. 그래서 형들도 그렇게 이해했고, 망했다고 생각했습니다. 그런데 요셉은 전혀 다른 관점으로 바라봅니다. 요셉은 자기의 인생이 그저 자기만의 것이 아니라, 세상을 향한 하나님의 목적을 실현시키는 거대한 이야기를 구성하는 어떤 한 부분으로 보였다는 것입니다. 물론 자세히 써 있지 않아서 그렇지만, 요셉이 살아간 세월 동안 인간적으로 얼마나 고통스럽고 좌절스러웠겠습니까? 그런데 결국 나타난 반전과 우여곡절들을 뒤돌아보면서 이렇게 말합니다.\n\n\"당신들은 악으로 이 모든 일을 했지만, 하나님께서 선으로 바꾸셨습니다.\"\n\n\"비록 시작은 원한과 배신 때문에 일어났지만, 하나님이 이 이야기를 자기 백성을 보존시키는 은혜와 구원의 이야기로 바꾸셨습니다.\"\n\n실제로 사람들은 각자의 계획과 뜻이 있고, 그 계획과 뜻은 대부분 선하기보다는 자기중심적이고 악한 면이 가득합니다. 누군가 잘 되고 있다, 좋다라고 말해도 그것은 자기 입장에서의 선일 뿐입니다. 다른 사람들의 입장이나, 공동체나 사회적으로 보면 전혀 다른 결과도 가능합니다. 그런데 요셉은 이렇게 말합니다. 그 모든 것 배후에 훨씬 더 크고 놀라운 사랑의 현존이 있다고 말입니다. 물론 연극에서 배우들의 연기력도 너무나 중요하지만, 그 모든 이야기를 조합하고 연결시키고, 심지어 발연기에 어이없는 애드립까지 전부 묶어서 탁월한 작품을 연출할 수 있는 엄청난 작가가 있다는 것입니다.\n\n실제로 요셉이 꾸었던 꿈은 하나도 사라지지 않았는데, 그 꿈은 요셉이 꾸고 싶어서 꾼 것입니까? 아닙니다. 사실은 하나님의 꿈이었습니다. 하나님은 아브라함을 불러서 하나님 나라를 세우고, 온 세상에 복을 주려는 꿈을 갖고 계셨는데, 그것이 형들의 복수심과 폭력 앞에서도 전혀 좌절되지 않았다는 것입니다.\n\n물론 이 이야기를 듣고 오해하면 안 됩니다. 이것은 어차피 그렇게 될 운명이었다고 말하는 '운명론'이 아닙니다. 요셉이 팔려가지 않았다면 어쩔 뻔 했습니까? 이것은 말도 안 되는 소리입니다. 오히려 그런 '악'은 없을수록 좋고, 하나님의 의도도 아닙니다. 다만 하나님은 각 사람을 통제하시기보다는 오히려 자유롭게 반응하며 살아가도록 허용해 주시는데, 그럼에도 불구하고 하나님이 가진 계획과 뜻은 반드시 이루어진다는 것이고, 그 방식이 엄청난 탄력성으로 성취된다는 것입니다.\n\n한번 생각해 보십시오. 우리는 각자의 삶의 자리에서 어떻게 살아야 하는지 거의 전혀 모르고 살아갑니다. 어떤 과정을 거쳐야 할지, 어떤 방법으로 살아야 할지 로드맵이 다 정해진 사람이 누가 있겠습니까? 우리는 모두 너무나 다른 환경 속에 살아왔고, 각자 독특한 정황 안에 있습니다. 그래서 누군가를 보고 그대로 따라 살아가는 것도 사실 잘 맞지 않습니다. 막상 우리는 수많은 선택의 순간에 놓여 있는데, 실상 성경을 들여다봐도 대부분은 정답을 찾기가 어렵습니다.\n\n\"너는 테슬라를 사라. 너는 G80을 사고, 너는 승합차를 사라.\" 그런 것이 없습니다. \"취업은 이 타이밍이야. 결혼은 저 사람과 해야 해.\" 이런 것도 없습니다. 언제 이사를 가야 하고, 어느 집을 골라야 하고, 어떤 일을 계속해야 하는지... 전혀 대답해주지 않는다는 것입니다.\n\n그것이 우리에게 어려움이 아닙니까? 정답 자체가 없으니까 내가 잘 살고 있는 것인지, 이것이 맞는지 늘 의심이 들지도 모릅니다. 그런데 다만 우리가 그리스도 안에 있기만 하다면, 반드시 확신해야 할 것이 있습니다. 하나님의 뜻과 계획은 우리 생각보다 훨씬 놀라운 탄력성을 갖고 있고, 결국 주 안에 있는 모든 이들은 반드시 '승리'할 것이라는 것입니다.\n\n모든 고통과 아픔이 없을 것이라는 이야기가 아닙니다. 오히려 각종 죄와 고통과 사건들이 어우러진 혼란스러운 인생길이겠지만, 사기도 당하고, 소송에 휘말리기도 하고, 사랑하는 이의 죽음도 보고, 실패와 정체의 순간들이 우리를 관통하겠지만 그럼에도 불구하고 마침내 놀라운 탄력성으로 하나님께서 결국 이루시려는 그 뜻은 반드시 성취될 것이라는 것입니다. 루터는 이런 말을 했습니다.\n\n\"하나님은 휜 활로도 과녁을 향해 정확히 쏘실 수 있고, 절름발이 말도 얼마든지 타고 다니실 수 있다.\"\n\n즉, 세상을 향한 하나님의 뜻이 우리의 헛된 계획과 죄 그리고 실수 속에서도 절대로 좌절될 수 없다는 것입니다. 그래서 우리가 이 기도를 하기 전에 반드시 믿어야 할 것이 있습니다. 하나님의 뜻이 하늘에서 이루어지는 것처럼 이 땅에서도 이루어지고야 말 것이라는 사실입니다. 사실 이 중요한 신앙고백을 우리는 모르지 않을 것입니다. 하지만 실제로 믿고 사는 것은 전혀 다른 문제입니다. 왜냐하면 우리가 사는 세상은 모든 것이 우리의 결정과 우리의 행동에 달려 있다고 주장하기 때문입니다.\n\n\"Just do it\" \"Impossible is nothing\"\n\n어차피 우리가 모든 것을 결정할 수 있고, 통제할 수 있다는 것입니다. 그런데 실제로 그럴 수 있는 사람은 없지 않습니까?\n\n그래서 요즘 시대는 점점 더 깊은 불확실성 속에서 불안도가 높아지고, 우울증, 공황장애가 흔해지고 있다는 생각도 듭니다. 자기에게 모든 것이 달려 있는데, 그것을 해내지 못하는 좌절 앞에서 자살률도 높아지는 것입니다. 하지만 우리는 이 기도를 드리면서 모든 거짓 이야기를 버립니다. 기도에서 중요한 것은 내가 얼마나 멋진 이야기를 하고, 멋진 계획을 늘어놓느냐가 아니라는 것입니다.\n\n정말 중요한 것은 하나님이 지금 무엇을 하고 계시는가에 대한 이해입니다. 하나님은 계속 일하고 계십니다. 그분은 멈추지 않으십니다. 하나님의 나라는 이미 하늘에 성취되었고, 마침내 이 땅에서도 성취되고야 말 것입니다. 우리가 지금 보고 있는 자신의 인생과 이 사회의 현실과 역사들을 보면서 한숨이 나오고, 답답할 수도 있겠지만, 그래도 이 모든 것이 아무 의미 없이 흐트러져 있는 상태는 아닙니다. 그것이 내 통제 밖이라 흐트러져 보일지는 몰라도, 하나님은 지금도 여전히 그 모든 악을 선으로 만드는 일을 하고 계신다는 사실입니다. 우리는 바로 그 진리를 믿으며 이 기도를 드립니다. 그렇다면 이제 이 기도에 좀 더 적극적으로 참여하는 법을 배워보겠습니다.\n\n나의 뜻을 분별하며\n\n물론 이미 살펴본 것처럼 하나님의 계획은 놀라운 탄력성을 갖고 있지만, 그렇다고 해서 우리가 그것을 시험하려고 의도적으로 악을 저지르거나, 제 멋대로 살 수는 없습니다. 그런데 우리가 아무 생각 없이 살다 보면, 자기도 모르는 사이에 하나님의 뜻과 완전히 충돌하는 내 계획을 붙들고 살아가기도 합니다. 혹시라도 그 계획대로 안 될까 봐 불안해하기도 합니다. 그래서 우리가 이 기도에 적극적으로 참여하는 첫 번째 방식은 우리의 자연스러운 \"본성\"을 대항하고, \"내 뜻과 내 계획\"을 먼저 분별하는 것입니다.\n\n생각해 보십시오. 우리는 그 자체로 욕망 덩어리입니다. 우리는 자기 계획이 있고, 뜻이 있습니다. 공통적인 것만 말씀드려보겠습니다. 여러분의 계획과 뜻을 대부분 알 수 있습니다. 성공하고 싶은 것이 우리의 뜻입니다. 인정받고 싶은 것, 물질적 풍요를 누리고 싶은 것도 우리의 뜻입니다. 그렇다면 그것이 나쁩니까? 아닙니다. 우리의 뜻을 만들어내는 모든 욕망은 하나님이 우리를 창조하실 때 주셨던 자연스러운 인간성이기도 합니다. 우리는 죽었다 깨어나도 기본적인 욕망을 제거할 수 없습니다. 오히려 이런 욕망들 때문에 자발성도 생기고, 열정도 생기는 것입니다.\n\n그런데 문제가 무엇이냐면, 이 욕망 자체가 무언가 '왜곡'되었다는 것입니다. 욕망의 목표도 왜곡되어 있고, 제한선도 전부 제각각이 되어버린 것입니다. 먹는 것? 좋습니다. 그런데 적당히 먹는 것이 무엇인지를 모르게 되어 버렸습니다. 인정받는 것? 명예로운 것? 좋습니다. 그런데 진정한 명예가 무엇인지 모르게 되어버린 것입니다. 그래서 예수님은 자신을 하늘에서 온 살아있는 빵이라고 소개하십니다. 그 분을 먹어야만 영원히 주리지 않을 것이라는 것입니다.\n\n또 그래서 주님은 돌아온 둘째 아들을 맞이하는 아버지의 이야기를 들려주십니다. 다른 이웃이 무엇이라 해도, 아버지는 잔치를 벌일 정도로 사랑하고 기뻐하신다는 것입니다. 그것이 진정한 명예라는 것입니다.\n\n한 마디로 우리의 욕망, 우리의 뜻을 궁극적으로 만족시키시는 분은 하나님이라는 것입니다. 하나님의 무한한 사랑과 에너지를 공급받을 때에야 우리의 모든 뜻과 욕망이 제자리를 찾을 수 있다는 것입니다.\n\n하나님의 은혜 안에서 먹을 것을 즐기고, 인정을 누리고, 이 세상과 삶이 제공하는 모든 선물들을 선물로 누리는 일이 벌어지는 것입니다. 바로 그럴 때에야 여전한 결핍과 아픔 한가운데에서도 우리는 고백할 수 있습니다.\n\n\"아, 하나님 안에서 사는 인생은 복되구나! 즐겁구나!\"\n\n바로 그것이 진정 풍성한 삶인 것입니다. 그런데 우리는 자꾸 속으면서 살아갑니다. 왜곡된 욕망이 꿈틀거리니까, 아버지의 뜻과는 전혀 상관없는 우리의 뜻을 탐하고, 모든 것을 내 방식과 내 스타일로 이루려고 하는 욕망이 가득하기 때문입니다. 혹시 그렇게 무언가를 얻어내도 사실은 유사 성공이고, 유사 칭찬이고, 유사 풍요들인데, 결국 무너질 수밖에 없는 허상들인데 우리는 자꾸 그것을 바라보면서 살게 됩니다.\n\n더 심각한 것은, 기독교 안에서 하나님의 이름을 부르면서, 정작 하나님 자체를 갈망하는 것이 아니라, 그 분을 이용해서 유사 성공과 유사 풍요를 얻겠다고 애쓰는 일이 벌어지곤 한다는 것입니다. 그러니 이제 이 기도에 적극적으로 참여해야 합니다. 어떻게 해야 할까요? 자기의 뜻과 계획을 점검하고, 내 욕망들을 분별해 보아야 합니다. 가만히 기도의 자리에 앉아서, 생각해 보아야 합니다. 즉시 떠오르는 모든 기대와 소망들을 다시 확인해 보아야 합니다. 이것이 과연 하나님의 뜻에 합당할까? 정직하게 말씀드려보아야 합니다.\n\n\"주님, 저는 지금 이것을 원합니다. 저는 이렇게 되었으면 좋겠습니다.\"\n\n그리고는 우리의 진짜 속내를 가감없이 보여주며 기도해야 합니다.\n\n그럴 때 우리의 의도가 갑자기 환하게 드러나게 됩니다. 겉은 그럴듯했는데, 알고 보면 그저 내 욕심이라는 것이 발견되기도 하고, 온갖 삐뚤어진 목표로 가득하다는 것이 깨달아지기도 합니다.\n\n그리고 바로 그런 자리에서 우리는 예수님께 배워야 합니다. 예수님은 겟세마네 동산에서, 자신이 가야 할 십자가 죽음을 벗어나보려고 시도하셨습니다. 그것이 인간적인 본능이고, 당연한 뜻이었으니까요. 그런데 그 기도에 대해 하나님의 응답은 'No'였습니다. 그리고 주님은 바로 그 자리에서 '나의 원대로 하지 마시고, 아버지의 뜻대로 하소서'라고 기도하셨습니다. 그래서 이 기도는 우리의 본성과 전혀 맞지 않는 기도입니다. 우리는 지금 욕망을 부추기는 시대를 살고 있고, 원하는 것을 얻어내는 것이 꽤나 자랑스러운 일처럼 여겨지는 사회를 살고 있으니까요.\n\n\"하고 싶은 대로 해야지. 참으면 안 돼.\" 라는 주장 속에 살고 있습니다. 그런데 우리는 이 기도를 드리면서 저항해야 합니다. 그 분의 뜻을 알아가려고 시도하고, 내가 지금 꾸고 있는 꿈보다 훨씬 더 큰 하나님의 계획에 사로잡히기를 간청하는 기도를 드려야 합니다. 설령 하나님께서 'No'라고 대답하셔도, 그 결정을 따르기로 결정해야 합니다.\n\n\"주님, 저는 여전히 잘 모르고 걸어갑니다. 막막한 삶을, 이 세상을 그저 모자란 지혜로 더듬어가며 살아낼 뿐입니다. 하지만 이 모든 걸음이 아버지의 위대한 길 안에서의 한 걸음이 되게 하소서.\"\n\n그분의 뜻을 구하며\n\n어쨌든 이렇게 '내 뜻'을 성실하게 분별하다 보면, 우리는 점점 더 하나님의 계획과 뜻을 점점 이해하게 될 것입니다. 하나님이 무엇을 기뻐하시고, 하나님 나라가 어떤 정의와 사랑과 평화를 보여주는지 선명해지는 것입니다. 왜냐하면 하나님이 자기 뜻을 우리에게 드러내는 것을 기뻐하시기 때문입니다. 우리가 공동체 안에서 예배할 때도 그렇고, 매일 인격적인 만남 속에서도 하나님은 계속 자기 뜻을 보여주실 것입니다.\n\n그런데 이 시대에 가장 큰 문제가 무엇인지 아십니까? 이미 신학적 지식도 많아졌고 아는 것도 늘었는데, 대부분 수동적으로 그러려니 하고 있다는 것입니다. \"어차피 하나님이 하시는데 뭘. 어차피 그 분 뜻대로 이루어질 텐데 뭘.\" 이렇게 생각하면서 말입니다. 기도하든 안하든, 어차피 된다는 것 아니냐고요? 그런데 그것은 엄청난 오해입니다.\n\n성경이 늘 말하는 재미있는 점이 하나 있습니다. 하나님의 뜻은 너무나 선명하고, 반드시 이루어질 것인데 하나님은 그 일을 반드시 우리의 기도와 동역을 통해 이루기로 작정하셨다는 사실입니다.\n\n어차피 비를 내리시기로 결정하셨는데, 엘리야가 기도할 때에야 비가 온 것처럼, 또 에스겔 36:36에서 이스라엘을 회복하겠다는 약속을 주셨어도, 반드시 자기들에게 이루어지기를 구할 때에 이루어주시겠다고 하신 것처럼 말입니다. 이 이야기를 절대로 우습게 듣지 않기를 바랍니다. 하나님의 놀라운 일하심과 은혜의 역사가 정말로 일어나기를 바라십니까?\n\n저는 간절히 원합니다. 제가 만나는 사람들마다 예수님을 알게 되고, 그 분을 주님으로 영접하는 역사가 있기를 소망합니다. 그래서 요즘 친해져가는 몇몇 사람들을 놓고 기도하는 중입니다.\n\n저는 이 지역 안에서 우리 교회가 하나님의 나라가 보여주는 정의와 사랑과 샬롬의 향기를 드러내는 그런 교회가 되기를 소망하고, 그것이 하나님이 원하시는 뜻이라는 것을 믿습니다.\n\n그래서 기도합니다. 구체적으로 그 일이 이루어지는 과정을 다 통제할 수 없지만, 하나님이 결국 그 일들을 이루실 것을 믿고 기도합니다. 저는 우리 각 성도들이 하나님을 깊이 알게 되기를 소망하고, 각자 자기에게 주어진 몫을 찾아내고, 감당해내는 사람, 마침내 그리스도의 복음을 거침없이 전수하는 사람이 될 것을 믿습니다. 그것이 하나님의 뜻인 것이 너무 당연하지 않습니까? 그래서 기도합니다. 그리고 그렇게 할 수 있는 모든 사역과 가르침을 준비할 것입니다.\n\n여러분은 어떠십니까? 어떤 하나님의 뜻을 배웠고, 알게 되었습니까? 그렇다면 그것을 붙들고 기도하십시오. 하나님의 뜻은 반드시 이루어지고야 말 것입니다. 그리고 우리의 기도와 정직한 참여가 그 뜻을 이 땅으로 가져오는 통로가 될 것입니다. 하나님이 우리와 동역하기를 원하시기 때문입니다.\n\n하늘의 뜻이 이루어지기를\n\n오늘 우리가 \"아버지의 뜻이 하늘에서 이룬 것처럼, 땅에서도 이루어지게 하소서\"라는 기도를 배웠습니다.\n\n이 기도는 놀라운 탄력성으로 반드시 이루어질 그 큰 계획에 우리가 동참하는 기도입니다. 그래서 우리의 뜻은 덜 중요하게 여기고, 하나님의 뜻을 더 중요하게 여기며 참여하는 기도를 연습해 나가야 하는 것입니다.\n\n이번 한 주간도 차근차근 이 기도에 참여하고, 연습해 보면서 아버지의 그 뜻을 함께 이루는 하나님의 동역자로서 기도하는 우리가 될 수 있기를 소망합니다.\n\n그때에 우리의 연약함과 부족함에도 불구하고 하나님은 우리의 기도를 통해 일하시고, 마침내 그 분의 뜻이 하늘에서 이루어진 것처럼, 우리의 삶과 교회와 이 도시 안에 이루어질 것을 믿습니다.", "questions": ["나의 뜻대로 하지 마시고 아버지의 뜻대로 하소서라는 기도가 가장 필요했던 최근의 순간은 언제였나요? 그 상황에서 나는 어떻게 반응했나요?", "설교에서 말한 것처럼, 우리의 자연스러운 욕망(성공, 인정, 물질적 풍요 등)이 왜곡되어 있다는 것을 당신의 삶에서 어떻게 경험하고 있나요? 이러한 욕망들이 하나님 안에서 어떻게 올바른 방향을 찾을 수 있을까요?", "요셉의 이야기처럼, 당신의 삶에서 겪었던 고통이나 실패가 나중에 보니 하나님의 더 큰 계획의 일부였던 경험이 있나요? 이러한 경험은 현재 당신이 겪고 있는 어려움을 바라보는 관점에 어떤 영향을 주나요?"], "missions": [{"number": 13, "topic": "그 뜻이 하늘에서도 땅에서도", "text": "사랑하는 하나님 아버지,\n\n저는 종종 제 삶이 너무 혼란스럽고 흐트러진 것처럼 느낍니다.\n\n때로는 제가 걸어가는 길이 맞는지조차 알 수 없을 때가 있습니다. 그러나 요셉의 이야기처럼, 주님께서는 그 모든 상황을 통해 일하고 계심을 믿습니다.\n\n아버지, 저의 좌절과 실패처럼 보이는 순간에도, 저의 눈에는 보이지 않는 주님의 놀라운 계획이 움직이고 있음을 믿습니다. 휜 활로도 과녁을 정확히 맞추시는 주님, 부족한 저를 통해서도 주님의 뜻을 이루어 가심을 신뢰합니다.\n\n주님, 세상은 모든 것이 우리의 통제 아래 있어야 한다고 말하지만, 저는 주님만이 진정한 주권자이시며, 모든 것을 선하게 인도하시는 분이심을 고백합니다.\n\n비록 제가 걸어가는 길이 험하고 어려울지라도, 주님의 놀라운 탄력성으로 역사하심을 믿습니다. 실수투성이인 제 삶 가운데서도 주님의 신실하신 계획이 반드시 성취될 것을 신뢰합니다.\n\n우리의 모든 아픔과 고통까지도 주님의 더 큰 계획 안에 있음을 고백하며, 그 뜻이 하늘에서처럼 이 땅에서도 이루어지기를 간구합니다."}, {"number": 14, "topic": "그 뜻이 하늘에서도 땅에서도", "text": "거룩하신 하나님 아버지,\n\n오늘도 저를 돌아봅니다. 제 마음 속에 가득한 계획들과 소망들을 주님 앞에 내려놓습니다. 솔직히 고백합니다. 성공하고 싶은 마음, 인정받고 싶은 마음, 풍요를 누리고 싶은 욕망들이 제 안에 가득합니다.\n\n주님, 이런 제 욕망들이 얼마나 왜곡되어 있는지 깨닫게 하소서. 세상의 기준으로 성공을 바라보고, 사람들의 인정을 최고의 가치로 여기며, 물질의 풍요만을 추구했던 제 모습을 회개합니다.\n\n겟세마네 동산에서 \"내 원대로 마시고 아버지의 뜻대로 하소서\" 하신 예수님의 그 순종을 배우게 하소서. 당장은 힘들고 고통스러워도 주님의 뜻이라면 기꺼이 따르는 마음을 주소서.\n\n주님, 제가 품은 계획들을 정직하게 분별하게 하시고 그것이 주님의 뜻과 얼마나 다른지를 보게 하소서. 저의 왜곡된 욕망은 내려놓게 하시고 주님의 더 크신 계획에 사로잡히게 하소서.\n\n이제는 제 뜻이 아닌 주님의 뜻을 구하며, 그 뜻에 제 삶을 맞추어 가는 자로 살게 하소서. 비록 모든 것이 막막해 보여도 주님 손에 제 미래를 맡기며 한 걸음씩 나아가게 하소서."}, {"number": 15, "topic": "그 뜻이 하늘에서도 땅에서도", "text": "은혜로우신 하나님 아버지,\n\n이제 제가 알게 된 주님의 뜻을 향해 간구합니다. 단순히 수동적으로 기다리며 \"어차피 주님이 하실 텐데\" 라고 말하지 않겠습니다. 주님께서 우리와 함께 동역하기 원하심을 믿습니다.\n\n아버지, 제가 만나는 사람들이 예수님을 알게 되기를 간구합니다. 우리 교회가 이 지역 안에서 주님 나라의 정의와 사랑과 평화를 드러내는 향기로운 공동체가 되게 하소서.\n\n비록 그 과정을 제가 다 통제할 수 없을지라도, 결국 주님께서 이루실 것을 믿고 기도합니다. 우리 성도들이 각자의 자리에서 주님을 더 깊이 알아가게 하시고 각자에게 주신 사명을 발견하고 감당하게 하소서.\n\n엘리야의 기도로 비를 내리게 하셨듯이, 우리의 기도를 통해 일하실 주님을 신뢰합니다. 저의 연약함과 부족함에도 불구하고 주님의 뜻을 이루는 통로가 되게 하소서.\n\n이 도시와 이 땅 위에 하늘의 뜻이 이루어지기를 간절히 소망하며, 그 일에 저를 쓰임 받는 도구로 삼아주소서. 더 이상 방관자가 아닌 주님 나라의 능동적인 동역자로 살아가게 하소서."}]}, {"id": 6, "title": "오늘 우리에게 일용할 양식을 주소서", "subtitle": "마태복음 6:11", "sermon": "불안한 시대를 살아가며\n\n현재 우리 시대를 상징하는 암울한 단어들이 참 많습니다. 특히 젊은 층과 연관되어 많이 발견됩니다. N포세대, 흙수저, 이태백... 이태백은 \"이십대 태반이 백수다\"를 줄인 말입니다.\n\n하여간 우리 사회 안에서 발견되는 다양한 지표들은 확실히 암울해 보이고, 대한민국의 미래를 전망하는 책들을 살펴보다 보면 마음이 쓰라리는 느낌을 갖게 됩니다.\n\n아마 그래서인지 우리 사회는 지금 미래를 준비하는 데에 거의 '광적'으로 집중하고 있습니다. 주식투자나 가상화폐에 대한 집착은 커지고, 재테크 유튜브 채널에서는 매일 '돈'과 관련된 새로운 정보들을 쏟아내고 있는 중입니다. 여러 직장인들은 퇴근 후에 또 다른 일을 하거나 자격증 공부에 매달리고 있습니다. 이런저런 모양과 정의가 다를 수는 있지만, 궁극의 목표는 분명합니다. 원하는 것은 \"경제적 자유\"입니다. 어떻게든 자산을 만들고 불려서, 더 이상 힘들게 일하지 않아도 적당히 살아갈 수 있는 삶의 시스템을 만들기 위한 노력인 것입니다. 그래서 지금도 SNS에는 참인지 거짓인지를 알 길은 없어도 자신이 경제적 자유를 이뤘다는 사람들의 글들이 참 많습니다. 그리고 그런 삶을 동경하고, 애쓰기도 하지만 또 한편으로는 도무지 도달할 수 없어서 깊은 좌절감을 안고 살기도 합니다.\n\n하지만 오늘 주님이 가르쳐 주시는 이 기도, \"오늘 우리에게 일용할 양식을 주소서\"는 이런 세상의 풍조와 삶의 방식과는 전혀 다른 태도를 우리에게 가르치려 합니다.\n\n그래서 이제 이 짧은 기도문 안에 담긴 지혜를 살펴보고, 불안으로 가득한 우리의 현실 안에서 어떻게 하나님의 자녀의 풍성함을 누릴 수 있는지 발견하는 시간이 되기를 소망합니다.\n\n일용할 양식의 은혜\n\n일단은 구약에서 발견되는 '일용할 양식'의 이미지를 살펴보겠습니다. 무엇이 떠오르십니까? 바로 광야 한가운데에서 공급받던 '만나'입니다.\n\n그때, 하나님께서는 만나를 어떤 식으로 제공하셨습니까? 출애굽기 16장 4절입니다.\n\n\"주님께서 모세에게 말씀하셨다. 너희가 먹을 것을 하늘에서 비처럼 내려 줄 터이니 백성이 날마다 나가서 그날그날 먹을 만큼 거두어들이게 하여라. 이렇게 하여 그들이 나의 지시를 따르는지 따르지 않는지 시험하여 보겠다.\"\n\n가장 중요한 점은 먹을 것이 '하늘에서 내려온다는 점'입니다. 하나님께서 가르치고 싶으셨던 첫 번째 내용이 바로 이것인데, 이것은 단지 '음식'만 말하는 것이 아니라, 생존 그 자체이고 '삶' 그 자체이기도 했습니다. 한 마디로 우리의 모든 인생은 전부 매일매일 주어지는 '선물'이라는 개념이었습니다. 특히 이것을 왜 선물이라고 불러야 하는지 아십니까? 이스라엘이 순종하든지 불순종하든지 아무 상관없이 어쨌든 다음 날이 되면 어김없이 만나는 내렸기 때문입니다. 하나님은 가나안 안에서 농사를 짓게 되기 전까지 이스라엘의 어떠함과 상관없이 만나를 끊으신 적이 없습니다.\n\n그야말로 '은혜'이고, 대가 없는 선물이었던 것입니다. 그런데 당시 이스라엘의 상황 안으로 우리가 들어가 보겠습니다. 그 시대를 살던 사람들, 광야 한가운데에 있어서 도무지 먹을 것을 자기 힘으로 찾을 수 없던 그들이 자주 생각했던 것이 무엇이었을까요?\n\n성경을 보면 이런 사람들이 있었습니다.\n\n\"내일은 만나가 안 내리면 어떡하지?\" \"좀 모아 놓자! 쌓아 놓자!\"\n\n\"어휴, 매일매일 만나를 거두러 나가야 한다니! 이것은 너무 불안하잖아. 이렇게 사는 것은 너무 피곤하다.\"\n\n그래서 하루치가 아니라 더 많이 거둬서 저장해 두는데, 남김없이 썩어 없어지고 맙니다. 우리는 그런 사람들을 보면서 한심하게 생각했을지 모르겠습니다. 하지만 이런 모습이 현대를 살아가는 우리의 모습과 무엇이 다릅니까? 우리는 매일매일 '내일'을 걱정하면서 살고 있기 때문입니다.\n\n\"다음 달에 나갈 돈이 이만큼이나 있는데, 어쩌지?\"\n\n\"저금해 놓은 것이 이것 밖에 없는데, 너무 적은 것이 아닐까?\"\n\n\"노후 준비는 언제쯤 시작해야 하는 것일까?\"\n\n하나님께서 만나를 통해 가르치신 것은 그저 먹을 것을 줄 테니 잘 먹으라는 것이 아니라, 하나님께 대한 전적인 신뢰와 의존이었던 것입니다. 삶은 선물이라고, 매일매일 내가 주는 선물이니까, 그저 내 말을 듣고, 그 안에서 하루하루 만나를 거두러 나가라는 것입니다. 매일 아침 떨어지는 만나는 하나님의 메시지였습니다.\n\n\"나는 너를 잊지 않았다. 오늘도 맛있게 먹으렴!\"\n\n\"내가 너를 먹이고 있단다. 염려 말아라! 나를 신뢰하거라.\"\n\n\"내일 또 줄게. 손 안에 오늘 먹을 것만 있다고 해도 불안해하지 말아라.\"\n\n바로 이것이 하나님을 아버지로 둔 자들과 아버지가 없는 자들의 엄청난 차이인 것입니다. 우주 최고 부자 아버지, 가장 선한 아버지를 둔 자들이 날마다 먹을 것과 입는 것 때문에 불안해하는 것이 말이 된다고 생각하십니까?\n\n그래서 주님은 우리에게 이 기도를 가르치시는 것입니다. 오늘 우리에게 일용할 양식을 달라고 외칠 때마다, 이 위대한 이야기를 기억하는 것입니다. 그렇습니다. 우리에게는 아버지가 계십니다! 오늘 내린 만나가 내일 또 내렸습니다! 그러니 괜찮습니다!\n\n그런데 이것을 전혀 믿지 않으면 이런 생각을 품고 살게 됩니다. 누가복음 12장 16-19절입니다.\n\n\"어떤 부자가 밭에서 많은 소출을 거두었다. 그래서 그는 속으로 '내 소출을 쌓아둘 곳이 없으니 어떻게 할까?' 하고 궁리하였다. 그는 혼자 말하였다. '이렇게 해야겠다. 내 곳간을 헐고서 더 크게 짓고, 내 곡식과 물건들을 다 거기에다가 쌓아 두겠다. 그리고 내 영혼에게 말하겠다. 영혼아, 여러 해 쓸 많은 물건을 쌓아 두었으니 너는 마음 놓고 먹고 마시고 즐겨라.'\"\n\n사실 현대를 사는 우리의 관점에서 보면, 이 사람은 전혀 어리석지 않습니다. 오히려 지혜롭습니다. 아마 SNS에 이런 글을 올리고 인증까지 하면 아마 이 사람은 분명 인플루언서가 될 것입니다. 주변에는 이런 삶을 배우려고 하는 이들이 몰려들 것이기 때문입니다. 완벽한 노후 준비와 경제적 자유가 주어진 것이니까요. 그런데 하나님의 평가는 전혀 달랐습니다. 이 비유 자체가 어리석은 부자 비유입니다. 왜 그렇습니까? 이미 말씀드린 것처럼 하나님은 우리에게 삶을 선물로 주시는데, 인생의 미래에서 하나님을 완전히 배제시켜버린 것입니다. 오직 자기가 미래를 통제할 수 있다는 확신에 차 있었기 때문입니다.\n\n지금 이 비유는 우리가 앞으로는 보험에도 들지 말고, 저축이나 노후 준비를 전혀 하지 말라는 이야기가 아닙니다. 성경은 우리의 삶을 극단으로 몰아가라고 부추기는 것이 아니기 때문입니다. 잠언에서는 개미처럼 부지런히 일하고, 미래를 준비하는 삶을 칭찬합니다. 그것이 지혜라고 말씀합니다. 그런데 문제는 우리 마음이 어디에 있으며, 우리의 궁극적인 신뢰의 대상이 과연 누구냐는 것입니다. 바로 거기에서 하나님의 백성인가 아닌가가 분별되는 것입니다.\n\n그래서 우리는 이 기도를 드리면서 생각합니다. 그렇습니다. 이 모든 것은 하나님이 주시는 것입니다. 내 인생은 그 분이 허락하시는 선물들인 것입니다. 그리고 그럴 때에야 우리는 안심하며 현재를 살 수 있습니다. 또 그제서야 자기만을 위한 삶이 아니라, 하나님 나라를 위해 가난하고 연약한 자들을 위한 청지기로 사는 것이 가능해지는 것입니다.\n\n왜 그렇습니까? 모든 것이 하나님의 선물이지, 그저 자기 노력으로 얻어낸 결과물이 아니기 때문입니다. 그 누구도, 어떤 특정 그룹이나 집단도 독점이나 과점할 수 없는 경제 체제가 곧 하나님 나라의 방식임을 가르치고 계신 것입니다. 그런데 우리는 너무나 자주 착각합니다. 내가 번 돈이나 산 물건들이 순전히 자기가 잘 해낸 것으로 생각하기 때문입니다. 솔직해져 보겠습니다.\n\n\"내가 이렇게 잘 살 수 있는 것은 내가 노력했기 때문입니다.\"\n\n\"내가 그동안 공부를 얼마나 열심히 했는데!\"\n\n\"내가 그동안 얼마나 열심히 살아왔는데! 노력과 땀을 아십니까? 이것은 순전히 그 결과물이고 결실인 것입니다!\"\n\n물론 왜 아니겠습니까? 정당한 노력에 대한 결과는 잠언이 말하는 세상의 자연스러운 질서입니다. 하지만 더 분명히 알아야 할 것은 그 질서가 제대로 작동하도록 허락해주신 분이 하나님이라는 사실입니다. 우리가 지금 호흡이 끊어지지 않는 이유, 우리가 건강을 유지하는 이유, 직장을 다니고 생산적인 결과물들을 낼 수 있는 모든 근거가 전부 하나님으로부터 나옵니다. 사실 이것은 온 우주에 가득한 피조물들과 온 인류에게도 작동하고 있는 놀라운 은혜이자 섭리이기도 합니다. 지혜로운 사람들은 이 사실을 아는 것이고, 어리석은 자들은 이것을 놓치고 무시하는 것뿐입니다.\n\n하지만 만약 하나님께서 막으신다면, 호흡을 끊으신다면, 건강을 무너뜨리신다면 아무리 경제적 자유를 이뤘다고 자랑해도, 자기의 노력이 만들어낸 모든 업적을 자랑하던 사람이라도 아무 의미가 없어집니다.\n\n하늘의 생명을 구하며\n\n그래서 주님이 그러셨습니다.\n\n\"들에 핀 백합화를 보아라. 하늘을 나는 새를 보아라! 저것들도 먹이고 입히시는데, 하물며 너희들이겠느냐? 그러므로 너희는 먼저 그 나라와 의를 구하라! 그러면 모든 것을 더하여 주실 것이다.\"\n\n결국 '오늘 우리에게 일용할 양식을 주소서'라는 이 기도는 하나님 나라의 백성의 삶을 대하는 태도와 살아가는 방식을 확인하고, 참여하는 기도입니다. 매일 이 기도를 드리면서 '경제적 안정'을 목표하지 않겠다고 말하는 것입니다. 어떻게든 내 노력으로 인생 전체를 보호해 내겠다는 생각을 버리는 것입니다.\n\n그래서 안심하고 탐욕을 버리는 것입니다. 우리는 그저 하루하루 주어진 삶을 신실하게 살면 된다는 것을 아는 것입니다. 이것은 아무 생각 없이 마냥 욜로(YOLO)하라는 것이 아닙니다. 오히려 전능하신 아버지의 곳간을 맡은 청지기 아들처럼 살 수 있다는 것입니다.\n\n그런데 우리의 본성에 비춰볼 때, 현실적으로 이 기도만큼 우리에게 불편한 기도가 또 없습니다. 여기서 '일용할'을 더 잘 번역하려면 '충분한, 족한'입니다. 즉, 그 이상을 구하면 그것은 탐욕이 되고, 하나님의 은혜와 도우심을 의존하며 사는 삶과는 멀어진다는 것입니다. 그런데 우리는 이미 사고방식이 완전히 어리석은 부자스러워져 버렸습니다.\n\n솔직히 말씀드려서 대한민국 국민들은 전 세계적인 관점에서는 상당한 부자가 맞습니다. 다들 상대적으로 가난하다고 아우성이긴 해도 절대적 빈곤과는 거리가 먼 사람들이 대부분입니다. 집집마다 차 한 대나 두 대씩은 갖고 살고 있습니다. 최근 통계를 보면, 차 한 대 굴리는 것만으로도 전 세계에서는 상위 20퍼센트 안에 속하는 부자입니다. 우리 중 누가 끼니를 굶습니까? 다이어트하려고 오히려 돈 주고 굶는 일이 벌어지는 사회입니다. 그런데도 이 안에서는 상대적으로 가난하다는 생각, 도무지 멈출 수 없는 탐욕의 경쟁을 벌이는 상황인 것입니다. 절대적인 잣대에서 우리는 분명 부자이고, 문제는 성경에서 부자는 하나님 나라를 떠날 가능성이 매우 높은 곤경에 처한 존재라는 사실입니다.\n\n그래서 우리는 이 기도를 드려야만 합니다. 이 기도 속에서 잘못된 탐욕과 목표를 버리겠다고 말하는 것이고, '일용할' 양식, '오늘을 사는 데 충분한 양식'만 구하는 소박함을 추구하는 고백을 드리는 것입니다.\n\n그렇다고 이 기도가 \"이제는 돈을 적게 벌겠습니다\"가 아닙니다. 그저 우리는 오늘 주신 것에 만족하기 시작하고, 더 넘치게 얻은 것들을 형제자매와 나누며 살겠다는 의미인 것입니다.\n\n그리스도의 양식을 구하며\n\n그런데 이 이야기는 예수님 안에서 훨씬 더 심화되는 것을 봅니다. 주님은 늘 다양한 친구들과 먹고 마셨는데, 거기에는 늘 죄인과 세리와 창녀들이 있었습니다.그래서 주님의 별명이 '먹기를 탐하고, 포도주를 즐기는 자'였습니다. 주님이 향락을 좋아해서 그랬던 것이 아닙니다. 오히려 당시의 손가락질 당하고, 배제된 자들이 돌아온 것에 대한 감사와 기쁨의 잔치였던 것입니다.\n\n그것을 가장 극적으로 보여준 사건이 '오병이어'였습니다. 광야 한가운데에서 수많은 이들이 허기진 상황이었는데, 주님은 거기 모인 모두가 배불리 먹고도 남을 만큼의 양식을 공급하셨습니다. 아마 그 순간 구약에서의 추억이 떠올랐을 것입니다. 광야 한가운데에서 만나가 내리고, 반석에서는 물을 내려 주시던 그 일이 예수님을 통해서 또 다른 방식으로 재현된 상황이었기 때문입니다.\n\n그런데 이 장면은 구약의 모든 예언들이 성취되는 장면이었습니다. 이사야 25장 6-8절 일부를 읽어보겠습니다.\n\n\"만군의 주님께서 이 세상 모든 민족을 여기 시온 산으로 부르셔서, 풍성한 잔치를 베푸실 것이다... 주님께서 죽음을 영원히 멸하신다. 주 하나님께서 모든 사람의 얼굴에서 눈물을 말끔히 닦아 주신다. 그의 백성이 온 세상에서 당한 수치를 없애주신다.\"\n\n또, 이사야 55장 1-3절은 이렇게 말씀합니다.\n\n\"너희 모든 목마른 사람들아. 어서 물로 나오너라. 돈이 없는 사람도 오너라. 너희는 와서 사서 먹되, 돈도 내지 말고 값도 지불하지 말고 포도주와 젖을 사거라... 들어라. 내가 하는 말을 들어라. 그리하면 너희가 좋은 것을 먹으며, 기름진 것으로 너희 마음이 즐거울 것이다. 그러면 너희 영혼이 살 것이다.\"\n\n이것이 다 무슨 말씀인지 아시겠습니까? 예수님이 왜 그런 사람들과 어울리고, 함께 먹고 마셨는지 이해가 되십니까? 이 모든 행동들이 하나님의 구원이 시작되었음을 보여주는 이미지들이었던 것입니다. 이제 주님은 굶주린 이들에게 땅의 양식만 주시는 것이 아니라, 하나님만 주실 수 있는 식사를 주고 계셨던 것입니다. 만나도 알고, 메추라기도 알았지만 여전히 불안과 탐욕으로 죄인으로, 세리로 살던 이들에게 마침내 탐욕과 불안을 제거할 수 있는 길을 보여주신 것입니다.\n\n사실 오늘 우리가 보는 '마태복음'의 구절은 '헬라어' 본문 자체가 굉장히 특이하게 구성되어 있습니다. 어차피 자세히 설명하면 듣다가 피곤해지실 테니까, 결론만 말씀드리자면 마치 이 구절은 \"우리의 내일 양식을 오늘 주십시오\"처럼 보입니다. 누가복음은 너무나 정확하게 '그날그날 필요한 양식을 주세요'라고 표현되어 있는데, 마태복음은 다르게 구성되어 있습니다. 결국 성경은 이 두 의미를 모두 의도한 것이 확실한데, 마태복음이 말하는 내용을 해석하자면 이런 의미일 것입니다.\n\n\"우리의 내일 양식, 즉 미래에 속한 그 나라, 하나님 나라의 생명의 양식을 바로 지금 여기에 주소서.\" \"하나님 나라에 예비된 영적 양식을 오늘 이 땅에서도 받게 하소서\"라는 것입니다.\n\n실제로 이 기도는 오병이어를 통해 응답되었고, 예수님의 죽으심과 부활 안에서 완벽하게 성취되었습니다. 주님은 우리에게 자신을 소개하시기를 생명의 떡을 주시는 분이시고, 생명의 잔을 주시는 분이라 말씀하십니다.\n\n만나를 먹던 사람들은 다시 또 굶주렸지만, 그래서 또다시 불안하고, 또다시 탐욕을 부릴 수밖에 없었지만, 이제 그 떡을 먹고, 그 잔을 마시는 사람마다 영원히 목마르지 않고, 영원히 주리지 않는 인생이 되는 일이 벌어진다는 것입니다.\n\n그래서 우리가 매일 해야 하는 일이 무엇입니까? 날마다 그리스도를 먹는 일입니다. 우리에게 육체적 필요도 물론 중요하지만, 그보다 더 근본적인 필요는 영적인 필요라고 말씀하시는 것입니다.\n\n우리 안에서 끊임없이 올라오는 불안과 탐욕을 멈출 수 있는 유일한 길은 영원히 주리지 않고, 영원히 목마르지 않는 그리스도를 먹으며 살아가는 방식뿐입니다.\n\n매일매일 그리스도와 눈을 맞추고, 어제의 말씀이 아니라, 오늘의 말씀을 또 발견하고 붙드는 것입니다. 어제 알게 된 예수님이 아니라, 오늘 새롭게 발견한 예수님으로 다시 만족하며 새롭게 살아갈 수 있다는 것입니다. 그래서 아침마다 주님 앞에 머물러서 그 분을 깊이 묵상하는 것이 얼마나 큰 힘과 소망이 되는지 모릅니다. 며칠 전에도 이번 주 설교를 생각하면서 주님을 묵상할 때마다 저절로 찬양이 흘러나왔습니다.\n\n\"평화~ 평화로다~ 하늘 위에서 내려오네. 그 사랑의 물결이 영원토록 내 영혼을 덮으소서.\"\n\n왜 이런 고백이 나옵니까? 하늘 양식이 내 맘을 만족시키니까, 불안은 온데간데없어지고, 오직 당신으로 충분하다는 고백이 나오는 것입니다.\n\n우리가 매일 그리스도 앞에 서서, 인격적으로 알아가는 삶을 살 때 우리는 불안과 탐욕으로 물든 인간성이 아니라, 평화와 감사로 사는 존재가 될 수 있습니다. 그래서 우리는 이 기도를 드리면서, 하나님의 임재 앞에 섭니다.\n\n\"주여, 오늘도 저는 하늘에 속한 생명의 빵을 구합니다. 그리스도가 내 안에 계시고, 내가 그 안에 있음을 알게 하소서! 주여, 저는 하늘의 음료를 구합니다. 끝없는 우리의 갈망을 만족시키시고, 기쁨과 감사가 넘치게 하소서.\"\n\n일상 속에서 실천하며\n\n그렇다면, 이제 살펴볼 것은 이 기도를 진정으로 하는 사람들이 살아가야 할 삶의 방식에 대한 문제인데, 세 가지만 간단하게 정리해 보고, 함께 기도하며 실천해 나가면 좋겠습니다.\n\n첫 번째 실천은 '검소한 삶'입니다. 기도의 내용 그대로, '일용할 것' '충분한 것', '필요한 것' 그 이상을 추구하기를 멈추는 것입니다. 그래서 우리가 무언가를 살 때, 혹시 '사치'를 부리는 것은 아닌가, 너무 '낭비'하는 것은 아닌지를 살펴보고, 최선의 노력을 시도하는 것입니다. 필요한 것과 원하는 것을 구분하는 훈련을 하는 것입니다. 뭔가 애매모호할 때에는 가급적 절제하는 삶을 살아가겠다는 다짐을 하는 것입니다.\n\n두 번째는 '나눔의 삶'을 사는 것입니다. 우리 사회가 계속해서 '탐욕'을 위해서 이웃이 가진 것을 탈취하고, 내 것으로 채우라고 장려하고 있습니다. 하늘에서 풍족한 양식이 내려온다는 것을 모르는 사람들은 이 땅에서 남이 가진 것에 눈독 들일 수밖에 없습니다. 그래서 경쟁은 더 심화되고, 그 사이에서 사랑은 끼어들 틈도 없어지고 맙니다. 그래서 우리는 이 기도를 드리면서, 반대로 살아갑니다. 하늘에서 일용할 양식이 주어진다는 넉넉한 자세로 어려운 이웃을 돌아보고 구체적으로 나누는 것입니다.\n\n우리 교회는 아직 미자립 교회이지만, 그래도 절기헌금 전부를 가난하고, 소외 받는 이웃을 위해 쓰기로 했습니다. 사순절, 고난주간, 부활주일, 그리고 성탄절과 신년 헌금들은 이웃을 위해서만 쓸 것입니다.\n\n그러니, 그런 헌금들은 매일 이 기도를 드리면서, 조금씩 모아두면 좋겠습니다. 가난한 이웃들을 위해 이 헌금이 하나님이 주시는 일용할 선물로 사용될 수 있도록 말입니다. 바로 작년 데이터만 살펴봐도 전 세계 인구 10명 중 1명은 영양결핍 상태이고, 성장 쇠약 어린이는 최근 3년 사이에 30퍼센트나 증가해서 평균적으로 매일 250명의 아이들이 죽고 있다고 합니다. 지금도 음식을 먹지 못해 굶어 죽는 사람이 1분당 11명이라는 통계도 있습니다. 우리로서는 전혀 와 닿지 않는 이야기겠지만, 실제로 우리 세계 안에서 그런 끔찍한 일이 일어나고 있습니다. 그런데도 그들의 형편을 돌아보지 않는 사람들이 과연 이 기도를 진정으로 드리는 사람이라고 할 수 있겠습니까? 우리가 예수님이 오셔서 어떤 사람들과 어울리셨고, 무엇을 하셨는지 안다면, 이것은 너무나 당연한 삶인 것입니다. 찾아보면 도울 수 있는 다양한 방법들이 있습니다. 우리가 각자 실천하기도 하고, 또 공동체적으로도 함께 찾아보고 실천해 볼 수 있으면 좋겠습니다.\n\n마지막 실천은 우리가 '성실히 일하고, 또 잘 쉬는 삶'을 사는 것입니다. 그저 먹고 살기 위해서가 아니라, 이것이 이웃을 사랑하는 방식이기 때문에 우리는 '성실히' 일하는 것입니다. 그리고 동시에 하나님이 우리를 먹이시는 것을 믿으면서, 잘 쉬어야 합니다.\n\n우리가 쉬지 않고 너무 내달리는 이유는 탐욕 때문이거나, 아니면 하나님을 신뢰하지 않기 때문입니다. 그래서 이 기도를 제대로 드리는 사람은 '성실히 일할 줄도 알고, 잘 안식할 줄도 압니다.' 그런 사람은 경제적인 수준과 관계없이 삶의 자세와 마음에 넉넉함과 감사가 있을 수밖에 없습니다.\n\n하늘의 풍성함을 누리며\n\n지금까지 '오늘 우리에게 일용할 양식을 주소서'라는 기도를 살펴보았습니다. 이 기도는 우리 시대가 가진 불안과 강박, 그리고 개인주의와 물질만능주의에 대한 강력한 해독제입니다. 부디 이 기도를 드리면서, 하나님이 얼마나 신실하게 우리의 필요를 알고 채워나가시는 분인지 기억하시고, 또 무엇보다도 생명의 떡과 잔만이 우리를 가득 채울 수 있다는 것을 신뢰할 수 있기를 축복합니다. 그래서 불안한 마음으로 탐욕을 부리면서 혼자 잘 사는 인생이 아니라, 공동체와 세상을 위한 청지기로 사는 법을 배워가시고, 그렇게 검소함과 나눔의 삶이 체화되는 은혜가 있기를 소망합니다.\n\n이미 말씀드린 대로 이 기도는 우리에게 여전히 불편하고, 큰 옷입니다. 특히 탐욕의 시대에 이런 기도를 드리는 것은 우리에게 위험하게 보이기까지 할 것입니다.\n\n하지만 선택하십시오. 세상의 방식대로 살 것인지, 하나님 나라 백성으로 살 것인지 말입니다. 끊임없는 불안과 경쟁 안에서 허우적댈 것인지, 아니면 하나님을 신뢰하면서 소박하지만 더욱 풍성한 삶을 살 것인지 말입니다.\n\n매일 아침 이 기도를 드릴 때, 우리는 전혀 새로운 삶의 방식을 추구하게 될 것을 믿습니다. 부디 한 주간도 이 기도에 매이고, 잘 훈련되는 은혜가 있기를 주님의 이름으로 축원드립니다.", "questions": ["당신의 삶에서 '일용할 양식' 이상의 것을 추구하고 있는 부분은 무엇인가요? 구체적으로 어떤 불안이나 탐욕이 그 추구의 동기가 되고 있나요?", "매일 아침 만나를 거두러 나가야 했던 이스라엘 백성처럼, 당신은 매일 어떻게 하나님을 의지하고 신뢰하나요? 혹시 '비상금'처럼 하나님 외에 의지하는 것들이 있지는 않나요?", "오늘 하루 동안 당신에게 허락된 '만나'는 무엇이었나요? 그리고 그것을 어떻게 사용했나요? 혹시 나누어야 할 것을 쌓아두고 있지는 않나요?"], "missions": [{"number": 16, "topic": "오늘 우리에게 일용할 양식을 주소서", "text": "하늘의 하나님 아버지,\n\n오늘도 아침에 눈을 떴습니다. 숨 쉬게 하시고, 일어날 힘을 주시고 새로운 하루를 선물로 주심에 감사드립니다.\n\n아버지, 고백합니다. 늘 부족할까봐, 없어질까봐, 뒤처질까봐 불안한 마음으로 살곤 합니다. 넉넉치 못한 부분을 자주 들여다보며 내일 일을 걱정하느라 오늘의 감사를 놓쳤습니다.\n\n그러나 이제 믿습니다. 광야의 만나처럼, 오늘의 양식도, 내일의 양식도 신실하신 아버지께서 책임져 주실 것을 온전히 신뢰하며 나아가기 원합니다.\n\n아버지께서 주신 것에 만족하게 하시고 더 많이 쥐려 하기보다 더 많이 나누며 살게 하옵소서. 나의 것이 아닌 맡겨주신 것으로 알고 지혜롭고 신실한 청지기로 살아가게 하옵소서.\n\n불안과 걱정이 찾아올 때마다 이스라엘 백성을 40년간 어김없이 만나를 내리시고 인도하신 신실하신 아버지를 기억하게 하옵소서. 내 생각과 걱정이 아닌 아버지의 약속을 붙들게 하옵소서."}, {"number": 17, "topic": "오늘 우리에게 일용할 양식을 주소서", "text": "사랑하는 주님,\n\n광야에서 만나와 메추라기를 주시고도 여전히 만족하지 못했던 이스라엘처럼 우리도 늘 채워지지 않는 마음이었습니다. 더 높은 자리, 더 많은 소유를 구하며 참된 배부름을 알지 못했습니다.\n\n그러나 이제는 고백합니다. 우리의 깊은 갈망을 채우실 수 있는 분이 오직 예수님뿐임을 믿습니다. 육의 양식이 아닌, 영의 양식을 주시는 생명의 떡되신 예수님을 바라봅니다.\n\n오늘도 말씀을 통해 주님을 맛보며 참된 배부름을 경험하게 하옵소서. 어제 만난 예수님이 아닌 오늘 새롭게 발견하는 예수님으로 충만한 기쁨을 누리게 하옵소서.\n\n값없이 먹고, 값없이 마시라 하신 주님, 우리의 공허한 마음에 주님의 평화로 가득 채워주시고 그 사랑의 물결이 우리 영혼을 영원토록 덮게 하옵소서.\n\n매일 아침 첫 시간 주님과의 깊은 교제를 통해 새 힘을 얻게 하시고 찬양이 절로 흘러나오는 은혜를 경험하게 하옵소서."}, {"number": 18, "topic": "오늘 우리에게 일용할 양식을 주소서", "text": "하늘에 계신 우리 아버지,\n\n매일 드리는 이 기도가 단순한 습관이 아닌 우리 삶의 변화가 되게 하옵소서.\n\n주님, 우리의 소비 습관을 돌아봅니다. 때로는 필요보다 체면을 생각했고 검소함보다 사치를 택했습니다. 불필요한 것들로 집을 채우면서도 마음의 빈자리는 채우지 못했습니다. 용서하여 주시고 진정 필요한 것이 무엇인지 분별하게 하옵소서.\n\n주변의 가난한 이웃들을 생각합니다. 지금도 한 끼 식사가 간절한 이들, 겨울 난방비가 부담인 어르신들, 아이들 학용품도 제대로 못 사주는 어려운 가정들이 있습니다. 우리의 눈을 열어 그들을 보게 하시고 작은 것이라도 나누는 기쁨을 알게 하옵소서.\n\n과도한 일에 매여 영혼의 쉼을 잃지 않게 하시고 건강한 노동과 달콤한 안식이 균형을 이루게 하옵소서. 일하는 시간 속에서도 주님을 바라보며 쉬는 시간 속에서도 주님을 느끼게 하옵소서.\n\n우리의 모든 것이 주님께서 맡기신 청지기의 삶임을 기억하며 오늘도 신실하게 살아가게 하옵소서."}]}, {"id": 7, "title": "우리가 용서하듯, 우리도 용서하소서", "subtitle": "마태복음 6:12", "sermon": "들어가며\n\n최근 우리가 접하는 드라마나 웹툰들의 특징을 살펴보면, 과거 드라마에서 흔히 보던 답답한 '고구마 전개'는 사라지고 '사이다 전개'가 주를 이루고 있습니다. 이는 하나의 트렌드라 할 수 있는데, 무언가를 참고 견디며 차근차근 해결해 나가는 방식보다는 즉각적으로 응징하고 해소하는 방식을 더 선호하게 된 것입니다. 이에 따라 각종 커뮤니티나 SNS에서는 '무례한 손님에게 통쾌하게 한 마디를 던지며 응징하는 알바생 이야기', '갑질하는 상사에게 시원하게 할 말을 하는 직장인' 이야기들이 올라오고 있으며, 사람들은 이를 통해 대리만족을 느끼고 있습니다.\n\n분명히 체감되는 것은 이 시대가 용서와 화해보다는 응징과 복수를 더 자연스럽게 여기는 분위기라는 점입니다. 물론 우리 사회가 그동안 그저 억누르고 참는 것만을 미덕으로 여기는 분위기였기에, 이제는 억울함과 부당함에 대한 반향이 일어나는 것일 수도 있습니다. SNS에서는 매일같이 무언가에 대한 분노의 감정이 넘실거리고, 우리 사회에서는 한번 '악당'으로 낙인찍힌 이들에게는 용서나 회복의 기회조차 주어지지 않으며, 반드시 파멸되어야 한다는 식의 논리만이 팽배해 있습니다. 이러한 분위기 속에서 누군가가 '용서'를 말하게 되면 오히려 비난을 받기도 합니다. 그런데 예수님께서는 이런 세상을 살아가는 우리에게, 머리로는 이해가 되어도 몸이 반응하기 어려운, 정말 어려운 기도를 가르쳐주시려 합니다.\n\n그것은 바로 \"우리가 우리에게 죄 지은 사람을 용서하여 준 것 같이 우리의 죄를 용서하여 주시고\"라는 기도입니다.\n\n이제 이 기도를 살펴보면서, 하나님 나라에 참여한다는 것이 무엇이며, 우리의 기도가 결국 어디로 향하게 되는지를 진실하게 받아들이는 시간을 가져보고자 합니다.\n\n말씀의 의미를 살펴보며\n\n먼저 이 구절을 처음 접하게 되면, 우리는 의아함을 느낄 수 있습니다. \"하나님, 제가 다른 사람을 용서한 것처럼 저를 용서해 주세요\"라는 이 말이, 마치 우리가 먼저 누군가를 용서하는 행동이 하나의 '조건'이 되어 그 조건을 근거로 하나님도 용서해 주셔야 한다는 것처럼 보이기 때문입니다.그런데 주기도문이 등장하는 마태복음과 누가복음 모두를 살펴보면, 흥미로운 점을 발견하게 됩니다. 두 본문의 논리 순서가 정확히 반대로 되어 있다는 것입니다.\n\n누가복음에 나오는 기도문을 원문의 어순에 맞춰 직접적으로 해석하면 \"우리의 죄를 용서해 주세요. 우리에게 빚진 모든 사람을 우리가 용서합니다\"가 됩니다. 반면 마태복음에서는 \"우리가 우리에게 빚진 사람의 빚을 없애준 것 같이 우리의 빚을 없애주세요\"로 되어 있습니다. 성경은 이 두 가지 논리 모두를 받아들여야 한다고 주장하는 것으로 보입니다. 즉, 하나님의 용서와 우리의 용서가 서로 긴밀하게 상호작용하고 있다는 것입니다. 하나님의 용서가 우리의 용서에 영향을 미치고, 반대로 우리의 용서도 하나님의 용서에 영향을 미치는 독특한 관계성을 말씀하고 계신 것입니다.\n\n내가 너희의 빚을 감당하겠다\n\n이 기도에서 가장 먼저 발견할 수 있는 것은 '우리가 빚진 사람들'이라는 개념입니다. 사실 우리는 이 기도문을 듣자마자 바로 '죄 용서'를 떠올리곤 하는데, 원어에는 '죄'라는 단어가 아니라 '빚'이라는 단어를 사용하고 있습니다. 이 부분에서 누가복음의 돌아온 둘째 아들의 비유를 생각해 보겠습니다. 아버지가 건강히 잘 살아 계신데도, 둘째 아들은 자기가 상속받을 몫을 미리 달라고 하더니 모든 재산을 탕진해 버리고 말았습니다.\n\n이는 마치 \"나는 아버지가 가진 모든 좋은 것들과 재산은 갖고 싶지만, 아버지의 통제는 받고 싶지 않습니다. 난 이제 아버지가 없는 걸로 치겠습니다\"라는 말과 같았습니다. 그리고 바로 그것이 우리 모든 인류가 하나님을 대하는 태도였습니다.\n\n생각해 보십시오. 세상 모두가 하나님이 만드신 이 세상 속에서 그분의 선물들을 마음대로 누리며 살아갑니다. 이것이 사실입니다. 태양과 달이 주는 유익을 경험하고, 하나님이 만드신 세상에서 길러 올릴 수 있는 모든 성취감과 행복감을 모든 사람이 느낄 수 있습니다. 자기가 직접 만들거나 얻어낸 것이 아닌데도 하나님이 주신 것들을 당연하게 누리고 있는 것입니다. 그러면서도 하나님은 합당한 존중이나 대우를 받지 못하고 계십니다. 인간들은 모든 사회 시스템이나 인생 안에서 하나님을 완전히 구석으로 몰아버렸고, 아예 없는 존재 취급하고 있습니다. 그것이 둘째 아들의 태도였습니다. 받을 것은 받되 아버지는 지워버리는 패륜자식과 같은 모습이었던 것입니다.\n\n바로 이것이 우리가 하나님께 진 빚의 실체입니다. 모든 인류가 하나님의 명예에 손해를 입혔을 뿐만 아니라, 하나님이 주신 모든 선물들도 우리 마음대로 사용하면서 탕진하고 있기 때문입니다. 이 부분을 자세히 생각해 보겠습니다. 과학자들의 계산에 따르면, 우리 몸을 구성하는 원자들이 우주의 형성 과정에서 만들어질 확률은 10의 10조분의 1이라고 합니다. 우리는 이런 것을 '기적'이라고 부릅니다. 즉 인간의 존재 자체가 엄청난 은혜이고 선물이라는 것입니다. 거기에 우리가 매일 숨 쉬는 공기, 물, 현재 누리게 되는 모든 관계들 역시도 하나님의 선물들입니다.\n\n우리가 앞서서 '일용할 양식을 주소서'라는 기도를 살펴보았는데, 오늘 이 기도가 그 이야기 바로 다음에 등장하는 이유가 바로 이런 개념과 연결되어 있을 것입니다. 하나님은 우리에게 만나를 주시는 분이고, 매일 은혜의 선물을 주시는 분이 분명합니다.\n\n그런데 사람들은 모두가 이 모든 것을 당연하게 여기고, 하나님에 대해서는 지워버린 채로 자기 삶도 세상도 마음껏 남용하고 낭비하며 파괴하며 살아왔습니다. 결국 지금 자연환경은 이제 쉽게 손 쓸 수 없을 만큼 망가지고 말았고, 사회에서는 수많은 착취와 이기적인 관계성만 남게 된 것입니다. 이 모든 차원들이 우리가 도무지 감당할 수 없는 엄청난 '빚'입니다. 우리는 하나님의 세상에 엄청난 손해를 입히고 말았고, 자기 자신도 비참해지고 말았습니다.\n\n사람들은 늘 자기가 희생자라고 생각하고, 피해자라고 생각하는 데 익숙합니다. 그리고 바로 그 때문에 하나님의 용서조차도 우리에게 너무 싫은 개념이 되고 말았지만, 그것은 심각한 오해입니다. 결국은 스스로 자초한 것일 뿐입니다. 하나님의 무한한 생명과 공급을 떠난 장본인이 우리이고, 덕분에 하나님의 선한 세상을 위협하고 있는 것도 우리인 것입니다.\n\n그래서 둘째 아들도 집에 다시 돌아가면서 아버지께 기대했던 것이 무엇이었겠습니까? 도무지 그 빚을 갚을 수 없기 때문에 다시 아들이 되는 것은 말도 안 된다고 생각했습니다. 그저 종으로, 품꾼으로 평생 일하면서 갚아가려는 생각만 했을 뿐입니다. 하지만 그것도 사실 불가능한 일이었습니다. 겨우 종이 평생 일한다고 그 지역의 갑부가 잃어버린 상속지분을 갚을 수 있겠습니까? 그럴 수 없었을 것입니다. 그런데 놀라운 일이 벌어졌습니다. 둘째 아들이 돌아올 때, 아버지는 그 엄청난 빚을 아랑곳하지 않고 벗은 발로 달려나갔습니다. 아버지는 그를 껴안아 주고는 아들이 가진 모든 권리를 회복시키고 잔치까지 베푸셨습니다.\n\n그래서 첫째 아들의 입장에서는 화가 났을 것입니다. 이것은 정의롭지 않았기 때문입니다. 마땅한 잘못에 대해서 정당한 처벌도 없고, 빚을 다 갚아내는 회복도 없이 원상태로 돌아가게 한 것이니까요. 또한 실상 하나님의 성품에도 맞지 않아 보였을 것입니다. 그래서 여기에 빠진 부분이 하나 있는데, 사실은 미리 잔치를 벌이고 빚을 탕감해주는 이유가 있었다는 것입니다. 바로 그것이 예수님의 십자가였습니다. 우리가 감당해야 할 모든 빚을 진정한 첫째 아들이신 그분께서 다 갚으신다는 것이 전제되어 있었던 것입니다.\n\n사실 구약성경에는 이와 관련된 비전이 적혀 있었습니다. 레위기 25:10을 보면 이렇게 기록되어 있습니다.\n\n'너희는 오십 년이 시작되는 이 해를 거룩한 해로 정하고, 전국의 모든 거민에게 자유를 선포하여라. 이 해는 너희가 희년으로 누릴 해이다. 이 해는 너희가 유산 곧 분배받은 땅으로 돌아가는 해이며, 저마다 가족에게로 돌아가는 해이다.'\n\n바로 희년의 비전인데, 이것은 이 시대의 경제관념이나 정의 관념을 완전히 뛰어넘는 명령이었습니다. 혹시 누군가가 가난해져서 땅을 팔고 노예가 되고, 누군가는 크게 부유해지고 귀족처럼 되었다고 할지라도, 희년이 되면, 매 50년이 지날 때마다 모든 것이 리셋되는 것입니다. 노예는 자유를 얻게 되고, 잃었던 땅을 되찾게 됩니다. 아무리 부유했던 이도 자신이 가진 모든 것이 원래 하나님의 것임을 인정하고 필요한 것, 족한 것만 남기고는 가난한 자들에게 다시 되돌려 주어야 했습니다.\n\n오직 일용할 양식이 제공되는 것을 기뻐하고, 착취나 잉여재산을 위해 살아가지 않아도 된다고, 그러니 너희는 이렇게 살아가라고 말씀하셨던 바로 그 법, 그것이 바로 희년이었던 것입니다. 이것은 단순한 경제적 제도가 아니라, 이 세상을 향해서 하나님이 꿈꾸시던 궁극적인 비전이었습니다. 그리고 예수님은 공생애 사역을 시작하시면서 이사야 61장을 읽으셨습니다. \"주의 은혜의 해를 전파하게 하려 한다.\" 은혜의 해가 곧 희년이었습니다. 그리고 십자가 위에서 '다 이루었다'고 외치시면서 이 희년이 완성된 것입니다. 이것은 그저 선언이 아니라, 우리의 모든 실존적 상황을 전부 뒤집는 사건이었습니다. 부도 직전의 회사가 모든 부채를 탕감받은 것처럼, 완전히 끝장날 인생, 모든 숨이 끊어지고 그 어떤 회생절차도 불가능해 보이는 상황에서 다시 리셋이 이루어지게 된 것입니다.\n\n우리가 가장 먼저 이해하고 인정해야 할 부분이 여기에 있습니다. 우리는 고작 몇 가지 도덕적이고 개인적인 죄를 용서받은 것이 아닙니다. 우리는 결코 감당할 수 없는 빚을 진 존재라는 것입니다. 하나님이 인간에게 기대하셨던 모든 것을 우리는 거절하고 배반했기 때문입니다. 하나님은 우리와 사랑을 나누고 동역하고 싶으셨는데, 정작 우리는 내 멋대로 살겠다고 하면서 하나님의 세상을 이토록 깨뜨렸던 것입니다. 그럼에도 불구하고 하나님은 모든 빚을 탕감하셨고, 우리의 개인적인 것뿐만 아니라 이 세상 전체를 온전하게 회복하시겠다는 비전을 선언하고 계십니다. 이제는 희년이 시작되었다고, 빚 탕감의 잔치가 시작되었다고 말씀하시는 것입니다. 우리만 빚 탕감을 받은 것이 아니라, 예수 안에서 온 세상이 빚을 탕감받고 희년의 잔치에 참여하게 되었다고 하시는 것입니다.\n\n너희도 나처럼 하여라\n\n그러니 생각해보십시오. 우리 자신이 희년의 최대 수혜자라는 것을 받아들인다면, 우리는 자연스럽게 새로운 삶의 방식을 받아들일 수밖에 없습니다. 그래서 예수님은 마태복음 18장에서 일만 달란트 빚을 탕감받고도, 백 데나리온의 빚을 갚지 못한 동료를 용서하지 못한 종의 이야기를 들려주셨습니다. 물론 계산법에 따라 조금씩 달라질 수는 있지만, 당시 한 달란트는 평균적인 노동자의 15년치 월급과 맞먹는 금액이었습니다. 그러니까 1만 달란트면 얼마나 되겠습니까? 15만 년 동안 한 푼도 쓰지 않고 일만 해도 갚을 수 없는 돈입니다. 현대 화폐가치로 따지면 수천억에서 조 단위쯤 되는 금액입니다. 그러면 백 데나리온은 얼마일까요? 100일치 월급이니까, 현대의 가치로 따지면 천만 원에서 이천만 원 사이쯤 될 것입니다. 물론 누군가가 우리에게 천만 원이나 이천만 원 정도의 손해를 입혀도 그것은 굉장히 뼈아프고 고통스럽습니다. 그럼에도 불구하고 이 비유가 우리에게 가르치는 것은 분명합니다.\n\n우리가 누군가에게 빚을 탕감해 주어야 하는 것은 우리 각자가 관대하기 때문이 아니라는 것입니다. 오히려 우리가 먼저 엄청난 탕감을 받았기 때문입니다. 그래서 한편으로 용서는 우리의 선택이 아니라, 일종의 예배 행위입니다. 우리를 용서하신 하나님을 기억하고 찬양하는 행동 방식인 것입니다. 또 그렇기 때문에 용서의 삶을 거부하고 거절한다면, 그 사람은 실상 하나님 나라와 아무 관련이 없는 사람일 수 있다는 수많은 경고가 발견되기도 합니다.\n\n물론 우리가 이 기도를 해나가고, 용서의 삶을 추구한다고 해서 '정의로움'까지 전부 포기하라는 말은 아닙니다. 예수님은 우리에게 '맹목적인 용서'를 요구하시는 것이 아닙니다. 주님은 우리가 겪은 불의와 아픔을 향해서 '어차피 그것은 사소한 거야'라고 말씀하지 않으십니다.\n\n실제로 마태복음 18장에서 주님은 잘못한 형제에 대해서는 책망하기도 하고, 공동체적 조치를 취하고, 또 필요한 경우에는 징계해야 한다고까지 말씀하고 계십니다. 참된 용서에는 정의와 사랑이 조화를 이룰 수밖에 없는 것이기 때문입니다. 그런 면에서 우리가 남들에게 너무 쉽게 용서를 강요하는 것도 옳지 않습니다.\n\n그럼에도 모든 과정의 최종 목표는 분명합니다. 모든 걸음 끝에 바로 희년의 성취, 관계의 회복이 있어야 한다는 것입니다. 모든 것이 바로잡히는 것, 마침내 정의를 바로 세워서 관계를 회복하고, 빚 탕감의 은혜가 임하게 하는 일을 소망해야 한다는 것입니다.\n\n아마 지금 이 이야기를 읽는 순간, 우리 머리 속에는 우리가 받았던 수많은 상처와 아픔이 떠오를지도 모르고, 나를 아프게 해서 용서하기 싫은 사람의 얼굴이 떠오를지도 모르겠습니다. 용서하기 싫어서, 억울하다고 항변하고 싶을지도 모릅니다. 그렇습니다. 하나님이 어찌 모르시겠습니까? 우리가 얼마나 고통스럽고 힘든지, 얼마나 용서하기 어려운지 다 알고 계십니다. 죄는 늘 심각한 고통을 야기한다는 것을 누구보다 잘 아시는 분이 주님이시기 때문입니다. 가장 정의로우신 분이 가장 불의한 죽음을 맞이하셨던 것입니다.\n\n그런데 하나님이 왜 우리에게까지 이렇게 살아가라고 하시는지 아십니까? 왜 이 길을 향해 기도하면서 추구하라고 하시는지 아십니까? 사실은 우리 자신 때문입니다.\n\n주님은 '죄라는 것이 우리의 인생 이야기에 결정적인 영향을 미치도록 그냥 놔두지 않겠다'고 하십니다. 죄가 우리 인생을 이끌어가게 하는 것을 멈추고 싶으신 것이고, 그래서 우리 인생이 망가지는 것을 막고 싶으신 것입니다. 이 세상에 사랑은 식어가고, 폭력과 분노가 가득 차는 모든 일에 대해서 그대로 놔두지 않으시겠다는 선한 의지인 것입니다. 그것이 하나님이 우리에게 요구하시는 용서입니다.\n\n하나님이 오른 뺨을 맞아서 고통스러워하는 사람들에게 이제는 왼 뺨도 돌려 대서 갑절로 희생당하는 희생자 집단을 만들려고 하시는 것일까요? 아닙니다. 하나님은 절대로 그런 지점에서 명령하시는 것이 아닙니다. 오히려 용서의 삶은 그 자체로 하나님의 엄청난 사역에 참여하는 것입니다. 어떤 사역입니까? 희년이 시작되었다는 그분의 선포 아래에서 세상을 바꾸라는 것입니다. 끝없이 돌고 도는 복수와 복수의 쳇바퀴를 이제는 멈추라고 말씀하시는 것입니다.\n\n각 가정마다 사회마다, 곳곳에서 악의 고리는 점점 커지고 있습니다. 요즘은 진보와 보수, 노인과 젊은이, 남자와 여자가 끝없이 서로를 가해자로 몰아가면서 분노하고 복수심에 불타고 있습니다. 우리는 완전히 새로운 비전에 눈을 떠야 합니다. 예수께서 십자가 위에서 보여주신 빚 탕감의 은혜를, 그 사역을 우리의 삶 속에서도 선언하고 나타내라고 사명의 자리로 부르고 계시는 것입니다.\n\n사랑하는 성도 여러분, 대체 언제까지 피해자의 자리에 머무르려고 하십니까? 이미 주님의 십자가 위에서 우리 모두가 심각한 가해자라는 것이 폭로되었습니다. 그것을 모른 체할 수 있겠습니까? 죽는 날까지 그 자리에만 있으시겠습니까? 우리의 삶과 신앙의 양상이 늘 상처투성이라서 매번 내 상처 좀 봐달라고 우는 수준에만 머물려 하십니까? 이제 막 신앙을 출발하는 자리라면 아직은 그럴 수도 있습니다. 그래도 괜찮습니다. 하지만 긴 세월 신앙생활을 하는데도 여전히 거기 있다면 이상한 것입니다. 그리고 바로 그 때문에 아무리 어려워도 우리는 이 기도를 드립니다.\n\n이 기도에 동참하는 법\n\n그렇다면, 이제 이 기도에 동참하는 방식이 무엇인지 조금 더 구체적으로 정리해 보겠습니다.\n\n첫 번째는 매일 이 기도를 드리면서, 우리의 빚을 탕감해 주신 그리스도의 은혜를 깊이 묵상하고 자기를 돌아보는 것입니다. 실제로 우리는 용서할 능력이 전혀 없는 사람들이 아닙니까? 솔직하게 인정해야 합니다. 우리는 억울함을 참기가 어렵고, 문제 상황과 관계를 곱씹으면 곱씹을수록 더 큰 분노와 복수심에 불타오를지 모릅니다. 그런데 정말 자신이 엄청난 용서의 수혜자라는 것을 진정으로 깨닫게 되고, 그 이야기 안에 풍덩 젖어들기 시작하면, 놀라운 회복이 시작됩니다. 억울함과 고통이 줄어들기 시작하고, 상처가 회복되는 것입니다. 그리고 그 자리에서 용서할 수 있는 힘과 에너지가 공급됩니다. 저 개인적으로도 이 부분에 대해서는 할 말이 너무 많은데, 그뿐만 아니라 기독교 역사 전체에 너무나 놀라운 용서와 화해의 성취들이 얼마나 많이 발견되는지 모릅니다.\n\n그 중 하나만 소개하자면, 1999년에는 미국에서 이런 일이 있었습니다. 26살의 한국인 유학생이었던 윤원준 군이 인종우월주의자였던 벤자민 스미스라는 사람이 쏜 총에 맞아 죽게 되었습니다. 그리고 일주일 후, 미국 전 지역에서 추모예배를 드렸는데, 그때 그의 형이 가족을 대표해서 인사를 하는 순간, 전 미국인들이 전율을 느끼게 되었다고 전해집니다.\n\n그 전문을 읽어드리겠습니다.\n\n\"나는 오늘 가족을 대표해서 예수 그리스도의 이름으로 내 형제를 죽인 벤자민 스미스를 용서할 것입니다. 그리고 나는 오늘 예수 그리스도의 이름으로 내 사랑하는 형제의 꿈을 빼앗아가고 피를 흘리게 한 이 미국을 예수 그리스도의 이름으로 용서합니다. 왜냐하면 예수님은 용서하기 위해 이 땅에 오셨기 때문입니다. 나와 우리 가족은 그 예수 그리스도를 구주와 주님으로 믿는 사람입니다.\"\n\n놀라운 이야기가 아닙니까? 우리는 인간의 한계를 정해 두고, 자신의 한계를 딱 그어놓고 살곤 합니다. 그런데 하나님 나라 안에서는 우리 생각보다 훨씬 놀라운 일이 벌어집니다. 그리고 그 때문에 우리는 이 기도를 끊임없이 하는 것입니다. 우리가 바로 하나님 나라 안에 사는 사람들이니까 매일 놀라운 주님의 용서를 묵상하고, 내가 어떤 자리에서 구원을 받았는지를 발견하는 것입니다. 바로 그 과정 속에서 우리는 조금은 느려도, 반드시 변해갈 것입니다. 조금 더 너그러워지고, 조금 더 놀라운 관점들을 갖게 되는 것입니다. 그러다 보면, 어느 순간 요셉의 고백에 동참할 수 있지 않을까요?\n\n그런 면에서 두 번째로는 이 기도를 매일 하루를 마치면서 드려보는 것입니다. 우리는 어차피 매일 누군가에게 상처를 주고, 또 누군가에게 상처를 받으면서 살아갑니다.\n\n간단히 예를 들어보겠습니다. 우리는 배우자가 약속을 잊은 것 때문에 화가 나고, 자녀가 거짓말을 할 때 화가 납니다. 숙제 한다고 해놓고서는 게임만 한 것을 알아차리면 순간적으로 감정이 상하는 것입니다. 직장에서는 동료가 자기의 공을 가로채고, 상사는 부당한 업무를 지시하고, 후배가 실수했는데 책임이 나에게 넘어오기도 하고, 팀 프로젝트인데 누군가 자기 책임을 지지 않기도 합니다. 주차하다가 시비가 걸리기도 하고, 아파트에서는 밤늦게 윗집에서 쿵쾅거리는 소리를 내는 것 때문에 분노하기도 합니다. 그 모든 상황을 다시 떠올리는 것입니다. 내가 했던 일과 내가 당한 일 모두 말입니다. 그래서 나 자신도 용서받기를 소망하고, 또 용서할 수 있기를 입으로 고백하는 시간을 가져보는 것입니다. 딱 5분이라도 좋습니다. 이 습관이 쌓이면 우리가 사람들과 관계를 맺는 방식이 전혀 달라질 것이 분명합니다. 어쨌든 거창한 것은 좀 미뤄두고, 일단은 일상의 작은 용서조차 못하고 있는 자신을 발견해 나가고 진실해지는 것은 너무나 중요합니다.\n\n그래서 마지막으로 강조하고 싶은 것은 일단 가장 쉬운 자리에서 연습을 시작해 보는 것인데, 이 기도를 특히 공동체 안에서 두드러지게 실천하는 것입니다. 우리 안에서 먼저 화해를 추구하고, 서로를 용납하고 용서하기로 결정하는 것입니다. 교회 안에는 각자 다양한 배경과 문화를 가지고, 또 각자 다른 영적 성장의 속도와 인격을 가진 사람들이 모여 있습니다. 이렇게나 다른 사람들이 서로 하나 된다는 것은 사실 엄청나게 어려운 미션입니다. 그럼에도 불구하고, 교회는 이렇게 기도하는 사람들이 모인 자리이고, 이곳에서만큼은 훨씬 두드러진 성취가 이루어져야 하는 것입니다. 또 이 안에서 함께 용서의 삶을 추구해 나가는 나눔들이 풍성해지면 훨씬 좋을 것입니다.\n\n맺는말\n\n오늘 우리는 '우리가 우리에게 죄 지은 자를 용서해 준 것 같이 우리의 죄를 용서해 달라'는 기도를 살펴보았습니다. 이 기도는 하나님의 빚 탕감 이야기, 용서 이야기 속으로 초대하는 초대장이자 우리를 통해 그분의 이야기를 실현하려는 비전이라고 했습니다. 그래서 우리는 주님께 이 초대에 응답하라고 부름을 받고 있는 것입니다. 죄가 이끄는 인생이 되지 말고, 은혜가 이끄는 인생이 되라는 초대인 것입니다. 사실 용서라는 주제는 언제나 우리에게는 너무 과하게 큰 옷처럼 보입니다. 그래서 별로 듣기 싫은 이야기일지도 모릅니다. 한 걸음 내딛는 것조차도 용기가 필요할 만큼 말입니다. 그럼에도 불구하고, 적어도 우리는 이 기도를 멈추면 안 되는 사람인 것을 기억했으면 좋겠습니다.\n\n그리고 이 기도를 드릴 때마다 우리가 이 기도에 맞춰지고 자라게 될 것을 믿기를 바랍니다. 우리 시대는 분열과 갈등과 혐오, 대립이 깊어지는 시대이지만, 부디 우리를 통해서 용서와 평화가 임하는 것을 볼 수 있기를 소망합니다.", "questions": ["당신의 삶에서 '용서할 수 없다'고 생각하는 상황이나 사람이 있나요? 그것을 하나님께 진 당신의 빚(15만년치 월급)과 비교해본다면 어떤 생각이 드나요?", "오늘 하루 동안 당신이 겪은 작은 갈등들을 떠올려보세요. 그 순간들에서 당신은 '응징'을 선택했나요, '용서'를 선택했나요?", "당신은 여전히 '피해자'의 자리에 머물러 있진 않나요? 예수님의 십자가 사건이 보여주는 '희년'의 은혜가 당신의 삶에서는 어떻게 실현되고 있나요?"], "missions": [{"number": 19, "topic": "우리가 용서 하듯, 우리도 용서하소서", "text": "하나님,\n\n오늘 제 모습을 돌아보니 많이 부끄럽습니다.\n\n평범한 하루를 살면서 숨 쉬는 것도, 밥 먹는 것도, 걸어 다니는 것도 모두 하나님이 주신 선물인데 그동안 그냥 당연하다고만 생각했습니다.\n\n일하면서 얻은 것들, 만나는 사람들과의 관계, 이 모든 게 하나님이 허락하신 것이었는데 전 그저 제 실력과 노력으로 이룬 거라고 착각하며 살았던 것 같습니다.\n\n그런 절 하나님은 여전히 변함없이 사랑해주시고 매일 좋은 것으로 채워주고 계시니 이제야 제가 얼마나 큰 사랑을 받고 있는지를 깨닫습니다.\n\n하나님, 이 마음을 잊지 않게 해주십시오. 받기만 하는 제가 아니라 이제는 하나님 마음에 맞게 살아가고 싶습니다."}, {"number": 20, "topic": "우리가 용서 하듯, 우리도 용서하소서", "text": "우리의 모든 빚을 탕감하시고 자유를 선포하신 하나님,\n\n예수님의 십자가를 바라봅니다.\n\n제가 도저히 갚을 수 없는 빚을 주님께서 모두 갚아주셨습니다.\n\n아무 자격 없는 저를 다시 자녀 삼아주셨습니다.\n\n그런데 하나님,\n\n저는 아직도 작은 잘못에 분노하고 사소한 실수를 용납하지 못합니다. 누군가 저를 아프게 할 때면 금방 복수하고 싶은 마음이 듭니다.\n\n이제 깨닫습니다.\n\n제가 받은 용서가 얼마나 큰 것이었는지 그 은혜가 얼마나 놀라운 것이었는지를.\n\n저도 다른 이들을 그렇게 용서하며 살게 하소서.\n\n예수님처럼 너그러운 마음을 허락하여 주옵소서."}, {"number": 21, "topic": "우리가 용서 하듯, 우리도 용서하소서", "text": "우리의 일상을 동행하시며 가르치시는 하나님,\n\n오늘 하루를 돌아봅니다. 제가 누군가에게 상처 준 일은 없었는지, 혹은 누군가에게 받은 상처로 마음이 힘들지는 않았는지 살펴봅니다.\n\n때론 작은 일로 다투고 사소한 오해로 마음이 상하기도 했지만 이 모든 것이 우리의 연약함임을 고백합니다. 하나님의 크신 용서를 기억하며 저도 작은 것부터 용서하는 법을 배우고 싶습니다.\n\n가정에서, 직장에서, 교회에서 저부터 먼저 용서하며 살아가게 하소서. 그리하여 당신의 희년이 우리의 일상에서 이루어지게 하소서."}]}, {"id": 8, "title": "시험에 들게 마시고 악에서 구하소서", "subtitle": "마태복음 6:13a", "sermon": "전쟁 중인가, 평화 중인가\n\n혹시 '오노다 히로'의 이야기를 들어보신 적이 있으십니까?\n\n그는 태평양 전쟁에 참여했던 말단 장교였는데, 이미 패색이 짙은 상황에서 필리핀에 파견되었습니다. 게다가 부대 자체가 잘 훈련된 부대도 아니었기에 순식간에 초토화되면서, 생존자들은 뿔뿔이 흩어져 산과 숲 속에 숨어 지내게 되었습니다.\n\n그러던 중 마침내 전쟁이 끝나버렸습니다. 일본의 무조건 항복 선언이 이루어진 것입니다. 당연히 오노다 히로는 그 사실을 전혀 몰랐고, '전쟁이 끝났으니 투항하라'는 전단지를 보내도 전혀 믿지 않았습니다. 결국 그는 무려 30년 가까이 홀로 전쟁을 하고 있었습니다. 늘 무장을 한 채로 수많은 필리핀 원주민을 습격했고, 무려 30명의 사상자와 100여 명의 부상자를 만들어냈습니다. 실제로 오노다 히로는 자신이 시도한 수많은 게릴라전들에 대해서 자랑스러워했는데, 사실 얼마나 황당한 일입니까? 스스로는 명예로운 인생이라고 생각했더라도, 사실은 시대착오적이고 아무 의미 없는 삶을 산 것뿐이었습니다. 이미 평화의 시대가 되었는데도, 홀로 전쟁의 시대를 살았기 때문입니다.\n\n그런데 오늘날 그리스도인들은 이것과 정반대의 상황에 있지는 않을까 합니다. 성경은 언제나 치열한 영적 전투 상황을 말씀하시는데, 우리의 실존 감각은 평화로운 현실로 여기고 있다는 것입니다. 전시 상황이라는 맥락에는 아예 무감각해진 모양새입니다. 실제로 우리는 간혹 뉴스에서 북한이 쏜 미사일 이야기, 각종 전쟁 속보나 긴급 재난 문자를 보곤 하는데, 그때 우리의 반응은 보통 '아, 그랬구나' 하면서 별다른 생각도 없습니다. 적어도 우리의 감각으로는 이 나라가 더 이상 전쟁과는 아무 상관이 없는 것처럼 여겨지기 때문입니다. 어쩌면 우리의 영적 감각도 이와 비슷한 상황인지 모릅니다. 영적 전쟁에 대해서 듣긴 들었고 다 알기는 하지만, 이미 감각은 무뎌져서 이에 대한 진지함이나 치열함은 없고 아주 느슨한 상태가 되어버린 것입니다.\n\n풍랑 속 배의 이미지\n\n그렇다면, 성경이 말씀하시는 이 세상과 우리의 현실은 무엇인지부터 생각해 보겠습니다. 이 부분도 상상력을 주는 좋은 이미지가 하나 있습니다.\n\n마태복음 8:23-25절입니다.\n\n\"예수께서 배에 오르시니, 제자들이 그를 따라갔다. 그런데 바다에 큰 풍랑이 일어나서, 배가 물결에 막 뒤덮일 위험에 빠지게 되었다. 그런데 예수께서는 주무시고 계셨다. 제자들이 다가가서 예수를 깨우고서 말하였다. '주님, 살려 주십시오. 우리가 죽게 되었습니다.'\"\n\n이 장면을 상상해 보십시오. 제자들은 예수님과 함께 배를 타고 있었습니다. 그런데 갑자기 큰 풍랑이 닥쳐왔습니다. 파도는 배를 덮치고, 금방이라도 침몰할 것만 같았습니다. 더 놀라운 것은 그 순간 예수님은 잠을 주무시고 계셨다는 것입니다. 이 이미지가 바로 현재 우리의 현실을 보여주는 중요한 그림입니다. 우리가 복음을 받아들인 그리스도인이라면, 분명 예수님은 우리와 함께 하십니다. 그럼에도 불구하고 여전히 풍랑은 주님이 타고 계신 이 배를 피해 지나갈 생각이 전혀 없어 보입니다.\n\n그리스도는 우리와 함께 하시고 하나님 나라는 분명 임했는데도, 깨어진 세상 나라는 여전히 건재해 보입니다. 아니 오히려 하나님 나라에 압도당하거나 쪼그라들고 있는 모습이 아니라, 훨씬 더 거칠고 거대한 풍랑이 이는 바다의 이미지를 보여주고 있습니다. 마치 하나님 나라를 순식간에 사라지게 만들 것처럼, 전부 침몰시키려는 듯이 발악하고 있는 장면인 것입니다.\n\n우리의 현실\n\n우리의 현실이 무엇입니까? 사탄이 우는 사자와 같이 삼킬 자를 찾고 있는 현실이고, 문 앞에 죄가 엎드리고 있어서 나가는 순간 발을 헛디디고 실족하게 만드는 현실입니다. 우리의 인생 속에는 온갖 악과 시험, 곧 유혹이 끊임없이 닥쳐옵니다. 그런데 더 큰 문제가 있습니다. 모두가 인정할 수밖에 없는 사실이 하나 있는데, 우리의 힘만으로는 이 모든 풍랑을 절대로 버텨낼 수 없다는 것입니다.\n\n잘 기억하십시오. 우리 힘으로는 '절대로' 이길 수 없습니다. 그래서 제자들의 모습이 이해가 됩니다. 그들은 호들갑을 떨면서 온갖 불안과 염려로 주님의 이름을 불렀습니다. 그런데 잠에서 깨어나신 주님이 26절에 이렇게 말씀하십니다.\n\n\"예수께서 그들에게 '왜들 무서워하느냐? 믿음이 적은 사람들아!' 하고 말씀하시고 나서, 일어나 바람과 바다를 꾸짖으시니, 바다가 아주 잔잔해졌다.\"\n\n주님이 하신 말씀과 행동 안에서 우리는 두 가지를 확인하게 됩니다. 첫 번째는 예수님의 명령 한 마디에 모든 풍랑이 잔잔하게 되었다는 것이고, 두 번째로는 울며 부르짖던 제자들은 그 태도와 믿음에 대해서 책망을 받았다는 사실입니다.\n\n악과 싸우는 잘못된 방식들\n\n이제 우리는 예수님이 세상을 어떻게 바라보셨고, 또 그 안에 작동하는 모든 악과 시험을 어떤 식으로 상대하셨는지를 배울 필요가 있습니다. 그런데 우선은 일반적으로 우리가 시험과 악을 대하는 잘못된 방식들부터 짚고 넘어가 보겠습니다. 이것은 예수님 시대에도 있었고, 지금도 여전히 존재하는 것들입니다.\n\n첫째는 에세네파의 방식인데, 이는 실존하는 '악'을 외면하거나 그저 무시해 버리는 방식입니다. 어떤 일이 벌어지든, 어떤 유혹이 닥쳐오든지 간에, 그런 것은 별로 중요하지도 않은 것처럼, 대수롭지 않게 여기는 척 하는 것입니다. 보통 이런 식입니다.\n\n\"사람이 실수도 하고, 연약함도 있는 것 알잖아요. 세상도 원래 이런 걸 어쩌겠어요. 그래도 자기 할 일 하면서 노력하다 보면 다 잘 될 거예요. 그냥 그러려니 하면서 살면 되는 거죠.\"\n\n그야말로 악과 고통과 유혹을 직면해서 그 실체를 보려는 것이 아니라, 그냥 힐끗 보면서 수박 겉핥기식의 가벼운 대책들로 만족해 버리는 것입니다. 예를 들면, 지금 집에 불이 나서 난리가 났는데 \"좀 더워지긴 했네요. 그럼 옷 좀 벗고, 얼음물 먹으면서 견뎌보죠.\" 하는 것과 같습니다.\n\n말도 안 되는 이야기 같지만, 이 시대의 많은 사람들이 그렇게 살아갑니다. 생각해 보십시오. 모든 인간은 반드시 죽음 앞에 서야 합니다. 이는 인간에게 있어서는 엄청난 문제입니다. 죽음은 모든 것을 사라지게 만들고, 의미 없게 만드는 능력이 있기 때문입니다. 그런데 대부분은 이것을 애써 무시하고, 외면합니다. \"그런 건 그냥 생각하지 말자. 그냥 사는 것만 생각해. 머리 아프니까.\" 그뿐입니까? 일상의 사소한 부분들에서 특히 더 쉽게 발견됩니다. 자기 자신이 이미 스마트폰의 노예처럼 되어버렸는데도 어느 정도 문제가 있다는 것을 알면서도 그냥 무시하고 넘어갑니다. 가정에서 깊고 친밀한 대화가 줄어드는 것도 가볍게 생각하는 것입니다. 하여간 온갖 문제가 발견되어도 직면하는 것이 아니라, 심각성을 애써 무시하고, 그저 시간이 지나거나 적당히 잊고 살다 보면 해결될 것이라고 생각하는 것입니다.\n\n이제 두 번째 방식은 사두개파의 방식인데, 이는 마치 일제 강점기의 친일파가 선택했던 방식과 비슷합니다. 그들이 왜 일본에 붙었습니까? 간단합니다. 어차피 해방될 수는 없을 것 같으니, 자기와 후손들이라도 잘 살 수 있는 길을 찾아갔던 것입니다.\n\n마찬가지입니다. 우리 주변에 가득한 악과 시험들은 어쩔 수 없는 것이니, 어차피 이기지도 못할 것 같고 승리한다는 것은 상상도 할 수 없으니, 차라리 마음껏 거기에 뒹굴고 친하게 지내면서 적응하겠다는 것입니다.\n\n하나님 나라는 죽어서 가게 될 나라로 치부하고, 승리는 그때 가서 경험하면 되는 것이고, 지금은 어쩔 수 없이 세상과 똑같이 살면서 이득이라도 얻어야 되는 것이 아니냐고 말합니다. 그래서 어떻게 삽니까? 우리 시대가 가지고 있는 모든 악한 구조와 사람을 착취하고 억압하는 모든 피라미드 체제를 그대로 받아들이며 삽니다. 그야말로 악의 일부가 되는 것입니다. 할 수만 있다면 노동력도 착취하고, 갑질하며, 부동산 투기도 하고, 자본주의를 작동시키는 제로섬 게임에 참여해서 남들이 잃은 돈을 자신이 가져올 수만 있다면 그것을 축복으로 여깁니다. \"늘 그래왔는데 뭘, 남들 다 하는 건데 어때요? 나만 이러는 것이 아니잖아요!\"라고 말하며 자녀 양육 방식이든, 소비 습관이나 돈을 다루는 태도 부분에서 온갖 잘못된 문화들 한가운데에서 그냥 똑같이 살아갑니다. 한 마디로 말해서 세속화되어버린 그리스도인, 불신자와 다를 바 없는 이름뿐인 성도의 모습이 이와 같을 것입니다.\n\n이제 마지막 방식은 바리새파의 방식인데, 아마도 교회 안에 가장 많은 경우일 것이라는 생각이 듭니다. 이들은 자기 자신은 철저하게 악과 분리되어 있다고 봅니다. 그래서 바리새인의 대표적인 발언이 무엇입니까?\n\n\"아이고... 그래도 저는 저런 인간들과 달라서 감사합니다. 저 나쁜 자들이 다 없어져야 하는데...\"\n\n악을 자신과는 철저히 분리시키고, 언제나 자신은 정의롭다고 여기며, 악은 부도덕한 타자들에게 작동하고 있다고 여기는 것입니다. 아마 실제로 이런 사람들은 조금 더 도덕적인 모양새를 갖고 있을 가능성이 큽니다.\n\n그런데, 그렇게 도덕적이려고 시도하는 이유가 무엇인지 아십니까? 자신은 저 사람들과 다르다고, 마음껏 정죄하고 비난할 근거를 마련하기 위한 것뿐입니다. 그런데 예수님은 이들에게 특히 심각하게 경고하셨습니다. 그리고 기독교 신앙을 가진 우리가 가장 주의해야 할 것이 바로 이 부분일지 모릅니다. 우리는 하나님의 백성이고, 저들은 악한 사람들이라는 구도에 너무 익숙하기 때문입니다. 악과 시험을 이긴다는 것을 악과 연루된 어떤 집단이나 사람들과 싸우는 것으로 착각할 수밖에 없습니다. 그래서 아예 세상과 분리되는 결벽을 부리거나 세상 사람들 자체를 비난하고 정죄하게 되는 것입니다.\n\n그래서 지금도 기독교 안에는 늘 차별과 반목이 존재하고 있습니다. 교회에 절대로 발을 들일 수 없는 인간 부류들을 이미 마음에 정해 두고 있는 것입니다. 그래서 동성애자들이나 이슬람교도들, 타종교인들과는 자꾸 싸우려 들고 있는 것입니다. 그런데 이 모든 것은 잘못된 방식이었습니다. 예수님은 이 모든 것을 거절하셨기 때문입니다.\n\n예수님의 악을 상대하시는 방식\n\n그렇다면, 예수님은 악과 시험을 어떻게 대하셨는지를 살펴보겠습니다. 사실 예수님이 사역하시던 내내 온갖 유혹과 시련이 따라다녔습니다. 유혹과 시련들의 목적은 분명했습니다. 앞에서 본 그 이미지대로, 어떻게든 하나님 나라가 세워지는 것을 막으려 했던 것입니다. 그 배를 할 수만 있다면 파선시키고 싶었던 것입니다. 그래서 수많은 사람들이 가는 곳마다 예수님을 정치적 왕으로 세우려고 시도했습니다. 유혹이었습니다. 하나님 나라는 섬기는 권력인데, 군림하는 권력을 추구하라고 부추긴 것입니다.\n\n게다가 주님이 하나님 나라를 더 선명하게 말씀하실 때마다 온갖 주류 세력에 부딪히고, 자신을 외면하고 떠나는 이들을 보실 수밖에 없었습니다. 그 거절감과 적대감 속에서 분노와 상처로 얼룩질 가능성에 놓이셨던 것입니다. 하지만 진정 강력한 악과 유혹은 따로 있었습니다. 주님은 자신에게 거대한 악이 덮쳐올 것을 이미 아셨습니다. 온 인류의 죄가 자신을 덮을 것이고, 자기 백성들의 경멸을 온 몸으로 받아내야 했습니다.\n\n게다가 그 악은 너무 강력해서, 하나님의 임재마저도 끊어지게 만드는 자리이기도 했습니다. 그것이 십자가였습니다. 그래서 주님도 그 잔을 어떻게든 피하고 싶으셨습니다. 이는 오직 예수님께만 다가온 강력한 시험이었기 때문입니다.\n\n그런데 주님이 하신 일이 무엇입니까? 그 모든 유혹과 거대한 악 앞에서 그 모든 것을 고뇌의 기도로 끌고 나가셨고, 결국 아버지께 순종하심으로 십자가를 지는 자리에 서셨습니다. 주님은 악을 아무것도 아닌 척 무시하지도 않으셨기에 땀이 피가 되기까지 기도하셨고, 악을 패망시키시는 하나님을 믿은 채로 악에 동조하지도 않으셨습니다. 오히려 악의 얼굴을 빤히 노려본 채로, 하나님께 온전히 순종하는 방식으로 악을 대면하셨습니다. 대체 어떻게 주님은 그렇게 하실 수 있었을까요?\n\n정말로 예수님은 믿으셨습니다. 아무리 악이 모든 것을 삼키는 순간이 온다고 해도, 아버지께서 모든 것을 회복시키시고 악을 무너뜨리실 것을 믿으신 것입니다. 시험에 들게 하지 마시고, 악에서 구하소서 외치는 그 기도 한가운데에서 풍랑을 잠잠하게 하시는 하나님의 능력을 신뢰하신 것입니다. 그래서 우리가 꼭 기억해야 하는 것이 있습니다. 우리가 자주 오해하는 것처럼, 우리가 드리는 이 기도가 응답된다는 것이 결코 악과 시험을 피하거나 사라지게 만드는 내용일 수 없다는 것입니다.\n\n에베소서 6:20을 읽어보겠습니다.\n\n\"나는 사슬에 매여 있으나, 이 복음을 전하는 사신입니다. 이런 형편에서도, 내가 마땅히 해야 할 말을 담대하게 말할 수 있게 기도하여 주십시오.\"\n\n바울의 모습이 어떠합니까? 그는 묶여 있습니다. 감옥에 갇힌 형편입니다. 이 세상에 대해 누릴 수 있는 것들을 대부분 빼앗긴 채 살고 있습니다. 왜 그렇게 되었습니까? 어쩌다가 이렇게 된 것입니까? 죄를 많이 지어서입니까? 예수님을 잘 믿지 못해서입니까? 아니요, 완전히 정반대입니다. 오히려 하나님께 매여 있었기 때문입니다. 계속 말씀드리지만, 우리는 지금 우주적인 전쟁 한복판에 서 있습니다. 이 깨진 세상은 말 그대로 심각하게 잘못되어 있기 때문입니다. 하나님을 거슬러서 조직적인 반란이 일어나고 있는 중입니다. 우리가 사는 날 동안 어떻게든 그리스도를 따르지 못하게 하려고, 아버지의 뜻과 계획, 그 분의 보호하심을 믿지 못하게 하려고 발악할 것입니다.\n\n그래서 바울과 주님의 제자들은 감옥에 갇히고, 결국은 순교하는 자리에 설 수밖에 없었습니다. 하지만 그들 중 어느 누구도 배에서 뛰어내리지 않았습니다. 확신컨대 그들 모두가 그리스도를 따라서 \"시험에 들게 하지 마시고, 악에서 구하소서\"라는 기도에 참여했을 것입니다.\n\n결국 우리가 이 기도를 드린다는 것은 이미 전쟁터 한복판에 서 있다는 것을 인식하는 것이고, 절대로 지지 않는 싸움에 참여하고 있다는 것을 기억하는 것입니다. 절대로 오해하지 마십시오. 구원이라는 것은 우리가 현재 괴롭힘 당하는 모든 일들이 다 사라지고 전쟁이 그친다는 것이 아닙니다. 자꾸 복음과 신앙을 엉뚱하게 사용하니까 문제가 심각한 것입니다.\n\n\"취직이 안 되세요? 예수께 나오세요.\"\n\n\"결혼하고 싶어요? 예수께 나오면 됩니다. 특히 헌금 많이 들고 오세요.\"\n\n그것이 아닙니다.\n\n구원과 복음은 오히려 배를 타고 풍랑을 뚫고 지나가는 모험과도 같은 것입니다. 차라리 예수님을 몰랐다면 악을 모른 체하면서 살거나, 그냥 악에 동조하면서 편하게 살아갈 수도 있었을지도 모릅니다. 그런데 이제 진리를 알게 되어서 승리의 하나님께서 반드시 탈환하실 새로운 세상에 대한 소망으로 살아가는 사람이 될 수밖에 없다는 것입니다. 전쟁이 일어난 줄도 모르는 안전한 곳에 있는 시민으로 사는 것이 아니라, 오히려 전쟁 한복판에 뛰어든 군인이 되는 방식인 것입니다. 그리고 이 기도를 통해서 예수님의 방식을 따라 사는 힘과 무기들을 얻게 된다는 것입니다.\n\n현대적 맥락에서의 시험과 악의 권세\n\n그렇다면, 이제 이 이야기들을 우리 시대의 맥락으로 가져와서 생각해 보겠습니다. 일단, 우리 사회에는 각종 권세들이 즐비합니다. 예를 들면 엄청나게 많은데, 그 중에 대표적인 것들만 꼽자면, 경제, 돈도 권세이고, 미디어도 권세이고, SNS도 권세에 해당합니다.\n\n이것이 우리 삶을 장악하려고 합니다. 미디어가 보여주는 것들이 우리의 가치관을 형성하고, 함께 트렌드에 올라서야만 한다고 부추기고 있습니다. SNS 안에서도 사람들은 전부 비교와 과시의 노예가 되곤 합니다.\n\n한 마디로 이 세상 어느 누구도 자유롭게 사는 사람이 없습니다. 전부 보고 들은 것에 영향을 받으며 사는 것뿐입니다. 남들이 추구하는 것을 따라가고, 권세가 부추기는 것들을 그대로 받아들이며 사는데도, 정작 자기가 그렇게 살고 있다는 것 자체도 눈치채지 못하고 있습니다.\n\n그래서 일단은 우리가 이 기도를 드리면서, 이제부터 무엇이 진정한
